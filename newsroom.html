ional free-trade agreements (FTAs).", "title_cn": "泰国寄望于欧盟自贸协定（FTA）以稳固经济稳定", "summary_cn": "随着国际贸易版图迅速变化、贸易壁垒增加以及传统国际组织影响力下降，泰国政府正调整策略，减少对多边贸易体系的依赖。泰国目前正积极推动与欧盟（EU）的自由贸易协定谈判，旨在通过双边和区域自贸协定（FTA）来加强国家经济的稳定性。此举被视为应对全球市场动态变化的关键防御手段。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-18", "event_id": "thailand_eu_fta_talks_2026", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "377deea4e6ae", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Thailand driving e-commerce growth", "url": "https://www.bangkokpost.com/business/general/3239004/thailand-driving-ecommerce-growth", "date": "2026-04-18T05:05:00+07:00", "desc": "Thailand has emerged as Southeast Asia's e-commerce growth engine amid regional market share consolidation.", "desc_original": "Thailand has emerged as Southeast Asia's e-commerce growth engine amid regional market share consolidation.", "title_cn": "泰国崛起为东南亚电商增长新引擎", "summary_cn": "在全球和区域市场份额整并的背景下，泰国已成为东南亚电子商务增长的主要驱动力。凭借高互联网普及率和日益成熟的物流物流体系，泰国在区域电商格局中的地位不断提升。分析指出，泰国的电商市场增速领跑邻国，吸引了大量外国资本和电商平台加大在泰投入，成为该地区不可忽视的商业增长节点。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-18", "event_id": "thailand_ecommerce_growth_engine_2026", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "f64fefd8f855", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Arson attacks herald PM visit", "url": "https://www.bangkokpost.com/thailand/general/3238999/arson-attacks-herald-pm-visit", "date": "2026-04-18T04:41:00+07:00", "desc": "Prime Minister Anutin Charnvirakul pledged to accelerate peace efforts in the deep South as suspected insurgents carried out arson attacks believed to be symbolic acts timed with his visit.", "desc_original": "Prime Minister Anutin Charnvirakul pledged to accelerate peace efforts in the deep South as suspected insurgents carried out arson attacks believed to be symbolic acts timed with his visit.", "title_cn": "副总理阿努廷（Anutin）视察泰南前夕发生多起纵火案", "summary_cn": "现任政府高层阿努廷·查恩维拉库尔（Anutin Charnvirakul）在访问泰南三府前夕，当地发生多起疑似由叛乱分子实施的纵火袭击。分析认为这些袭击是针对领导人到访的象征性挑衅。阿努廷对此表示，政府将进一步加快推进南部地区的和平谈判，强化安保措施，以应对当地长期存在的安全动荡局势。", "importance": "P1", "section_hint": "thailand", "location_detail": "泰南地区", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-18", "event_id": "thailand_south_arson_2026_04", "time_sensitive": true, "expires_date": "2026-05-03"}, {"id": "94fddbc29288", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Enconfund revs up energy projects", "url": "https://www.bangkokpost.com/business/general/3239014/enconfund-revs_up-energy-projects", "date": "2026-04-18T04:34:00+07:00", "desc": "The Energy Conservation and Promotion Fund Office (Enconfund) is stepping up efforts to help energy projects move beyond the research stage and reach commercial viability, including an initiative to replace diesel with waste-derived oil.", "desc_original": "The Energy Conservation and Promotion Fund Office (Enconfund) is stepping up efforts to help energy projects move beyond the research stage and reach commercial viability, including an initiative to replace diesel with waste-derived oil.", "title_cn": "泰国节能办（Enconfund）加速能源项目商业化，倡导废油替代柴油", "summary_cn": "泰国节能促进基金办公室（Enconfund）正加大支持力度，推动能源研究项目走向商业化应用。重点项目之一是研发将废弃物转化成的油料（waste-derived oil）以替代传统柴油，旨在降低国家对进口能源的依赖。此举不仅有助于提升环保水平，也为泰国本土能源技术企业提供了迈向市场的机会。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.85, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-18", "event_id": "thai_energy_enconfund_waste_oil_2026", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "8f9a4c64714d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "警方突袭曼谷赛迈区（Sai Mai），逮捕19名运营赌博网站中国籍男子", "url": "https://www.thaiheadlines.com/187165/", "date": "2026-04-18T03:24:20+00:00", "desc_original": "泰国头条新闻社讯 4月17日上午11点，泰国曼谷京畿警察署第5分署联合Khan Na Yao警察局和移民局调查小组，携曼谷民武里刑事法院于4月16日签发的搜查令，突袭位于Sai Mai区Ao Ngoen的一处住宅，并当场逮捕19名中国籍男子，同时缴获一批物证，包括102部手机、2台iPad、8台笔记本电脑、8台台式电脑和8台主机。 此前警方根据线索调查得知，上述住宅内有人涉嫌非法经营网络赌博，于是向法院申请搜查令，并在获批后组织了本次行动。警方进入住宅后发现，19名年龄介于26至45岁的嫌疑人正在操作运营赌博平台的电脑和通讯设备，随即对其实施抓捕。", "summary_cn": "曼谷警方于4月17日对赛迈区（Sai Mai）Ao Ngoen一处住宅进行突击搜查，成功端掉一个名为“Sheng Entertainment”的针对中国客户的赌博窝点。警方当场逮捕了19名中国籍男子（年龄26-45岁），并缴获包括102部手机及多台电脑在内的大批作案工具。主犯某嫌疑人承认通过会员充值制经营非法网赌，目前嫌疑人已被移送至警局依法处理。 ", "importance": "P1", "section_hint": "cn_thai", "location_detail": "曼谷 Sai Mai 区 Ao Ngoen", "city_tag": "#曼谷", "topic_tag": "#中泰", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "bangkok_chinese_gambling_bust_2026_04", "status": "pending", "added_date": "2026-04-19", "title_cn": "警方突袭曼谷赛迈区（Sai Mai），逮捕19名运营赌博网站中国籍男子"}, {"id": "9d5f1e84bdcb", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Summer storm warning for upper Thailand from April 17-20", "url": "https://thethaiger.com/news/national/summer-storm-warning-for-upper-thailand-from-april-17-20", "date": "2026-04-18T02:45:34+00:00", "desc": "Summer storm warning for upper Thailand from April 17-20 Legacy Thailand&#8217;s Meteorological Department has issued its seventh warning about a summer storm set to impact upper Thailand from April 17 to 20, bringing thunderstorms, strong winds, and hail to several areas. The storm will first strike the northeastern and eastern regions before moving to the central region, including Bangkok and surrounding provinces, then the north. A high-pressure system and cold air mass from China spreading over the South China Sea is strengthening southern and southeastern winds over the lower northeast, e", "desc_original": "Summer storm warning for upper Thailand from April 17-20 Legacy Thailand&#8217;s Meteorological Department has issued its seventh warning about a summer storm set to impact upper Thailand from April 17 to 20, bringing thunderstorms, strong winds, and hail to several areas. The storm will first strike the northeastern and eastern regions before moving to the central region, including Bangkok and surrounding provinces, then the north. A high-pressure system and cold air mass from China spreading over the South China Sea is strengthening southern and southeastern winds over the lower northeast, e", "title_cn": "泰国气象局发布夏季风暴预警：4月17日至20日多地将迎来雷雨及冰雹", "summary_cn": "泰国气象局（Thai Meteorological Department）发布第7号夏季风暴警告，4月17日至20日期间，受来自中国的高压系统和冷空气团南下影响，泰国上部地区将遭遇雷暴、强风和冰雹。风暴首先波及东北部和东部，随后扩散至中部地区，包括曼谷（Bangkok）及其周边省份，最后影响北部。提醒民众防范因极端天气可能导致的治安风险、树木倒塌及其带来的财物损害。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-04", "status": "pending", "event_id": "thailand_summer_storm_weather_2026_04", "added_date": "2026-04-19", "origin": "rss"}, {"id": "9984570ebe52", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "投资者等待和平谈判信号 泰国股市随全美股走势波动", "url": "https://www.bangkokpost.com/business/general/3238924/investors-hanging-on-news-of-peace-talks", "date": "2026-04-18T01:01:00+07:00", "desc_original": "Global shares enjoyed a decent run-up while the Thai stock market was closed for the Songkran holidays, with the Nasdaq and S&P500 hitting new highs.", "summary_cn": "在泰国宋干节（Songkran）长假期间，全球股市表现强劲，纳斯达克和标普500指数均创下新高。随着泰国市场结束假期重新开市，本地投资者正紧密关注国际和平谈判的进展，这被视为影响未来市场波动的重要因素。尽管国际环境存在不确定性，但外部指数的积极涨势为节后的泰国股市带来了一定的支撑预期。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.7, "tags": [], "origin": "rss", "event_id": "thai_stock_market_post_songkran_2026", "status": "pending", "added_date": "2026-04-18", "time_sensitive": false, "expires_date": "2026-05-18", "title_cn": "投资者等待和平谈判信号 泰国股市随全美股走势波动"}, {"id": "3f601c79ac06", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "泰国证监会（SEC）公布2026年关键市场改革路线图", "url": "https://www.bangkokpost.com/business/general/3239169/sec-sets-out-key-market-reforms-for-2026", "date": "2026-04-18T01:01:00+07:00", "desc_original": "Amid persistent market volatility and mounting external pressures, the Securities and Exchange Commission (SEC) has outlined an ambitious roadmap for the rest of the year, prioritising structural reforms, investor confidence, and proactive risk management.", "summary_cn": "面对市场持续波动和外部压力，泰国证券交易委员会（SEC）公布了今年剩余时间的雄心勃勃的改革路线图。该计划优先考虑结构性改革、提升投资者信心以及主动性风险管理。SEC旨在通过这些举措提高市场的韧性，确保其在复杂多变的全球金融环境下仍能维持竞争力，并为2026年的资本市场长期发展奠定基础。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_sec_market_reform_2026", "status": "pending", "added_date": "2026-04-18", "time_sensitive": true, "expires_date": "2026-05-03", "title_cn": "泰国证监会（SEC）公布2026年关键市场改革路线图"}, {"id": "9e99f79b2410", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "SCB X 专注技术投入应对中东冲突带来的成本上涨", "url": "https://www.bangkokpost.com/business/general/3239204/scb-x-focuses-on-tech-as-conflict-driven-up-costs", "date": "2026-04-18T01:01:00+07:00", "desc_original": "SCB X, the financial technology group and holding company of Siam Commercial Bank (SCB), has locked in low-cost technology investments ahead of a broader rise in expenses driven by the ongoing conflict in the Middle East.", "summary_cn": "泰国三商行（SCB）的控股金融科技集团 SCB X 宣布，由于中东冲突持续推高全球各项运营支出，该集团已决定提前锁定低成本技术投资。SCB X 试图通过在支出普遍上涨之前完成核心技术布局，来降低未来的长期运营成本。此举体现了泰国大型金融 i）的游客数量骤降了近 90%。当地官员和居民反映，空气质量恶化已严重打击了旅游经济。尽管处于传统旅游季，但极高的 PM2.5 水平让许多国际和本地游客望而却步，这对当地高度依赖旅游业的生计构成了巨大威胁。", "importance": "P1", "section_hint": "thailand", "location_detail": "拜县 Pai, 夜丰颂府 Mae Hong Son", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "origin": "rss", "event_id": "northern_thailand_haze_pai_tourism_crisis_2026", "status": "pending", "added_date": "2026-04-18", "time_sensitive": true, "expires_date": "2026-05-03", "title_cn": "泰北雾霾严重导致拜县（Pai）游客锐减 90%"}, {"id": "00c63690da97", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "泰国民众对新内阁持观望态度", "title_cn": "泰国民众对新内阁持观望态度", "summary_cn": "根据国王巴差提朴研究院（King Prajadhipok’s Institute）的一项最新调查，超过半数的泰国民众对新内阁表现持观望态度。调查显示，50.8%的受访者表示目前尚未看到任何部长团队能为国家带来清晰的“希望”。这一结果反映出公众对新政府施政能力的谨慎评估，尤其是在当前经济亟需复苏的背景下，选民仍在观察各部会是否能兑现竞选承诺。", "desc": "More than half of Thais are reserving judgement on the new cabinet, with a survey by the King Prajadhipok&rsquo;s Institute showing 50.8% of respondents do not yet see any group of ministers offering a clear &ldquo;hope&rdquo; for the country.", "desc_original": "More than half of Thais are reserving judgement on the new cabinet, with a survey by the King Prajadhipok&rsquo;s Institute showing 50.8% of respondents do not yet see any group of ministers offering a clear &ldquo;hope&rdquo; for the country.", "url": "https://www.bangkokpost.com/thailand/politics/3238819/thais-reserve-judgement-on-new-cabinet", "date": "2026-04-17T20:44:00+07:00", "added_date": "2026-04-18", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_new_cabinet_survey_2026", "status": "pending", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "5bf0ef8997c3", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "考艾国家公园著名老虎“Sri Kosa”自然死亡", "title_cn": "考艾国家公园（Khao Yai）著名老虎“Sri Kosa”自然死亡", "summary_cn": "研究人员证实，栖息在东帕耶延山-考艾森林保护区（Dong Phayayen-Khao Yai）内的一只名为“Sri Kosa”的著名雄性印度支那虎因自然原因死亡。这只老虎被认为是泰国野生虎群中的关键成员。此次损失引起了生物学界的关注，其在呵叻府（Nakhon Ratchasima）所属林区的生存记录对泰国野生动物保护研究具有重要价值。", "desc": "NAKHON RATCHASIMA - A male Indochinese tiger known as &ldquo;Sri Kosa&rdquo;, a key figure in Thailand&rsquo;s wild tiger population, has died of natural causes in the Dong Phayayen-Khao Yai forest complex, researchers have confirmed.", "desc_original": "NAKHON RATCHASIMA - A male Indochinese tiger known as &ldquo;Sri Kosa&rdquo;, a key figure in Thailand&rsquo;s wild tiger population, has died of natural causes in the Dong Phayayen-Khao Yai forest complex, researchers have confirmed.", "url": "https://www.bangkokpost.com/thailand/general/3238769/famed-khao-yai-tiger-dies-of-natural-causes", "date": "2026-04-17T19:04:00+07:00", "added_date": "2026-04-18", "importance": "P3", "section_hint": "thailand", "location_detail": "考艾森林保护区", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "origin": "rss", "event_id": "khao_yai_tiger_death_2026", "status": "pending", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "c08224484ddd", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "叻府缴获3800升走私免税柴油", "title_cn": "叻府（Trat）缴获3800升走私免税柴油", "summary_cn": "周五清晨，泰国当局在东部叻府（Trat）空艾县（Khlong Yai）的一个码头截获了一艘载有3800升未缴税柴油的渔船。船主承认为了降低成本，他在海上以每升28至30泰铢的价格购买了这些所谓“绿色燃油”，专门用于渔业作业。目前当局已介入调查，并将依法追究相关走私及逃税责任。", "desc": "TRAT - Authorities seized a fishing vessel carrying 3,800 litres of untaxed diesel at a pier in Khlong Yai district of this eastern province early on Friday. The owner admitted he had bought the fuel at sea for 28 to 30 baht per litre for use in the fishing sector.", "desc_original": "TRAT - Authorities seized a fishing vessel carrying 3,800 litres of untaxed diesel at a pier in Khlong Yai district of this eastern province early on Friday. The owner admitted he had bought the fuel at sea for 28 to 30 baht per litre for use in the fishing sector.", "url": "https://www.bangkokpost.com/thailand/general/3238755/3800-litres-of-untaxed-diesel-seized-off-trat", "date": "2026-04-17T18:09:00+07:00", "added_date": "2026-04-18", "importance": "P3", "section_hint": "thailand", "location_detail": "空艾县 Khlong Yai", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "trat_untaxed_diesel_seizure_2026", "status": "pending", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "ec6c4a68de12", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "Guru 周报：4月17日至23日生活指南", "title_cn": "Guru 周报：4月17日至23日精彩推荐", "summary_cn": "《曼谷邮报》旗下 Guru 栏目发布本周（4月17日至23日）生活指南，为读者甄选本周最值得尝试的新产品、户外活动、特色美食和旅行目的地。该周报旨在为居住在泰国（尤其是曼谷）的居民提供高质量的生活娱乐资讯，是外籍人士规划周内休闲活动的参考，涵盖了当地最新的流行趋势和文化动态。", "desc": "Guru By Bangkok Post's weekly pick of the most exciting products, activities, food and travel to indulge in.&nbsp;", "desc_original": "Guru By Bangkok Post's weekly pick of the most exciting products, activities, food and travel to indulge in.&nbsp;", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3238738/gurus-weekly-buzz-april-1723", "date": "2026-04-17T16:38:00+07:00", "added_date": "2026-04-18", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.8, "tags": [], "origin": "rss", "event_id": "bangkokpost_weekly_buzz_apr17_2026", "status": "pending", "time_sensitive": true, "expires_date": "2026-05-03"}, {"id": "923d84eb214f", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "曼谷女子称在宋干节派对中被喷射迷奸药", "title_cn": "曼谷女子称在宋干节（Songkran）派对中被喷射迷奸药", "summary_cn": "一名泰国女子发布公开预警，声称她在曼谷的一处娱乐场所参加宋干节庆典时，被水枪喷射出的液体击中眼部和面部，随后怀疑暴露于“迷奸药”（GHB，γ-羟基丁酸）。受害者提醒公众在泼水节狂欢中警惕不法分子将药物混入水具。此类新型犯罪手段引发了安全担忧，警方目前正介入调查涉事娱乐场所的安保漏洞。", "desc": "Bangkok woman claims date rape drug was sprayed into her face at Songkran party Legacy A Thai woman issued a public warning after alleging that she was exposed to gamma-hydroxybutyrate (GHB), or date rape drug , through water sprayed from a water gun during a Songkran event at an entertainment venue in Bangkok .", "desc_original": "Bangkok woman claims date rape drug was sprayed into her face at Songkran party Legacy A Thai woman issued a public warning after alleging that she was exposed to gamma-hydroxybutyrate (GHB), or date rape drug , through water sprayed from a water gun during a Songkran event at an entertainment venue in Bangkok .", "url": "https://thethaiger.com/news/bangkok/woman-says-she-exposes-to-ghb-through-water-gun-in-bangkok-songkran", "date": "2026-04-17T08:50:17+00:00", "added_date": "2026-04-18", "importance": "P1", "section_hint": "bangkok", "location_detail": "曼谷娱乐场所", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "bangkok_songkran_drug_spiking_2026", "status": "pending", "time_sensitive": true, "expires_date": "2026-05-03"}, {"id": "639290dedac8", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "宋干节后滞留泰国（Stranded in Thailand）怎么办？官方指南速览", "url": "https://thethaiger.com/travel/guides-travel/stranded-in-thailand-songkran-what-to-do", "date": "2026-04-17T08:25:57+00:00", "desc_original": "Stranded in Thailand after Songkran? Here is what to do Legacy Songkran is one of the biggest travel periods in Thailand, and when it ends, millions of people try to leave at the same time. In 2026, that pressure has combined with a series of disruptions... leaving a significant number of tourists stranded in Thailand after Songkran with no clear exit.", "title_cn": "宋干节后滞留泰国（Stranded in Thailand）怎么办？官方指南速览", "summary_cn": "2026年宋干节（Songkran）结束后，由于离境人数激增及交通中断，大量游客滞留在泰国。官方提醒滞留游客，若签证即将过期，应尽快前往移民局（Immigration Bureau）申请延期或开具紧急证明。同时，建议关注苏凡纳布机场（Suvarnabhumi Airport）及各大航司的实时动态，避免因逾期逗留产生罚款甚至黑名单风险。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_songkran_stranded_2026", "status": "pending", "added_date": "2026-04-18", "time_sensitive": true, "expires_date": "2026-05-03"}, {"id": "8d0952e1ff33", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "油价持续上涨，泰航宣布减少5月航班", "url": "https://www.thaiheadlines.com/187149/", "date": "2026-04-17T08:08:09+00:00", "desc_original": "泰国头条新闻社讯 4月17日，泰国国际航空公司（简称“泰航”）宣布调整2026年5月的航班安排，减少国内、东盟、北亚、南亚及欧洲的飞行班次。泰航表示，此次调整的主要原因是燃油成本的持续上升，且5月非旅游旺季，旅客需求有所放缓。", "title_cn": "受油价上涨及淡季影响，泰航（Thai Airways）宣布减少5月多线航班", "summary_cn": "泰国国际航空公司（Thai Airways）4月17日宣布，由于全球燃油成本上升及5月进入旅游淡季，决定减少包括国内线及东盟、北亚、欧洲等国际航线的飞行班次。此举旨在优化运营成本。建议已购票或计划5月出行的旅客及时核对航班状态，预计涉及中国部分城市的航线也可能受到调整影响。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "thaiairways_flights_reduction_may_2026", "status": "pending", "added_date": "2026-04-18", "time_sensitive": true, "expires_date": "2026-05-03"}, {"id": "03e4dff99f4b", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Chinese man killed after falling under truck in Pattaya", "url": "https://thethaiger.com/news/pattaya/chinese-man-killed-after-falling-under-truck-in-pattaya", "date": "2026-04-17T07:58:24+00:00", "desc_original": "Chinese man killed after falling under truck in Pattaya Legacy A 48 year old Chinese man died in a Pattaya motorcycle accident yesterday, April 16, after losing control of his motorbike and being run over by a six-wheel water truck .", "title_cn": "芭提雅（Pattaya）致命车祸：一名48岁中国男子在雨林路段摔落被货车碾压入命", "summary_cn": "4月16日，一名48岁中国籍男子在芭提雅（Pattaya）驾驶摩托车时发生意外。该男子疑因失去控制摔倒在路面，不幸被后方驶来的一辆六轮洒水车直接碾过，当场身亡。事故具体原因仍在调查中。近期宋干节期间交通事故高发，提醒在泰中国公民务必注意行车安全，尤其在湿滑路面驾驶摩托车时需格外谨慎。", "importance": "P1", "section_hint": "pattaya", "location_detail": "芭提雅", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "pattaya_chinese_road_casualty_2026_04", "status": "pending", "added_date": "2026-04-18", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "61dc56a68ff0", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "超30万人参与，泰国“超级宋干节”吸金4.48余亿", "url": "https://www.thaiheadlines.com/187131/", "date": "2026-04-17T07:50:04+00:00", "desc_original": "泰国头条新闻社讯 4月17日，泰国国家旅游局透露，4月11日至15日在曼谷班嘉琦缇公园举行的2026年“超级宋干节”吸引了全球300,878人参与，创造经济循环超过4.48亿泰铢。", "title_cn": "曼谷“超级宋干节”收官：吸纳30万游客，经济效益破4.48亿铢", "summary_cn": "泰国国家旅游局（TAT）通报，4月11至15日在曼谷班嘉琦缇公园（Benjakitti Park）举办的2026年“超级宋干节”取得巨大圆满。共有300,878名中外游客参与活动，带动了超过4.48亿泰铢的经济收入。这一数据凸显了泰国软实力输出的成功，也标志着后疫情时代旅游业的强劲复苏。", "importance": "P2", "section_hint": "bangkok", "location_detail": "班嘉琦缇公园", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "bangkok_songkran_economy_2026_04", "status": "pending", "added_date": "2026-04-18", "time_sensitive": false, "expires_date": "2026-05-18"}, {"id": "b7e7517df248", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Yala boy with special needs found dead in scrapyard car after four-day search", "url": "https://thethaiger.com/news/south/missing-boy-found-dead-in-scrap-car-in-yala-four-days-after-his-disappearance", "date": "2026-04-17T07:32:53+00:00", "desc_original": "Yala boy with special needs found dead in scrapyard car after four-day search Legacy A 12 year old Thai boy with special needs was found dead in a scrap car about 800 metres away, four days after he went missing from his home in Yala province.", "title_cn": "也拉府（Yala）失踪4天特教男童惊现废车场身亡", "summary_cn": "泰国南部也拉府（Yala）发生悲剧，一名12岁的患有特殊教育需求的男孩在失踪4天后，被发现死于离家约800米的一处废旧车场。警方初步判断男孩可能误入废车内无法脱困导致窒息或因高温脱水身亡，现场未发现明显的受袭痕迹。此事引发了社会对特殊需求群体居家看护安全问题的广泛讨论。", "importance": "P2", "section_hint": "thailand", "location_detail": "也拉府", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.95, "tags": [], "origin": "rss" Hua Hin）海边溺水不幸身亡", "url": "https://thethaiger.com/news/national/british-pensioner-swept-out-to-sea-hua-hin", "date": "2026-04-17T05:56:01+00:00", "desc": "British pensioner dies after being swept out to sea in Hua Hin Legacy A British pensioner from Liverpool died after being swept out to sea in Hua Hin, Prachuap Khiri Khan, on April 15.", "desc_original": "British pensioner dies after being swept out to sea in Hua Hin Legacy A British pensioner from Liverpool died after being swept out to sea in Hua Hin, Prachuap Khiri Khan, on April 15.", "summary_cn": "4月15日，一名来自利物浦的英国籍退休老人，在班武里府（Prachuap Khiri Khan）著名的旅游目的地华欣（Hua Hin）游玩时被海浪卷走，不幸遇难。此悲剧再次提醒游客在节日海滩高峰期需警惕水域安全。目前相关部门正协助处理善后事宜。", "importance": "P2", "section_hint": "thailand", "location_detail": "华欣 Hua Hin", "city_tag": "#华欣", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-18", "event_id": "hua_hin_british_tourist_death_2026", "time_sensitive": false, "expires_date": "2026-05-18", "title_cn": "一名英国籍游客在华欣（Hua Hin）海边溺水不幸身亡"}, {"id": "006fc68cd893", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "U-Tapao plan eyes 3m travellers a year", "url": "https://www.bangkokpost.com/thailand/general/3238449/utapao-plan-eyes-3m-travellers-a-year", "date": "2026-04-17T05:55:00+07:00", "desc_original": "The launch of the U-Tapao Airport and Eastern Airport City (EECa) development plan aims to transform U-Tapao into a new aviation hub capable of handling three million passengers annually.", "title_cn": "乌塔堡（U-Tapao）机场城市计划启动，目标年客流量300万", "summary_cn": "乌塔堡（U-Tapao）机场及东方航空城（EECa）开发计划正式启动，该项目是东部经济走廊（EEC）的核心环节。目标是将罗勇府（Rayong）的乌塔堡机场改建为具备年处理300万人次能力的现代化航空枢纽。这一举措预计将极大刺激周边房产和商业开发，提升芭提雅（Pattaya）及泰东部地区的国际联通性与区域经济价值。", "importance": "P2", "section_hint": "property", "location_detail": "罗勇府乌塔堡机场", "city_tag": "#芭提雅", "topic_tag": "#房产", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_utapao_airport_expansion_2026", "status": "pending", "time_sensitive": false, "expires_date": "2026-05-17", "added_date": "2026-04-17"}, {"id": "7614101004ee", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Drugs link to rising youth mental illness", "url": "https://www.bangkokpost.com/thailand/general/3238444/drugs-link-to-rising-youth-mental-illness", "date": "2026-04-17T05:50:00+07:00", "desc_original": "Methamphetamine, cannabis and kratom remain key drivers of drug abuse among youth, with mental health complaints linked to drug use rising to 77.44%, according to research released this week.", "title_cn": "泰国调查显示毒品与青少年精神疾病激增密切相关", "summary_cn": "本周发布的一项研究报告显示，冰毒、大麻（Cannabis）和卡痛（Kratom）仍是泰国青少年滥用药物的主要类型。报告指出，青少年中与毒品直接相关的精神健康投诉比例已飙升至77.44%。这一数据引发了社会对大麻合法化后续管理及精神卫生资源匮乏的广泛担忧，预计将推动政府在青少年禁毒管控方面采取更严格的干预策略。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_youth_drug_mental_health_issue_2026", "status": "pending", "time_sensitive": false, "expires_date": "2026-05-17", "added_date": "2026-04-17"}, {"id": "072b7cfbc1d0", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "泰国总理阿努廷：东部边境口岸暂不开放", "title_cn": "泰国总理表示：东部边境口岸（Trat、Chanthaburi）暂不开放", "summary_cn": "泰国内政部长兼副总理阿努廷（Anutin Charnvirakul）明确表示，位于达叻府（Trat）及尖竹汶府（Chanthaburi）的边境口岸将继续关闭。目前政府尚未安排任何外交谈判，亦没有制定重新开放的时间表。这一决定主要基于国家安全和边境管理考量，对往返柬埔寨的贸易及边民往来将产生持续影响。", "desc_original": "Border crossings in Trat and Chanthaburi will remain closed, with no diplomatic talks or timeline set for reopening, says Prime Minister Anutin Charnvirakul.", "url": "https://www.bangkokpost.com/thailand/general/3238204/eastern-border-crossings-to-stay-shut-for-now-pm", "date": "2026-04-17T05:46:00+07:00", "importance": "P2", "section_hint": "thailand", "location_detail": "Trat, Chanthaburi", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.95, "tags": [], "origin": "rss", "event_id": "thailand_eastern_border_closure_2026", "status": "pending", "time_sensitive": true, "added_date": "2026-04-17", "expires_date": "2026-05-02"}, {"id": "38f6583e178d", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Huge turnout battles rash of wildfires", "title_cn": "泰国北方及西方山火肆虐，2.5万名消防及军方人员参与扑救", "summary_cn": "泰北及西部地区山火灾情持续恶化，全境共监测到2,165个热点（hotspots）。泰国政府已紧急调集由官员、士兵及消防员组成的2.5万人大军。扑救工作目前已升级至海陆空协同作业，通过航空洒水与地面灭火结合的方式阻断火势蔓延，旨在应对日益严峻的空气污染及森林资源损毁风险。", "desc_original": "Wildfires intensified across northern and western Thailand, with 2,165 hotspots detected, as officials and an army of 25,000 fire-fighters escalated aerial and ground operations to contain spreading blazes.", "url": "https://www.bangkokpost.com/thailand/general/3238364/huge-turnout-battles-rash-of-wildfires", "date": "2026-04-17T05:37:00+07:00", "importance": "P2", "section_hint": "thailand", "location_detail": "Northern and Western Thailand", "city_tag": "#清迈", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_wildfires_crisis_2026_04", "status": "pending", "time_sensitive": true, "added_date": "2026-04-17", "expires_date": "2026-05-02"}, {"id": "cd805132a80d", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Fuel crisis upends state's fiscal plans", "title_cn": "能源价格危机冲击泰国财政计划，或将通过提高增值税（VAT）增收", "summary_cn": "泰国财政部警告，能源危机正挑战国家财政底线。政府原计划将财政赤字控制在GDP的3%以内，并维持公共债务低于GDP的70%。然而燃油补贴压力巨大，官方正在考虑通过提高增值税（VAT）等手段增加营收。对于在泰居住者而言，这预示着未来中短期内生活成本及税务负担可能进一步增加。", "desc_original": "The energy crisis may pose a challenge for the government in pursuing its fiscal plan, which aims to reduce the fiscal deficit to no more than 3% of GDP, increase revenue through a higher value-added tax (VAT), and keep public debt below 70% of GDP, according to the Finance Ministry.", "url": "https://www.bangkokpost.com/business/general/3238504/fuel-crisis-upends-states-fiscal-plans", "date": "2026-04-17T05:30:00+07:00", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_fiscal_crisis_vat_2026", "status": "pending", "time_sensitive": false, "added_date": "2026-04-17", "expires_date": "2026-05-17"}, {"id": "80c5cdcba99d", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "New push to keep fares low", "title_cn": "泰国政府拨付20.6亿泰铢补贴交通业，旨在遏制交通费上涨", "summary_cn": "为缓解燃油价格上涨引发的连锁反应，泰国政府已批准一项价值20.6亿泰铢的交通部门扶持计划。该资金将用于补贴公共运输系统，稳定出租车、公交等交通费率，防止运价大幅上涨进一步推高家庭生活成本。该政策直接惠及依靠公共交通出行的在泰民众及职场人士。", "desc_original": "The government has approved a 2.06 billion baht support package for the transport sector, aiming to cushion the impact of rising fuel prices, stabilise fares and ease pressure on household living costs.", "url": "https://www.bangkokpost.com/thailand/general/3238144/new-push-to-keep-fares-low", "date": "2026-04-17T05:25:00+07:00", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_transport_fare_subsidy_2026", "status": "pending", "time_sensitive": true, "added_date": "2026-04-17", "expires_date": "2026-05-02"}, {"id": "ffd63c0d0b11", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Calls mount for energy pricing rejig", "title_cn": "民间组织呼吁能源部改革燃油定价，并开放家庭房顶太阳能", "summary_cn": "泰国多家民间团体系近日向能源部长阿卡纳（Akanat Promphan）递交呈请。主要诉求包括三方面：一是重整能源定价结构，二是立法回收炼油厂的超额利润，三是放宽对家庭房顶太阳能板安装的限制。这些提议旨在促进能源自由化，降低民众电费和油费负担，反映出泰国社会对长期高昂能源价格的不满。", "desc_original": "A coalition of civic groups has called on Energy Minister Akanat Promphan to reform the energy pricing structure, enact laws to reclaim excess refinery profits, and liberalise rooftop solar installation for households.", "url": "https://www.bangkokpost.com/thailand/general/3238164/calls-mount-for-energy-pricing-rejig", "date": "2026-04-17T05:17:00+07:00", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.95, "tags": [], "origin": "rss", "event_id": "thailand_energy_price_reform_call_2026", "status": "pending", "time_sensitive": false, "added_date": "2026-04-17", "expires_date": "2026-05-17"}, {"id": "b90460889d7a", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国计委上调公共工程建设柴油参考价上限至69.99泰铢", "url": "https://www.bangkokpost.com/business/general/3238484/agency-raises-diesel-price-ceiling-in-cost-formula", "date": "2026-04-17T05:08:00+07:00", "desc_original": "The Comptroller General's Department has raised the diesel price ceiling used in calculating reference prices for public construction projects to no more than 69.99 baht per litre, in order to reflect the rising costs of government construction works resulting from the war in the Middle East.", "summary_cn": "泰国审计署（Comptroller General's Department）宣布上调公共建设工程参考价格计算公式中的柴油上限，调整至每升最高69.99泰铢。此举旨在应对中东冲突引发的能源价格波动，反映政府工程项目面临的实际建设成本上升。该调整将直接影响未来政府招标项目的成本核算及承包商的预算空间。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "status": "pending", "event_id": "thailand_diesel_price_ceiling_2026", "time_sensitive": true, "expires_date": "2026-05-02", "added_date": "2026-04-17", "origin": "rss", "title_cn": "泰国计委上调公共工程建设柴油参考价上限至69.99泰铢"}, {"id": "af031ca13e3b", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国能源部考虑搁置1500亿铢燃油贷款计划", "url": "https://www.bangkokpost.com/business/general/3238214/ministry-mulls-shelving-fuel-loan", "date": "2026-04-17T05:04:00+07:00", "desc_original": "The Energy Ministry is weighing whether to abandon plans to borrow 150 billion baht to support the fast-depleting Oil Fuel Fund, following a breakthrough in negotiations with oil refineries to lower diese st celebrated season, Songkran just swept through &mdash; ushering in the Thai New Year with its signature water-soaked celebration. Tapping into that spirit, Nike drops a festive take on the Nike SB Dunk Low with the &ldquo;Songkran&rdquo; iteration.", "title_cn": "耐克推庆泰新春 宋干节（Songkran）版 Nike SB Dunk 泼水节特别款亮相", "summary_cn": "随着泰国最盛大传统节日宋干节（Songkran，即泼水节）的到来，耐克（Nike）巧妙借势推出了 SB Dunk Low 的特别版。该款鞋履以“宋干节”为设计核心，将泰国新年的庆祝精神与街头运动文化融合，旨在致敬独特的泼水文化。对于在泰的潮流收藏者和游客而言，这款极具节日氛围的单品具有较高的纪念收藏价值。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.8, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_nike_songkran_edition_2026", "time_sensitive": true, "added_date": "2026-04-17", "expires_date": "2026-05-02"}, {"id": "4753777391cb", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "曼谷餐饮业动向：全城值得关注的新餐厅与酒吧推荐", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3238050/new-taste-tinglers-for-your-palate", "date": "2026-04-16T18:07:00+07:00", "desc_original": "Bangkok is a city that never sleeps, at least in the food and beverage department. Blink and you&rsquo;ll miss another new restaurant opening, a drink launch, or a new nightclub. Guru By Bangkok Post is making sure that even if you blink, you don&rsquo;t miss out on the new taste tinglers that are worth mentioning, in Bangkok and beyond.", "title_cn": "曼谷餐饮业动向：全城值得关注的新餐厅（Restaurant）与酒吧推荐", "summary_cn": "曼谷素来有“不夜城”之称，其餐饮与酒水行业更是推陈出新。近期，多家新餐厅、酒品发布会及夜店在全城涌现。本次生活指南总结了曼谷及周边地区最值得关注的新兴餐饮热点，为常驻居民及游客提供了最新的社交与消遣地图，是寻找新口味探店的首选参考。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "event_id": "bangkok_new_dining_lifestyle_2026", "time_sensitive": false, "added_date": "2026-04-17", "expires_date": "2026-05-17"}, {"id": "599dea897748", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "逃离钢筋水泥：曼谷人赴港旅游的新视角", "url": "https://www.bangkokpost.com/life/travel/3238035/beyond-the-ordinary", "date": "2026-04-16T15:35:00+07:00", "desc_original": "Hong Kong is always a good escape from Bangkok. Though it may be another concrete jungle escape, there are plenty of sea views and greenery to feel like an escape.&nbsp;", "title_cn": "逃离钢筋水泥：曼谷（Bangkok）人赴港旅游的新视角", "summary_cn": "对于常年居住在曼谷（Bangkok）的人来说，香港（Hong Kong）是一个极佳的短期旅游目的地。尽管香港本身也是著名的“水泥森林”，但其丰富的海景资源和隐藏的绿地公园为游客提供了不同于曼谷都市感的休憩空间。本文探讨了如何在香港快节奏的生活缝隙中寻找大自然，是旅泰外籍人士跨国度假的一个选择。", "importance": "P3", "section_hint": "thailand", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.5, "tags": [], "origin": "rss", "status": "pending", "event_id": "thai_traveller_hongkong_guide_2026", "time_sensitive": false, "added_date": "2026-04-17", "expires_date": "2026-05-17"}, {"id": "a86e36b71db4", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "Agoda报告：泰国Z世代更青睐“短促密集型”旅行方式", "url": "https://www.bangkokpost.com/life/travel/3238009/thai-gen-z-travellers-prefer-short-frequent-trips", "date": "2026-04-16T15:23:00+07:00", "desc_original": "Thai Gen Z travellers are reshaping travel habits in 2026 by favouring short but frequent trips over traditional long holidays, with mental well-being and value for money emerging as top priorities, according to the online booking platform Agoda.", "title_cn": "Agoda报告：泰国 Z 世代更青睐“短促密集型”旅行方式", "summary_cn": "在线预订平台 Agoda 的最新数据显示，2026年泰国 Z 世代（Gen Z）正在改变旅游市场格局。相比传统的长假，他们更偏好天数短但频率高的短途旅行。这一倾向主要源于对心理健康的高度关注及对性价比的追求。这种趋势预示着泰国国内旅游业需针对灵活型、碎片化的行程提供更具针对性的服务方案。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "thai_genz_travel_trends_2026", "time_sensitive": false, "added_date": "2026-04-17", "expires_date": "2026-05-17"}, {"id": "18b62981acbf", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "本周泰国上映：七部新片丰富假期后娱乐生活", "url": "https://www.bangkokpost.com/life/arts-and-entertainment/3238000/new-movies-out-this-week-april-1622", "date": "2026-04-16T14:34:00+07:00", "desc_original": "Seven new releases that hit cinemas in Thailand this week.", "title_cn": "本周泰国上映：七部新片丰富假期（April 16-22）后娱乐生活", "summary_cn": "本周（4月16日至22日），共有七部新电影在泰国各地的电影院正式上映，涵盖了国内外多种题材。作为宋干节假期后的首波娱乐供应，这些影片为民众提供了丰富的休闲选择。对于在泰居住者而言，是了解本地院线实时动态和寻找周末娱乐活动的重要信息参考。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_new_movies_2026_04", "time_sensitive": true, "added_date": "2026-04-17", "expires_date": "2026-05-02"}, {"id": "0e1f76435b04", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "囤油等涨价？泰国警方突袭多府油库，多家公司被查", "url": "https://www.thaiheadlines.com/187119/", "date": "2026-04-16T10:43:53+00:00", "desc_original": "泰国头条新闻社讯 4月16日，泰国司法部联合多部门召开发布会，披露警方调查发现：部分油库涉嫌人为控油、延迟出货，只为等涨价。全国已查获多起非法囤油、走私及违规售油案件，6家公司被要求作出解释。", "title_cn": "囤油等涨价？泰国警方突袭多府油库，多家公司涉嫌违规被查", "summary_cn": "泰国司法部近期联合多部门执法，针对全国范围内非法囤积燃油的行为展开严厉打击。调查发现部分油库公司涉嫌人为控制库存、延迟出货，意图在油价上涨后牟取暴利。目前警方已在多个府份查获多起非法走私及违规售油案件，共有6家相关公司被要求在限期内就囤积行为作出解释。此举旨在稳定国内物价，抑制通胀压力。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-02", "origin": "rss", "event_id": "thailand_fuel_hoarding_crackdown_2026", "status": "pending", "added_date": "2026-04-17"}, {"id": "849914f6d0f2", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "近500万人涌入！2026曼谷宋干节人数翻倍暴增", "url": "https://www.thaiheadlines.com/187111/", "date": "2026-04-16T10:41:49+00:00", "desc_original": "泰国头条新闻社讯 4月16日，曼谷市政府发言人阿瓦伦透露，官方已公布2026年曼谷宋干节（4月10日至15日）整体活动统计数据，并与2025年同期进行对比。", "title_cn": "近500万人涌入！2026曼谷（Bangkok）宋干节参与人数较去年翻倍暴增", "summary_cn": "曼谷（Bangkok）市政府发言人阿瓦伦（Avarun）公布2026年宋干节统计数据，4月10日至15日期间，参与泼水节庆祝活动的人数接近500万，较2025年同期呈现翻倍增长。数据反映出曼谷作为全球庆典目的地的吸引力持续提升，也为曼谷市内的零售、餐饮及酒店业带来了巨大的消费提振。目前官方正对交通秩序与消费影响进行深度评估。", "importance": "P2", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-17", "origin": "rss", "event_id": "bangkok_songkran_stats_2026", "status": "pending", "added_date": "2026-04-17"}, {"id": "0c54e89bb053", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "What does it cost to raise a family in Thailand?", "url": "https://thethaiger.com/guides/thailand-cost-for-expat-families", "date": "2026-04-16T10:37:17+00:00", "desc_original": "What does it cost to raise a family in Thailand? Legacy Thailand regularly ranks among the top destinations for expat families, but cost estimates online tend to assume you are moving as a single person or a couple.", "title_cn": "在泰国抚养家庭成本几何？外籍家庭生活开销调研", "summary_cn": "虽然泰国（Thailand）常被列为外籍人士移居的首选地，但网络上的生活成本估算往往基于单身或配偶两人，忽略了抚养子女的家庭支出。调研指出，外籍家庭在泰的成本主要包括私立/国际学校学费、符合国际标准的医疗保险、以及适合家庭居住的大户型房产。对于考虑移居泰国的家庭，本指南提供了包括日常育儿、课外活动及家佣费用在内的详细开支预估。", "importance": "P1", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-17", "origin": "rss", "event_id": "thailand_living_cost_guide_family_2026", "status": "pending", "added_date": "2026-04-17"}, {"id": "725ccda0b550", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Songkran finished but Pattaya is still going — Here is the full Wan Lai 2026 schedule", "url": "https://thethaiger.com/travel/pattaya-travel/pattaya-wan-lai-songkran-2026", "date": "2026-04-16T10:15:31+00:00", "desc_original": "Songkran finished but Pattaya is still going — Here is the full Wan Lai 2026 schedule Legacy Songkran in Pattaya runs longer than anywhere else in Thailand.", "title_cn": "宋干节虽过庆祝不停：2026芭提雅“万莱节”（Wan Lai）狂欢日程公布", "summary_cn": "虽然泰国其他地区的宋干节已正式收官，但芭提雅（Pattaya）传统的“万莱节”（Wan Lai，又称佛日节或加长版泼水节）才正要进入高潮。对比全国其他地方，芭提雅的泼水庆祝活动时效更长，通常在4月19日迎来规模最大的封街泼水。本条目整理了最新的庆祝日程及预计受影响的交通路段，提醒在该地区的游客注意出行安排与防水防范。", "importance": "P3", "section_hint": "pattaya", "location_detail": "芭提雅", "city_tag": "#芭提雅", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-02", "origin": "rss", "event_id": "pattaya_wan_lai_schedule_2026", "status": "pending", "added_date": "2026-04-17"}, {"id": "a4e374b4a411", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Chinese woman stages her own kidnapping to extort money from father", "url": "https://thethaiger.com/news/central-thailand/chinese-woman-stages-kidnapping-to-extort-money-from-father", "date": "2026-04-16T09:58:09+00:00", "desc_original": "Thai police arrested four Chinese nationals in Samut Prakan after a Chinese woman staged her own kidnapping with her boyfriend and two other men to extort money from her father.", "title_cn": "女留学生自导自演“绑架案”敲诈亲父，泰国北榄府（Samut Prakan）四名中国籍男女落网", "summary_cn": "泰国警方在北榄府（Samut Prakan）逮捕了四名涉嫌敲诈勒索的中国籍公民。调查发现，一名在泰中国女子为了向身在国内的父亲索要钱财，伙同其男友及另外两名中国男子，精心策划并拍摄了其被“绑架”勒索的虚假视频与照片。目前四名涉案人员已全部被警方控制，警方正依据泰国民刑法典中关于敲诈及虚假报案等相关条款进行起诉，此案反映了针对在泰中国公民犯罪的多样化趋势。", "importance": "P1", "section_hint": "cn_thai", "location_detail": "北榄府", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-17", "origin": "rss", "event_id": "samut_prakan_staged_kidnapping_2026", "status": "pending", "added_date": "2026-04-17"}, {"id": "67f31ab32d4d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "外国游客吐槽“泰国是个骗局”，反转结局让泰国网友笑疯", "url": "https://www.thaiheadlines.com/187107/", "date": "2026-04-16T09:51:26+00:00", "desc_original": "泰国头条新闻社讯 近日，一段标题为“Thailand is a scam（泰国是个骗局）”的视频在社交平台上意外爆红，迅速引发全球网友关注。", "title_cn": "外国游客录视频吐槽“泰国是个骗局”，反转结局引发泰国网友热议", "summary_cn": "近日一段名为“泰国是个骗局”的视频在社交媒体走红。视频起初看似是在抱怨泰国，但随后画风突变，展示了外国游客在泰国享受的美食、美景和热情的待客之道，表达了对泰国的喜爱。这种“正话反说”的营销或自发创作在网络引发热议，泰国网友纷纷留言互赞，认为这种形式对泰国旅游推广起到了意想不到的积极效果。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "thailand_scam_video_viral_2026", "status": "pending", "added_date": "2026-04-17", "time_sensitive": false, "expires_date": "2026-05-17"}, {"id": "4f7de0f02893", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国商业部拟调整架构应对能源与成本上行压力", "url": "https://www.thaiheadlines.com/187104/", "date": "2026-04-16T09:49:50+00:00", "desc_original": "泰国头条新闻社讯 据泰媒报道，4月16日，泰国副总理兼商业部部长素帕琪表示，将加快对商业部工作架构进行大幅调整，以应对正在冲击泰国经济的双重危机。", "title_cn": "泰国商业部拟调整架构应对能源危机与生活成本上涨压力", "summary_cn": "4月16日，泰国副总理兼商业部部长素帕琪（Suphakit）宣布将大幅调整商业部内部工作架构。此举旨在应对当前泰国经济面临的能源价格飙升和生产成本上涨双重挑战。官方计划通过优化职能配置，更精准地调控物价，减轻民众负担。这是泰国政府在经济波动期下提升执行力、维持市场稳定的重要策略调整。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_commerce_dept_restructuring_2026", "status": "pending", "added_date": "2026-04-17", "time_sensitive": true, "expires_date": "2026-05-02"}, {"id": "a0397f8fb1a4", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Japan pledges US$10 billion to tackle energy crisis in Asia", "url": "https://thethaiger.com/news/business/japan-offers-funding-to-help-addressing-energy-crisis-in-asia", "date": "2026-04-16T09:39:01+00:00", "desc_original": "Japan pledged US$10 billion to support Asian countries in addressing the energy crisis, citing the close links and interdependence created by supply chains.", "title_cn": "日本承诺拨付100亿美元援助亚洲各国应对能源危机", "summary_cn": "日本政府承诺将拨付100亿美元资金（约合3600亿泰铢），用于支持亚洲国家应对能源危机。日方强调，由于供应链的高度互依，亚洲地区的能源稳定对包括日本在内的整体经贸至关重要。此举预计将通过技术输出、能源转型基建贷款等方式落地。对泰国等高度依赖工业和制造业的东南亚国家而言，该援助项目可能带来能源转型的资金支持。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.5, "tags": [], "origin": "rss", "event_id": "japan_asia_energy_aid_2026", "status": "pending", "added_date": "2026-04-17", "time_sensitive": false, "expires_date": "2026-05-17"}, {"id": "c567e0695be2", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "宋干节期间156起交通事故 泰方严控返程客运零酒精", "url": "https://www.thaiheadlines.com/187101/", "date": "2026-04-16T09:27:04+00:00", "desc_original": "4月16日，泰国防灾减灾厅（DDPM）道路安全指挥中心通报宋干节期间道路事故统计。15日当天事故156起，23人死亡。", "title_cn": "宋干节车祸统计公布：15日共156起事故，返程客运严格执行“零酒精”", "summary_cn": "泰国防灾减灾厅（DDPM）通报，4月15日宋干节期间，全国共发生156起道路交通事故，造成23人死亡、159人受伤。随着节后返程高峰开启，交通部门重点加强客运车辆司机的酒精监测，实行“零酒精”政策以确保旅客安全。提醒在泰华人及游客，返程期间车流量巨大，务必选择合规交通工具，注意行车安全。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_songkran_road_accident_2026", "status": "pending", "added_date": "2026-04-17", "time_sensitive": true, "expires_date": "2026-05-02"}, {"id": "ff22bf2f345b", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "通胀忧虑打击投资者信心", "title_cn": "通胀忧虑重挫投资者信心，泰开泰资管 KAsset 警告债券违约风险", "url": "https://www.bangkokpost.com/business/investment/3237715/inflation-fears-batter-investor-confidence", "date": "2026-04-16T07:33:00+07:00", "desc_original": "Inflationary pressures and a potential rise in interest rates, both in Thailand and the US, are directly weighing on bond valuations and investor sentiment, leading to a higher possibility of payment default, Kasikorn Asset Management (KAsset) has warned.", "summary_cn": "开泰资产管理公司（Kasikorn Asset Management，简称 KAsset）警告称，由于泰美两国均面临通胀压力及潜在的加息预期，债券估值和投资者情绪正遭受直接冲击。这种经济波动增加了债务违约的可能性。对于在泰投资者而言，需高度关注利率变动对金融资产价格的负面影响，审慎评估当前债券市场的投资风险。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.85, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "thailand_inflation_bond_risk_2026", "time_sensitive": false, "expires_date": "2026-05-16"}, {"id": "480b23ed2c79", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "NBTC charts new telecom growth path", "title_cn": "国家广播电视和通信委员会 NBTC 勾勒泰国电信业增长新路线图", "url": "https://www.bangkokpost.com/business/general/3237770/nbtc-charts-new-telecom-growth-path", "date": "2026-04-16T07:28:00+07:00", "desc_original": "Thailand's telecom sector is entering a new growth cycle, driven by data, artificial intelligence (AI) and infrastructure investment.", "summary_cn": "泰国国家广播电视和通信委员会（NBTC）表示，泰国的电信行业正迈入全新的增长周期。这一轮增长主要受数据需求飙升、人工智能（AI）落地以及大规模基础设施投资的推动。政府计划通过强化电信基建，支持数字化经济转型，为在泰科技企业和相关产业提供更为强韧的底层技术支持。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "thailand_nbtc_telecom_growth_2026", "time_sensitive": false, "expires_date": "2026-05-16"}, {"id": "e6f116b112b8", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "Gloomy outlook for Michelin-listed eateries", "title_cn": "米其林榜单餐厅前景黯淡，能源成本激增打击餐饮业", "url": "https://www.bangkokpost.com/business/general/3237720/gloomy-outlook-for-michelinlisted-eateries", "date": "2026-04-16T07:24:00+07:00", "desc_original": "Michelin-listed restaurant operators expect a gloomy outlook for the dining business this year, hampered by sluggish spending and surging energy costs.", "summary_cn": "泰国米其林指南榜单上的餐厅运营商表示，受制于民众消费意愿疲软和能源成本猛增，今年高端及精品餐饮行业的展望不容乐观。尽管旅游业在复苏，但本地运营成本的压力已显著削弱了利润。该行业动态对关注生活成本及在泰投资服务业的人士具有参考价值，反映出当前宏观经济下的消费降级风险。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.8, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "thailand_michelin_restaurant_economy_2026", "time_sensitive": false, "expires_date": "2026-05-16"}, {"id": "083bab2ab37f", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "4 Pattaya taxi riders and bar guards arrested for attacking 2 foreigners", "url": "https://thethaiger.com/news/pattaya/4-thai-men-attack-2-foreigners-during-pattaya-songkran-festival", "date": "2026-04-16T07:12:50+00:00", "desc_original": "Four Thai men, including motorcycle taxi riders and bar security guards, were arrested after a viral video showed them attacking two foreigners during Songkran celebrations in Pattaya.", "title_cn": "芭提雅（Pattaya）4名摩的司机及酒吧安保因在宋干节期间围殴外籍游客被捕", "summary_cn": "在一段关于宋干节庆祝活动的视频走红网络后，芭提雅（Pattaya）警方迅速采取行动。视频显示，包括摩托车出租车司机及酒吧保镖在内的4名泰国男子在路边围殴两名外籍游客。目前涉案人员已全部归案，面临刑事指控。此事件在泼水节期间造成恶劣社会影响，芭提雅当局正审察旅游及夜间娱乐场所的安保规范，以维护城市形象。", "importance": "P1", "section_hint": "pattaya", "location_detail": "芭提雅", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "pattaya_tourist_assault_2026", "status": "pending", "added_date": "2026-04-17", "time_sensitive": false, "expires_date": "2026-05-17"}, {"id": "fc5ef5910d51", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "FTI warns of semiconductor shortage", "title_cn": "泰国工业联合会 FTI 警告半导体短缺风险日益剧增", "url": "https://www.bangkokpost.com/business/general/3237740/fti-warns-of-semiconductor-shortage", "date": "2026-04-16T07:12:00+07:00", "desc_original": "Semiconductors are becoming increasingly scarce as booming demand from artificial intelligence (AI), data centres and cloud services reshapes the global market, according to Supant Mongkolsuthree, honorary chairman of the Federation of Thai Industries.", "summary_cn": "泰国工业联合会（Federation of Thai Industries，简称 FTI）名誉主席 Supant 警告，随着人工智能（AI）、数据中心和云服务对算力需求的爆炸式增长，全球半导体供应正变得日益匮乏。这一结构性短缺正在重塑市场，泰国作为全球供应链的重要一环，其电子与汽车等支柱型制造业可能面临生产延迟与成本上涨的严峻挑战。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.8, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "thailand_fti_semiconductor_crisis_2026", "time_sensitive": false, "expires_date": "2026-05-16"}, {"id": "2c4d54b6fac6", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "House sales to fall as war hits demand", "title_cn": "地缘局势冲击需求，2026年泰国住房销量料将连跌四年至新低", "url": "https://www.bangkokpost.com/property/3237755/house-sales-to-fall-as-war-hits-demand", "date": "2026-04-16T07:06:00+07:00", "desc_original": "The residential market is expected to contract for a fourth consecutive year in 2026, with nationwide transfers projected to fall by 5.1% year-on-year to around 300,000 units, the lowest level in years, reflecting fragile buying activity, according to Kasikorn Research Center.", "summary_cn": "开泰研究中心（Kasikorn Research Center）预测，2026年泰国住房市场将录得连续第四年萎缩。全泰房产过户量预计同比下降5.1%，降至约30万套，处于多年来的最低点。这反映出受国际地缘冲突和国内经济疲软嵌套影响，购房需求极度脆弱。对于在泰华人购房者或房产投资者而言，这预示着短期内市场情绪依然低迷，价格增长动力不足。", "importance": "P1", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#房产", "relevance_score": 0.95, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "thailand_property_market_slump_2026", "time_sensitive": false, "expires_date": "2026-05-16"}, {"id": "79425f9ba639", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "自导自演绑架案！4名中国公民在北榄府（Samut Prakan）被捕", "url": "https://www.thaiheadlines.com/187084/", "date": "2026-04-16T06:58:14+00:00", "desc_original": "泰国头条新闻社讯 一起引发中泰警方高度关注的“跨国绑架案”近日真相大白。一名19岁中国女子的父亲在支付逾11万元人民币赎金后，女儿仍未获释，遂向中国警方报案。泰国中央调查局接获中方协查请求后展开跨境调查，最终在北榄府一处出租屋内找到该女子，并逮捕4名中国籍涉案人员。令人震惊的是，这起所谓的绑架勒索案，竟是受害人自导自演、伙同他人共同欺骗其父亲的骗局。", "summary_cn": "一名19岁中国籍女子在泰国北榄府（Samut Prakan）策划了一场“假绑架”骗局。其父在支付11万元人民 rat Thani）普利安县（Phum Riang），79岁的传承人 Wanma Nuimeem 仍坚持手工织造。她是极少数掌握“Ratchawat Khom”特种织绸技艺的工匠，这种精美的丝调花纹曾受王室青睐，但如今濒临失传。联合国教科文组织（UNESCO）可能介入提供保护支持。这对提升南部文化旅游吸引力、保护泰国文化遗产具有深远意义。", "importance": "P3", "section_hint": "thailand", "location_detail": "Phum Riang, Surat Thani", "city_tag": "#素叻他尼", "topic_tag": "#旅居", "relevance_score": 0.95, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_unesco_southern_craft_2026", "time_sensitive": false, "expires_date": "2026-05-16", "added_date": "2026-04-16", "title_cn": "非遗保护：联合国教科文组织 UNESCO 或将助力挽救泰国南部传统手工艺"}, {"id": "68e6040da453", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "普吉岛（Phuket）警方逮捕一名涂鸦宗教场所的葡萄牙游客", "url": "https://www.bangkokpost.com/thailand/general/3237804/phuket-arrests-tourist-for-graffiti", "date": "2026-04-16T06:29:00+07:00", "desc": "PHUKET: Police have arrested a Portuguese tourist for spray painting a religious site, while seven French tourists were detained for disorderly Songkran water play.", "desc_original": "PHUKET: Police have arrested a Portuguese tourist for spray painting a religious site, while seven French tourists were detained for disorderly Songkran water play.", "summary_cn": "普吉岛警方通报，一名葡萄牙籍游客因在某宗教场所喷漆涂鸦被逮捕，面临当地严厉的刑事指控。此外，还有7名法国游客因在宋干节（Songkran）期间进行违规且扰乱秩序的泼水行为被扣留。提醒广大游客，宋干节期间必须尊重当地宗教习俗与庆祝法规，避免因不当行为触犯法律导致被驱逐或逮捕。", "importance": "P1", "section_hint": "thailand", "location_detail": "Phuket", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "phuket_tourist_arrest_songkran_2026", "time_sensitive": true, "expires_date": "2026-05-01", "added_date": "2026-04-16", "title_cn": "普吉岛（Phuket）警方逮捕一名涂鸦宗教场所的葡萄牙游客"}, {"id": "c9bc47898075", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "普吉岛（Phuket）宋干节暴力事件：2名法国男子因袭击泰国骑士被捕", "url": "https://thethaiger.com/news/phuket/2-frenchmen-arrested-for-assault-on-thai-motorcyclist-in-phuket-songkran-festival  "2026-04-16T03:15:11+00:00", "origin": "rss", "added_date": "2026-04-17"}, {"id": "9997b7501caf", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "2026年宋干节盛况空前：50万外游入境 考山路 (Khao San Road) 等地吸金300亿泰铢", "summary_cn": "2026年宋干节圆满落幕，在联合国教科文组织的文化背书下，泰国政府联合42个驻泰大使馆成功推广了这一“世界级泼水节”。美联社及新华社等多家国际媒体聚焦考山路 (Khao San Road) 的盛况。据泰国国家旅游局数据，4月11-15日期间，全国旅游总收入突破303.5亿泰铢，其中约50万名外国游客贡献了81亿泰铢。活动期间严格执行“十条安全规则”，有效保障了秩序。", "desc_original": "泰国头条新闻社讯 4月15日，据泰媒报道，泰国总理府办公室发言人拉差达表示，2026年宋干节整体活动呈现热烈、盛大氛围，展现了泰国宋干节作为联合国教科文组织登记的文化遗产所具备的国际影响力。她称，宋干节获得多国认可，并吸引全球民众参与，涵盖传统礼俗、文化活动与娱乐项目等多个层面。 她指出，今年共有42家驻泰外国大使馆参与合作，包括英国、瑞士、丹麦、德国、印度、比利时、中国、菲律宾、越南、澳大利亚和美国等，各大使馆共同制作宣传内容，以更现代、更易传播的方式呈现泰国文化特色，进一步触达全球受众。 同时，多家国际媒体机构，包括美联社、路透社、欧罗新闻和新华社，报道了多个重点区域的泼水活动氛围，尤其是考山路等地，游客十分密集。相关报道称，泰国宋干节是全球最盛大、最具色彩的节庆之一，体现了传统文化与当代生活方式的融合。北美媒体将宋干节描述为“世界级泼水节”，认为其对泰国经济与旅游业具有重要作用。 在安全管理方面，泰方称也获得外媒关注与肯定。例如《海峡时报》发布了“10条安全玩水规则”，包括禁止性骚扰、禁止未经同意抹粉、禁止使用高压水枪等，反映活动组织强调公众安全与秩序。 关于旅游 market 总体表现，泰国国家旅游局评估称，宋干节期间（2026年4月11日至15日）预计将带来全国旅游总收入超过303.5亿泰铢，其中入境外国游客约500000人，预计创造收入约81亿泰铢。政府发言人并表示，政府将持续推动", "importance": "P2", "section_hint": "thailand", "location_detail": "考山路 Khao San Road", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-02", "event_id": "thailand_songkran_festival_summary_2026", "status": "pending", "url": "https://www.thaiheadlines.com/187067/", "date": "2026-04-16T02:59:21+00:00", "origin": "rss", "added_date": "2026-04-17"}, {"id": "fbf237d0f5a5", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title_cn": "总理阿努廷（Anutin）关注中东局势，承诺重启“一人一半”补贴计划", "url": "https://www.bangkokpost.com/thailand/politics/3237384/pm-monitors-middle-east-tensions-pledges-khon-la-khrueng-rollout", "date": "2026-04-15T18:33:00+07:00", "desc_original": "Prime Minister Anutin Charnvirakul reiterated on Wednesday that the government is closely monitoring the tense situation in the Middle East while stressing the need for prudent energy management to ensure stability, despite Thailand facing no immediate fuel shortages.", "summary_cn": "泰国总理阿努廷（Anutin Charnvirakul）表示，政府正密切监控局势紧张的中东地区。尽管泰国目前并无燃油短缺风险，但他强调必须采取审慎的能源管理政策以确保国内能源稳定。同时，为减轻石油成本潜在上涨对国民生活的影响，政府承诺将重启广受欢迎的“一人一半”（Khon La Khrueng）消费补贴政策，以刺激经济并保障民生。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "anutin_middle_east_subsidy_policy_2026", "time_sensitive": true, "expires_date": "2026-05-01"}, {"id": "6ac26fd280ab", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title_cn": "泰国网红咖啡机“陶滨”（Tao Bin）遭遇山寨，越南出现抢注商标", "url": "https://www.bangkokpost.com/business/general/3237365/tao-bin-copycat-found-registering-trademark-in-vietnam", "date": "2026-04-15T16:49:00+07:00", "desc_original": "The Department of Intellectual Property (DIP) has flagged a Vietnamese trademark application that closely resembles Thai smart beverage vending machine brand Tao Bin.", "summary_cn": "泰国知识产权局（DIP）发布警示，监测到有人在越南申请注册一项与泰国智能自动售货饮料机知名品牌“陶滨”（Tao Bin）高度相似的商标。由于 Tao Bin 凭借其强大的调配功能在泰国及东南亚市场声名鹊起，此类“山寨”注册行为引起了泰方高度警惕。目前官方正协助企业维护其品牌合法权益，防止外部市场混淆。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.8, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "taobin_trademark_issue_vietnam_2026", "time_sensitive": true, "expires_date": "2026-05-01"}, {"id": "fc5e6a6e8281", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title_cn": "泰国政府宣布：宋干节（Songkran）被评为全球最热烈节日", "url": "https://www.bangkokpost.com/thailand/general/3237355/thai-songkran-hailed-as-worlds-liveliest-festival-govt", "date": "2026-04-15T16:14:00+07:00", "desc_original": "Thailand's Songkran festival has been named the world’s liveliest festival, according to the government.", "summary_cn": "泰国政府援引相关评估指出，泰国的传统新年宋干节（Songkran，即泼水节）已正式被誉为全球“最富生命力、最热烈”的节日。作为联合国教科文组织非物质文化遗产的重要组成部分，今年宋干节在全国范围内掀起了旅游热潮，吸引了数百万国际游客参与。官方希望以此为契机，进一步将泰国打造为全球顶级节庆目的地。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-16", "event_id": "songkran_festival_liveliest_recognition_2026", "time_sensitive": false, "expires_date": "2026-05-16"}, {"id": "1e354a7db08c", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "巴吞他尼府（Pathum Thani）上演传统“小鼠火箭”打靶赛", "url": "https://www.bangkokpost.com/video/thailand/3237283/traditional-luk-noo-rocket-race-kicks-off-at-buddhist-temple-in-pathum-thani-thailand", "date": "2026-04-15T12:18:00+07:00", "desc_original": "The first round of the traditional Mon &ldquo;Luk Noo&rdquo; (little rat) rocket-firing contest was held on Sunday at Hatthasan Kaset temple in Khlong Luang district of Pathum Thani province, attracting local participants alongside Thai and international spectators. Handcrafted rockets were launched along a wire to strike a model castle, showcasing skills passed down through generations...", "summary_cn": "在巴吞他尼府（Pathum Thani）的空銮县（Khlong Luang），一场极具特色的孟族传统“Luk Noo”（意为小鼠）火箭比赛在哈塔桑卡赛特寺（Hatthasan Kaset Temple）拉开帷幕。这种独特竞技要求参赛者通过钢丝发射手工制作的木制火箭，精准撞击远处的城堡模型。活动吸引了大量当地民众和外国游客，展现了泰国传统民俗工艺与社区团结精神的世代传承。", "importance": "P3", "section_hint": "thailand", "location_detail": "空銮县 Khlong Luang", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thailand_pathumthani_luknoo_festival_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16", "title_cn": "巴吞他尼府（Pathum Thani）上演传统“小鼠火箭”打靶赛"}, {"id": "7d56878eb1fd", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "宋干节交通事故已致191人死亡，曼谷（Bangkok）死亡人数居首", "url": "https://www.bangkokpost.com/thailand/general/3237274/songkran-traffic-accidents-took-191-lives-most-in-bangkok", "date": "2026-04-15T11:59:00+07:00", "desc_original": "Although the government has campaigned for road safety during the Songkran festival holiday, traffic accidents from April 10 to 14 have claimed 191 lives, with Bangkok recording the most fatalities.", "summary_cn": "尽管泰国政府在宋干节（Songkran）期间大力开展道路安全宣传，但交通事故伤亡情况依然严峻。根据4月10日至14日的统计数据，全泰范围内已有191人死于交通事故，其中首都曼谷（Bangkok）的死亡人数在全国各府调查中位居首位。该数据再次引发公众对节日期间酒驾及疲劳驾驶监管力度的关注。", "importance": "P1", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-01", "event_id": "thailand_songkran_road_accidents_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16", "title_cn": "宋干节交通事故已致191人死亡，曼谷（Bangkok）死亡人数居首"}, {"id": "9f05d1dc47d9", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国思蕊梵公主（Sirivannavari）将赴法举办“泰服”文化展", "url": "https://www.thaiheadlines.com/187062/", "date": "2026-04-15T09:14:17+00:00", "desc_original": "泰国头条新闻社讯 4月15日，泰国思蕊梵·娜瓦瑞公主殿下将担任荣誉赞助人...以庆祝泰法建交340周年暨邦交正常化170周年...", "summary_cn": "泰国思蕊梵·娜瓦瑞公主（Sirivannavari Nariratana）将作为荣誉赞助人，赴海外举办泰服文化展览。此举旨在庆祝泰国与法国建交340周年及邦交正常化170周年。公主长期致力于时尚与传统技艺结合，此次展览将通过泰丝艺术向国际展示泰国软实力及其独特的文化身份。", "importance": "P3", "section_hint": "thailand", "location_detail": "法国", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thailand_princess_france_exhibition_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16", "title_cn": "泰国思蕊梵公主（Sirivannavari）将赴法举办“泰服”文化展"}, {"id": "e166313fb157", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "柬埔寨洪森（Hun Sen）发言人否认主动向泰方释放缓和信号", "url": "https://www.thaiheadlines.com/187058/", "date": "2026-04-15T09:11:13+00:00", "desc_original": "泰国头条新闻社讯 4月15日，柬埔寨前首相、参议院主席洪森的发言人谢提乐否认“洪森主动向泰释放缓和信号”...", "sum
