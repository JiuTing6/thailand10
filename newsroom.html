<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thailand10 News Room | 新闻看板</title>
  <link rel="stylesheet" href="assets/style-thailand10.css">
  <style>
    /* ── News Room 专属样式 ── */
    .nr-header {
      background: var(--primary);
      color: #fff;
      border-bottom: 3px solid var(--accent);
    }
    .nr-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nr-title-block .kicker {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }
    .nr-title-block h1 {
      font-size: 22px;
      font-family: var(--font-ui);
      font-weight: 700;
      letter-spacing: 1px;
    }
    .nr-meta {
      font-family: var(--font-ui);
      font-size: 12px;
      color: #999;
      text-align: right;
    }
    .nr-meta strong { color: #ccc; }

    /* ── 控制栏 ── */
    .nr-controls {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .nr-controls-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 20px;
    }
    .nr-search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nr-search {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: var(--font-ui);
      background: var(--bg);
      outline: none;
      transition: border-color .2s;
    }
    .nr-search:focus { border-color: var(--primary); background: #fff; }
    .nr-count {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .nr-count strong { color: var(--accent); }

    /* ── 两层 Tag 筛选 ── */
    .nr-filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .nr-filter-label {
      font-family: var(--font-ui);
      font-size: 10px;
      color: #bbb;
      white-space: nowrap;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }
    .nr-filter-tags {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex: 1;
    }
    .nr-filter-tags::-webkit-scrollbar { display: none; }
    .tag-btn {
      padding: 4px 11px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
      font-family: var(--font-ui);
      cursor: pointer;
      color: var(--text-muted);
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tag-btn:hover { border-color: var(--accent-light); color: var(--accent); }
    .tag-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    /* 城市 tag 激活色用主色 */
    .tag-btn.city.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .nr-filter-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .clear-btn {
      padding: 4px 10px;
      border-radius: 14px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 11px;
      font-family: var(--font-ui);
      cursor: pointer;
      color: #aaa;
      white-space: nowrap;
    }
    .clear-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── 新闻卡片网格 ── */
    .nr-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .nr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nr-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border-color: #ccc;
    }
    .nr-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
    }
    .nr-card-source {
      font-weight: 600;
      color: var(--primary);
    }
    .nr-card-importance {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
    }
    .imp-P1 { background: #fee; color: var(--accent); }
    .imp-P2 { background: #fef5e7; color: #e67e22; }
    .imp-P3 { background: #f0f8f0; color: #27ae60; }
    .nr-card-title {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-ui);
      line-height: 1.4;
      color: var(--text);
    }
    .nr-card-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      font-family: var(--font-ui);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .nr-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .nr-card-tag {
      font-size: 10px;
      font-family: var(--font-ui);
      color: var(--text-muted);
      background: var(--tag-bg);
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .nr-card-tag.city {
      color: var(--primary);
      background: #eef2ff;
      border-color: #c7d2fe;
    }

    /* ── 空状态 ── */
    .nr-empty {
      max-width: 1100px;
      margin: 60px auto;
      text-align: center;
      font-family: var(--font-ui);
      color: var(--text-muted);
      display: none;
    }
    .nr-empty.show { display: block; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 10px;
      max-width: 680px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      font-family: var(--font-ui);
      line-height: 1.4;
      color: var(--text);
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #999;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
    }
    .modal-close:hover { color: var(--accent); }
    .modal-body {
      padding: 20px 24px 24px;
    }
    .modal-meta {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .modal-summary {
      font-size: 15px;
      line-height: 1.75;
      font-family: var(--font-ui);
      color: var(--text);
      margin-bottom: 16px;
    }
    .modal-desc {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-muted);
      font-family: var(--font-ui);
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-bottom: 16px;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 18px;
    }
    .modal-tag {
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--text-muted);
      background: var(--tag-bg);
      padding: 2px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .modal-link {
      display: inline-block;
      padding: 9px 20px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      transition: background .2s;
    }
    .modal-link:hover { background: #003d9e; }

    @media (max-width: 600px) {
      .nr-grid { grid-template-columns: 1fr; padding: 12px 12px 40px; }
      .nr-header-inner { flex-direction: column; align-items: flex-start; }
      .nr-meta { text-align: left; }
    }
  </style>
</head>
<body>

<div class="nr-header">
  <div class="nr-header-inner">
    <div class="nr-title-block">
      <div class="kicker">Thailand10 · 泰兰德10:00</div>
      <h1>📋 News Room — 新闻看板</h1>
    </div>
    <div class="nr-meta">
      共 <strong id="total-count">402</strong> 条新闻<br>
      更新于 2026-03-15 23:03 BKK
    </div>
  </div>
</div>

<div class="nr-controls">
  <div class="nr-controls-inner">
    <div class="nr-search-row">
      <input class="nr-search" id="search-input" type="text" placeholder="搜索标题、摘要...（支持中英文）">
      <span class="nr-count">显示 <strong id="visible-count">402</strong> 条</span>
    </div>
    <div class="nr-filter-row">
      <span class="nr-filter-label">时段</span>
      <div class="nr-filter-tags" id="period-bar"></div>
    </div>
    <div class="nr-filter-row">
      <span class="nr-filter-label">城市</span>
      <div class="nr-filter-tags" id="city-bar"></div>
    </div>
    <div class="nr-filter-row">
      <span class="nr-filter-label">主题</span>
      <div class="nr-filter-tags" id="topic-bar"></div>
      <div class="nr-filter-actions">
        <button class="clear-btn" id="clear-tags" style="display:none">✕ 清除</button>
      </div>
    </div>
  </div>
</div>

<div class="nr-grid" id="news-grid"></div>
<div class="nr-empty" id="empty-msg">😶 没有符合条件的新闻</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-summary" id="modal-summary"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <a class="modal-link" id="modal-link" href="#" target="_blank" rel="noopener">阅读原文 →</a>
    </div>
  </div>
</div>

<script>


// ── 城市 tag 配置 ──
const KNOWN_CITIES = ["#泰国", "#曼谷", "#芭提雅", "#普吉岛", "#清迈", "#苏梅岛"];
const MORE_CITY_LABEL = "#更多地区";

// 将 item 的 city_tag 归一化为显示用城市
function normCity(item) {
  const c = item.city_tag || "";
  if (!c) return "#泰国";
  if (KNOWN_CITIES.includes(c)) return c;
  return MORE_CITY_LABEL;
}

// 固定主题 tag 顺序
const TOPIC_TAGS = ["#时政", "#经济", "#治安", "#旅居", "#社会", "#房产", "#科技", "#中泰", "#健康"];

// ── 状态 ──
let ALL_ITEMS = [];
let activeCityTag = "";   // 当前选中城市（空=全部）
let activeTopicTag = "";  // 当前选中主题（空=全部）
let searchQ = "";

// 时段（period）：'recent' = 最近30天 (data/news_pool.json)；
// 'YYYY-MM' = 月度归档 (data/archive/YYYY-MM.json)
let activePeriod = "recent";
const PERIOD_CACHE = {};   // period → items[]，懒加载缓存
let ARCHIVE_MONTHS = [];   // index.json 内容，启动时拉

const MONTH_LABELS = {
  "01": "一月", "02": "二月", "03": "三月", "04": "四月",
  "05": "五月", "06": "六月", "07": "七月", "08": "八月",
  "09": "九月", "10": "十月", "11": "十一月", "12": "十二月",
};

function periodLabel(p) {
  if (p === "recent") return "最近30天";
  // 'YYYY-MM' → '四月'（同年省年份）+ '2025年三月'（跨年加年份）
  const [year, month] = p.split("-");
  const thisYear = new Date().getFullYear().toString();
  const monthZh = MONTH_LABELS[month] || month;
  return year === thisYear ? monthZh : `${year}年${monthZh}`;
}

function periodURL(p) {
  return p === "recent" ? "data/news_pool.json" : `data/archive/${p}.json`;
}

async function loadPeriod(p) {
  if (PERIOD_CACHE[p]) return PERIOD_CACHE[p];
  const r = await fetch(periodURL(p));
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${periodURL(p)}`);
  const data = await r.json();
  PERIOD_CACHE[p] = data;
  return data;
}

async function switchPeriod(p) {
  activePeriod = p;
  // 切 period 时不重置城市/主题/搜索筛选——延续用户当前过滤意图
  try {
    const grid = document.getElementById("news-grid");
    grid.innerHTML = `<div style="padding:40px;color:#888;font-family:sans-serif">加载中…</div>`;
    ALL_ITEMS = await loadPeriod(p);
    rebuildFilterCounts();
    render();
  } catch (err) {
    document.getElementById("news-grid").innerHTML =
      `<div style="padding:40px;color:#c00;font-family:sans-serif">⚠️ 加载失败：${err.message}</div>`;
  }
}

// 启动：并行拉 pool + archive index
Promise.all([
  loadPeriod("recent"),
  fetch("data/archive/index.json").then(r => r.ok ? r.json() : []).catch(() => []),
])
  .then(([poolData, archiveMonths]) => {
    ALL_ITEMS = poolData;
    ARCHIVE_MONTHS = archiveMonths;
    initUI();
    render();
  })
  .catch(err => {
    document.getElementById("news-grid").innerHTML =
      `<div style="padding:40px;color:#c00;font-family:sans-serif">⚠️ 数据加载失败：${err.message}</div>`;
  });

// ── 初始化 UI ──
function initUI() {
  // 更新时间戳（一次性）
  const now = new Date();
  const bkkStr = now.toLocaleString("zh-CN", {
    timeZone: "Asia/Bangkok",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  }).replace(/\//g, "-");

  // 时段 bar：[最近30天 | 五月 | 四月 | ...]
  const periodBar = document.getElementById("period-bar");
  periodBar.innerHTML = "";
  const periods = ["recent", ...ARCHIVE_MONTHS];
  periods.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "tag-btn city";  // 复用 city 配色（强调风格）
    btn.textContent = periodLabel(p);
    btn.dataset.period = p;
    if (p === activePeriod) btn.classList.add("active");
    btn.onclick = () => {
      periodBar.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      switchPeriod(p);
    };
    periodBar.appendChild(btn);
  });

  // 城市 + 主题 bar：依赖当前 ALL_ITEMS，period 切换时重建
  rebuildFilterCounts();

  // 清除按钮（一次性绑定）
  document.getElementById("clear-tags").onclick = () => {
    activeCityTag = "";
    activeTopicTag = "";
    const cb = document.getElementById("city-bar");
    const tb = document.getElementById("topic-bar");
    cb.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
    cb.querySelector("[data-city='']")?.classList.add("active");
    tb.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
    updateClearBtn();
    render();
  };

  // meta 时间戳（period 切换时也更新条数 → 见 render()）
  document.querySelector(".nr-meta").innerHTML =
    `<span id="meta-count">共 <strong id="total-count">${ALL_ITEMS.length}</strong> 条</span><br>更新于 ${bkkStr} BKK`;
}

// 切 period 时重建城市/主题筛选 bar 的计数；选中状态尽量保留
function rebuildFilterCounts() {
  const cityCounts = {};
  ALL_ITEMS.forEach(item => {
    const c = normCity(item);
    cityCounts[c] = (cityCounts[c] || 0) + 1;
  });

  const cityBar = document.getElementById("city-bar");
  cityBar.innerHTML = "";
  const allCities = ["全部", ...KNOWN_CITIES];
  if (cityCounts[MORE_CITY_LABEL]) allCities.push(MORE_CITY_LABEL);
  allCities.forEach(label => {
    const cityKey = label === "全部" ? "" : label;
    const count = label === "全部" ? ALL_ITEMS.length : (cityCounts[label] || 0);
    if (count === 0 && label !== "全部") return;
    const btn = document.createElement("button");
    btn.className = "tag-btn city";
    btn.textContent = label === "全部" ? `全部 ${count}` : `${label} ${count}`;
    btn.dataset.city = cityKey;
    if (cityKey === activeCityTag) btn.classList.add("active");
    btn.onclick = () => {
      activeCityTag = cityKey;
      cityBar.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    cityBar.appendChild(btn);
  });
  // 当前选中城市在新数据里若无对应按钮，回退到"全部"
  if (activeCityTag && !cityBar.querySelector(`[data-city="${activeCityTag}"]`)) {
    activeCityTag = "";
    cityBar.querySelector("[data-city='']")?.classList.add("active");
  }

  const topicCounts = {};
  ALL_ITEMS.forEach(item => {
    const t = item.topic_tag || "";
    if (t) topicCounts[t] = (topicCounts[t] || 0) + 1;
  });
  const topicBar = document.getElementById("topic-bar");
  topicBar.innerHTML = "";
  TOPIC_TAGS.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "tag-btn topic";
    const count = topicCounts[tag] || 0;
    btn.textContent = `${tag} ${count}`;
    btn.dataset.topic = tag;
    if (tag === activeTopicTag) btn.classList.add("active");
    btn.onclick = () => {
      if (activeTopicTag === tag) {
        activeTopicTag = "";
        btn.classList.remove("active");
      } else {
        activeTopicTag = tag;
        topicBar.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      }
      updateClearBtn();
      render();
    };
    topicBar.appendChild(btn);
  });

  // 同步 meta 总数
  const totalEl = document.getElementById("total-count");
  if (totalEl) totalEl.textContent = ALL_ITEMS.length;
}

function updateClearBtn() {
  const hasFilter = activeCityTag || activeTopicTag;
  document.getElementById("clear-tags").style.display = hasFilter ? "inline-block" : "none";
}

// ── 搜索 ──
document.getElementById("search-input").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  render();
});

// ── 过滤 ──
function filterItems() {
  return ALL_ITEMS.filter(item => {
    // 城市过滤
    if (activeCityTag) {
      const itemCity = normCity(item);
      if (itemCity !== activeCityTag) return false;
    }
    // 主题过滤
    if (activeTopicTag && item.topic_tag !== activeTopicTag) return false;
    // 搜索
    if (searchQ) {
      const haystack = ((item.title || "") + " " + (item.title_cn || "") + " " + (item.summary_cn || "") + " " + (item.desc_original || "")).toLowerCase();
      if (!haystack.includes(searchQ)) return false;
    }
    return true;
  });
}

// ── 格式化日期 ──
function fmtDate(d, fallback) {
  if (!d) return fallback ? fmtDate(fallback) : "";
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return fallback ? fmtDate(fallback) : d.slice(0, 10);
    return dt.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
  } catch(e) { return fallback ? fmtDate(fallback) : d.slice(0, 10); }
}

// ── 渲染 ──
function render() {
  const items = filterItems();
  const grid = document.getElementById("news-grid");
  const emptyMsg = document.getElementById("empty-msg");
  document.getElementById("visible-count").textContent = items.length;

  grid.innerHTML = "";
  if (items.length === 0) {
    emptyMsg.classList.add("show");
    return;
  }
  emptyMsg.classList.remove("show");

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "nr-card";
    const imp = item.importance || "";
    const cityTag = item.city_tag ? normCity(item) : "";
    const topicTag = item.topic_tag || "";
    const tagHtml = [
      cityTag ? `<span class="nr-card-tag city">${cityTag}</span>` : "",
      topicTag ? `<span class="nr-card-tag">${topicTag}</span>` : "",
    ].filter(Boolean).join("");
    card.innerHTML = `
      <div class="nr-card-meta">
        <span class="nr-card-source">${item.source || ""}</span>
        <span>${fmtDate(item.date, item.added_date)}</span>
        ${imp ? `<span class="nr-card-importance imp-${imp}">${imp}</span>` : ""}
      </div>
      <div class="nr-card-title">${item.title_cn || item.title || ""}</div>
      <div class="nr-card-summary">${item.summary_cn || item.desc_original || ""}</div>
      ${tagHtml ? `<div class="nr-card-tags">${tagHtml}</div>` : ""}
    `;
    card.onclick = () => openModal(item);
    grid.appendChild(card);
  });
}

// ── Modal ──
function openModal(item) {
  document.getElementById("modal-title").textContent = item.title_cn || item.title || "";
  document.getElementById("modal-meta").innerHTML = `
    <span><strong>${item.source || ""}</strong></span>
    <span>${fmtDate(item.date, item.added_date)}</span>
    ${item.importance ? `<span>优先级：${item.importance}</span>` : ""}
  `;
  document.getElementById("modal-summary").textContent = item.summary_cn || "";
  const descEl = document.getElementById("modal-desc");
  if (item.desc_original) {
    descEl.textContent = item.desc_original;
    descEl.style.display = "block";
  } else {
    descEl.style.display = "none";
  }
  const tagsEl = document.getElementById("modal-tags");
  const cityTag = item.city_tag ? normCity(item) : "";
  const topicTag = item.topic_tag || "";
  tagsEl.innerHTML = [
    cityTag ? `<span class="modal-tag" style="color:var(--primary);background:#eef2ff;border-color:#c7d2fe">${cityTag}</span>` : "",
    topicTag ? `<span class="modal-tag">${topicTag}</span>` : "",
  ].filter(Boolean).join("");
  const link = document.getElementById("modal-link");
  link.href = item.url || "#";
  link.style.display = item.url ? "inline-block" : "none";
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modal-close").onclick = closeModal;
document.getElementById("modal-overlay").onclick = e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
};
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

</script>
</body>
</html>
