普机场上演了暖心的一幕：一位中国男子自掏腰包买了100多把水枪和宋干节主题小物件，在机场大厅免费发放给入境游客...", "title_cn": "中国小伙素万那普机场（Suvarnabhumi）免费分发水枪，助力宋干节（Songkran）文化推广", "summary_cn": "4月15日，在曼谷素万那普机场（Suvarnabhumi Airport），一名中国籍男子自费购买了100多把水枪及宋干节特色礼品，在入境大厅免费分发给来自世界各地的游客。此举旨在向国际友人安利泰国的宋干节（泼水节）文化，让游客落地即感受到节日的欢乐。这一温馨行为在社交媒体走红，展现了中泰一家亲的友好氛围。", "importance": "P3", "section_hint": "cn_thai", "location_detail": "素万那普机场 Suvarnabhumi Airport", "city_tag": "#曼谷", "topic_tag": "#中泰", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-01", "event_id": "thailand_airport_songkran_promotion_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "acf2a5ed5b71", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "“远程功德”兴起，泰国企业争相抓住潮流", "url": "https://www.thaiheadlines.com/187051/", "date": "2026-04-15T08:10:06+00:00", "desc": "泰国头条新闻社讯 4月14日，泰国商业部商业发展厅厅长普蓬表示，泰国是佛教国家，佛教徒习惯在佛教日、长假 or 各类节日期间前往寺庙做功德...", "desc_original": "泰国头条新闻社讯 4月14日，泰国商业部商业发展厅厅长普蓬表示，泰国是佛教国家，佛教徒习惯在佛教日、长假 or 各类节日期间前往寺庙做功德...", "title_cn": "泰国商业部关注“远程功德”经济趋势，宋干节期间在线祭拜服务兴起", "summary_cn": "泰国商业部商业发展厅厅长普蓬（Poonpong）指出，随着数字化转型，泰国兴起了“远程功德”趋势。因部分信徒不便亲身前往寺庙，企业界顺势推出代烧香、代祈福及在线捐献等服务。商业部将其视为潜力巨大的文化创意经济模式，呼吁商家在宋干节（Songkran）等传统节日通过数字平台捕捉商机，并确保服务透明度以维护信徒利益。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thailand_online_merit_making_trend_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "51c3b985747b", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Patong tourists arrested for water-throwing chaos during Songkran", "url": "https://thethaiger.com/news/national/patong-tourists-arrested-for-water-throwing-chaos-during-songkran", "date": "2026-04-15T06:45:40+00:00", "desc": "Patong tourists arrested for water-throwing chaos during Songkran Legacy Seven foreign tourists were arrested in Patong after forcing open a vehicle door to spray water inside during Songkran celebrations...", "desc_original": "Patong tourists arrested for water-throwing chaos during Songkran Legacy Seven foreign tourists were arrested in Patong after forcing open a vehicle door to spray water inside during Songkran celebrations...", "title_cn": "普吉岛芭东（Patong）七名外籍游客因在宋干节期间强行开车门喷水被捕", "summary_cn": "在普吉岛芭东（Patong）地区的宋干节庆典中，七名外籍游客因过激行为被警方逮捕。目击者称，这群游客不仅当街拦行车辆，更强行拉开正行驶汽车的车门直接向车内乘客喷水，造成混乱并危害安全。此举违反了泰国宋干节期间安全文明的相关规定。当地警方接报后介入查办，提醒游客欢庆佳节时必须尊重他人并遵守法律法规。", "importance": "P1", "section_hint": "thailand", "location_detail": "芭东 Patong", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-01", "event_id": "phuket_patong_tourists_arrest_songkran_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "6cd200b5185d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "赴泰国际游客破千万，中国位居第一", "url": "https://www.thaiheadlines.com/187047/", "date": "2026-04-15T06:36:17+00:00", "desc": "泰国头条新闻社讯 4月14日，泰国旅游和体育部次长纳特里亚透露，截至4月12日，今年泰国累计接待外国游客突破1030万人次，中国是外国游客的最大来源国...", "desc_original": "泰国头条新闻社讯 4月14日，泰国旅游和体育部次长纳特里亚透露，截至4月12日，今年泰国累计接待外国游客突破1030万人次，中国是外国游客的最大来源国...", "title_cn": "泰国今年累计接待外籍游客破1000万人次，中国蝉联最大客源地", "summary_cn": "泰国旅游和体育部最新统计显示，截至2026年4月12日，泰国本年度接待的国际游客已正式突破1030万人次关口。其中，中国游客人数稳居第一，成为推动泰国旅游业复苏的最核心群体。得益于互免签证政策及便捷的航线支持，中国游客的强劲回归为泰国经济注入了巨大活力。旅体部预计，随着宋干节相关活动的持续，入境人数将继续攀升。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thailand_tourism_stats_china_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "7cadf9ab6b48", "source": "Bangkok Post Property", "source_id": "bangkokpost_property", "lang": "en", "title": "尚思瑞 Sansiri 转向小众高端服务以应对豪宅市场价格战", "url": "https://www.bangkokpost.com/property/3237124/sansiri-targets-luxury-niche-services-in-competitive-market", "date": "2026-04-15T06:23:00+07:00", "desc": "SET-listed developer Sansiri is shifting its strategy towards niche services to compete in the luxury housing market, where some developers are offering discounts of more than 25% amid intense competition.", "desc_original": "SET-listed developer Sansiri is shifting its strategy towards niche services to compete in the luxury housing market, where some developers are offering discounts of more than 25% amid intense competition.", "summary_cn": "泰国上市开发商尚思瑞（Sansiri）正在调整其市场策略，通过提供差异化的小众高端服务来竞争豪宅市场。目前泰国豪宅市场竞争异常激烈，部分开发商为回笼资金甚至开出了超过25%的折扣优惠。尚思瑞此举旨在避开单纯的价格战，通过提升服务附加值来吸引高净值客户。这反映了曼谷高端房产市场在当前经济环境下供需关系的微妙变化。", "importance": "P2", "section_hint": "property", "location_detail": "", "city_tag": "#曼谷", "topic_tag": "#房产", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_sansiri_luxury_real_estate_2026", "status": "pending", "added_date": "2026-04-15", "time_sensitive": false, "expires_date": "2026-05-15", "title_cn": "尚思瑞 Sansiri 转向小众高端服务以应对豪宅市场价格战"}, {"id": "3d5fd0761939", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "证券交易改革映射区域性资产重组趋势", "url": "https://www.bangkokpost.com/business/investment/3237149/stock-reforms-mirror-regional-realignment", "date": "2026-04-15T06:13:00+07:00", "desc": "In an era where global capital is increasingly concentrated in high-growth themes such as artificial intelligence and technology, traditional sector stocks have steadily fallen out of favour.", "desc_original": "In an era where global capital is increasingly concentrated in high-growth themes such as artificial intelligence and technology, traditional sector stocks have steadily fallen out of favour.", "summary_cn": "在全球资本日益向人工智能和科技等高增长领域集中的大环境下，泰国的传统行业股票正逐渐失去投资者青睐。泰国证券市场正在进行的改革旨在顺应这一区域性资产重组趋势。随着投资者对旧经济模式的估值重塑，泰国急需通过制度创新吸引更多科技创新企业上市，以维持其在东南亚金融市场中的竞争力。这对于在泰寻求长期价值投资的机构具有指导意义。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.6, "tags": [], "origin": "rss", "event_id": "thailand_stock_market_reform_2026", "status": "pending", "added_date": "2026-04-15", "time_sensitive": false, "expires_date": "2026-05-15", "title_cn": "证券交易改革映射区域性资产重组趋势"}, {"id": "af3b012661e0", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "俄罗斯寻求加深对泰贸易以增加出口", "url": "https://www.bangkokpost.com/business/general/3236954/russians-looking-to-increase-exports-to-thai-market", "date": "2026-04-15T05:58:00+07:00", "desc": "Russia is ready to increase exports to the Thai market, says Deputy Prime Minister of the Russian Federation Dmitry Patrushev, as quoted by the Russian Embassy in Thailand.", "desc_original": "Russia is ready to increase exports to the Thai market, says Deputy Prime Minister of the Russian Federation Dmitry Patrushev, as quoted by the Russian Embassy in Thailand.", "summary_cn": "据俄罗斯驻泰国大使馆引述，俄罗斯联邦副总理德米特里·帕特鲁舍夫（Dmitry Patrushev）表示，俄罗斯已准备好向泰国市场扩大出口。这标志着俄方正积极在东盟地区寻找替代市场和贸易伙伴。双方合作领域预计将涵盖能源、农产品及工业物资。作为泰国的传统经贸伙伴，俄罗斯此举可能对泰国的进出口贸易结构及国际结算支付方式产生一定影响。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "russia_thailand_trade_expansion_2026", "status": "pending", "added_date": "2026-04-15", "time_sensitive": false, "expires_date": "2026-05-15", "title_cn": "俄罗斯寻求加深对泰贸易以增加出口"}, {"id": "ce2f1efb1092", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "102-year-old ‘Khun Yai Whin’ walks unaided at Songkran festival", "url": "https://thethaiger.com/news/national/102-year-old-khun-yai-walks-unaided-at-songkran-festival", "date": "2026-04-15T05:45:29+00:00", "desc": "102-year-old 'Khun Yai Whin' became the highlight of this year's Songkran celebrations in Mueang district, Pathum Thani, walking unaided...", "desc_original": "102-year-old 'Khun Yai Whin' became the highlight of this year's Songkran celebrations in Mueang district, Pathum Thani, walking unaided...", "title_cn": "巴吞他尼府（Pathum Thani）102岁“温奶奶”全程步行参加泼水节，惊艳众人", "summary_cn": "在巴吞他尼府（Pathum Thani）直辖中心县（Mueang）举行的宋干节（Songkran）传统庆典中，102岁的老人“温奶奶”（Khun Yai Whin）成为全场焦点。这位高龄老人不仅未依靠轮椅或助力器，更是精神抖擞地独立行走参与活动，向晚辈传递节日的祝福。她的长寿与健硕引发了社区热议，当地政府也借此机会呼吁民众关注老年人健康与家庭和谐。", "importance": "P3", "section_hint": "thailand", "location_detail": "巴吞他尼府 Mueang district, Pathum Thani", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thailand_pathum_thani_centenarian_songkran_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "636aeee998fe", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国宋干节 Songkran 旅游收入攀升，预计创收逾303亿铢", "url": "https://www.bangkokpost.com/thailand/general/3236959/tourism-tops-over-songkran", "date": "2026-04-15T05:45:00+07:00", "desc": "The tourism sector is expected to generate more than 30.35 billion baht in revenue during the Songkran holiday, up 6% from last year, says the Tourism Authority of Thailand (TAT), with foreign visitors also making a bigger contribution.", "desc_original": "The tourism sector is expected to generate more than 30.35 billion baht in revenue during the Songkran holiday, up 6% from last year, says the Tourism Authority of Thailand (TAT), with foreign visitors also making a bigger contribution.", "summary_cn": "泰国国家旅游局（TAT）预计，2026年宋干节（Songkran）假期期间，旅游业总收入将突破303.5亿泰铢，较去年增长6%。值得注意的是，外国游客在整体消费中的贡献比重显著提升。随着节日活动的全球推广及交通条件的改善，曼谷、芭提雅及清迈等热门目的地均迎来了极高的人流量，有力提振了泰国上半年的消费信心和经济增长预期。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_songkran_tourism_revenue_2026", "status": "pending", "added_date": "2026-04-15", "time_sensitive": true, "expires_date": "2026-04-30", "title_cn": "泰国宋干节 Songkran 旅游收入攀升，预计创收逾303亿铢"}, {"id": "a2f66d65fbb0", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "泰国政府寻求加强与肯尼亚 Kenya 的外交与经贸联系", "url": "https://www.bangkokpost.com/thailand/general/3237094/govt-moves-to-boost-ties-with-kenya", "date": "2026-04-15T05:26:00+07:00", "desc": "Thailand is stepping up efforts to expand trade with Kenya, with officials holding talks with private-sector players and promoting Thai food and digital services in one of Africa's fastest-growing markets.", "desc_original": "Thailand is stepping up efforts to expand trade with Kenya, with officials holding talks with private-sector players and promoting Thai food and digital services in one of Africa's fastest-growing markets.", "summary_cn": "泰国政府正致力于加强与非洲活跃市场肯尼亚（Kenya）的贸易往来。泰国官员目前正与当地私营部门积极接洽，重点推广泰餐文化及数字服务。由于肯尼亚是非洲增长最快的经济体之一，泰国希望通过将其作为进入东非市场的门户，实现出口多元化战略。此举体现了泰国政府在“南南合作”框架下积极拓展新兴市场的长远意图。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_kenya_trade_ties_2026", "status": "pending", "added_date": "2026-04-15", "time_sensitive": false, "expires_date": "2026-05-15", "title_cn": "泰国政府寻求加强与肯尼亚 Kenya 的外交与经贸联系"}, {"id": "10343df1effc", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "Garena 瞄准泰国加大游戏产业投资", "url": "https://www.bangkokpost.com/business/general/3237154/garena-targets-thailand-for-gaming-investment", "date": "2026-04-15T05:15:00+07:00", "desc": "Amid economic uncertainty, game developer Garena is doubling down on Thailand by expanding its investment in e-sports, creator systems and content to bolster its Gen Z engagement and reinforce Garena Free Fire dominance in the mobile game action segment.", "desc_original": "Amid economic uncertainty, game developer Garena is doubling down on Thailand by expanding its investment in e-sports, creator systems and content to bolster its Gen Z engagement and reinforce Garena Free Fire dominance in the mobile game action segment.", "title_cn": "游戏巨头 Garena 瞄准泰国市场，将加大电竞及内容创作投资", "summary_cn": "面对全球经济的不确定性，知名游戏开发商 Garena 决定加倍投资泰国市场。该公司计划通过扩大在电子竞技、创作者生态系统及内容领域的投入，增强对 Z 世代用户的吸引力。此举旨在巩固其旗舰手游《Free Fire》在移动动作游戏领域的领先地位，并进一步深耕泰国的数字娱乐产业生态。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-15", "event_id": "thailand_garena_gaming_investment_2026", "time_sensitive": false, "expires_date": "2026-05-15"}, {"id": "b390339fbffb", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "泰国副总理兼外长西哈萨飞赴阿曼（Oman）商讨中东局势", "url": "https://www.thaiheadlines.com/187044/", "date": "2026-04-15T04:04:46+00:00", "desc_original": "泰国头条新闻社讯 4月15日上午9点，泰国副总理兼外交部部长西哈萨应阿曼外交大臣巴德尔邀请，率团前往阿曼访问，共同讨论中东局势及航运安全。", "summary_cn": "4月15日，泰国副总理兼外交部长西哈萨（Sihasak）应阿曼（Oman）外交大臣巴德尔邀请，率代表团飞抵阿曼进行正式访问。双方重点围绕当前复杂的中东地区局势及航运安全保障问题展开深入磋商。此举显示泰国政府高度关注地区地缘政治风险对供应链的影响，旨在通过多边外交维护国家及地区利益。", "importance": "P2", "section_hint": "thailand", "location_detail": "阿曼", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thai_oman_foreign_affairs_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "be39b0da92c9", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "泰柬边境局势趋缓，洪森（Hun Sen）向泰方释放外交友好信号", "url": "https://www.thaiheadlines.com/187041/", "date": "2026-04-15T03:41:59+00:00", "desc_original": "泰国头条新闻社讯 4月14日，在泰柬边境局势开始部分缓和之际，资深军事记者瓦萨娜透露，柬埔寨前首相、参议院主席洪森已通过其亲信向泰国军方传达讯息...", "summary_cn": "随着泰柬边境局势逐步降温，资深军事记者瓦萨娜（Wassana）曝出柬埔寨参议院主席洪森（Hun Sen）已通过亲信向泰国军方高层传达和解意向。这一变动标志着两国边境冲突压力释放出缓和信号，对于稳定东南亚边境局势、恢复两国经济与商贸往来具有关键意义，体现了双方高层通过非正式渠道化解地缘风险的尝试。", "importance": "P2", "section_hint": "thailand", "location_detail": "泰柬边境", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thai_cambodia_border_relations_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "14e34f9001b9", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "曼谷是隆路（Silom）泼水节落幕，3天狂欢共吸引65万游客", "url": "https://www.thaiheadlines.com/187029/", "date": "2026-04-15T03:00:28+00:00", "desc_original": "泰国头条新闻社讯 4月14日20点，泰国曼谷Bangrak区办公室在脸书发文表示，工作人员已进入是隆路清理路面。今年3天共吸引了652,974人参加。", "summary_cn": "曼谷核心商圈是隆路（Silom）2026年泼水节庆祝活动于4月14日晚圆满结束。根据曼谷邦腊区（Bangrak）官方统计，为期三天的活动共吸引超过65.2万名国内外游客涌入现场，展现了泰国旅游业的强劲复苏及传统节日的国际影响力。环卫部门在活动结束后迅速进场清理路面，恢复交通秩序。", "importance": "P3", "section_hint": "bangkok", "location_detail": "是隆路", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "time_sensitive": true, "expires_date": "2026-05-01", "event_id": "bangkok_songkran_silom_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "ed3d89a7bbcd", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "财经分析：2026年“能源危机”或成为泰国经济转型的黄金契机", "url": "https://www.thaiheadlines.com/187026/", "date": "2026-04-15T02:28:16+00:00", "desc_original": "泰国头条新闻社讯 4月14日，彭博社气候与能源专家David Fickling‌在社评版块“Bloomberg Opinion”发表了一篇题为《能源危机如何让泰国变得更富有》的文章。他指出，泰国正面临国内天然气产量下降、进口液化天然气（LNG）成本上升的能源危机，但泰国拥有尚未被充分开发的光伏资源，若能有效利用，将有效缓解能源危机。然而，目前最大的障碍是政府繁琐的法规和程序。 David Fickling‌认为，泰国具备发展太阳能的巨大潜力，若政府鼓励农民转型太阳能农场，不仅能增加出口收入，还能提高农村的收入水平。其实，现代泰国就是在危机中诞生的。回顾1970年代的“石油危机”，当时油站关闭、强制限电，甚至总理下台，但几乎在同一时期，泰国湾发现了天然气，又为1980和1990年代的经济起飞奠定了基础，那是泰国经济史上最繁荣的阶段之一。 如今历史似乎正在重演。泰国国内的天然气产量较十年前的高峰期下降了四分之一，跻身全球前十大LNG进口国，进口量占国内天然气需求的三分之一。自美以伊冲突爆发以来，亚洲天然气燃料成本上涨约75%。在经济低迷的情况下，其所带来的价格冲击程度可能不亚于1970年代。 泰国的太阳能潜力堪比当年的天然气资源，然而这种清洁能源的开发却受限于复杂的法规，未能被充分利用。这些法规往往更有利于传统的天然气产业，如果泰国想重返经济繁荣的轨道，2026年的“能源危机”极可能是", "summary_cn": "彭博社专家指出，泰国正面临天然气产量萎缩及LNG进口成本飙升的严峻挑战，但这场“能源危机”或是转型良机。泰国光伏潜力巨大，若政府能简化法规、鼓励“光伏下乡”，或可复刻70年代石油危机后利用天然气实现经济腾飞的奇迹。当前高额能源支出正倒逼政策改革，推动泰国从依赖传统能源转向清洁能源重镇，成为经济增长新引擎。", "importance": "P2", "section_hint": "thailand", "location_detail": "泰国", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-16", "event_id": "thailand_energy_crisis_opportunity_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-16"}, {"id": "ef00adac9b32", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Summer storm threat expected from April 16-20", "url": "https://www.bangkokpost.com/thailand/general/3236874/summer-storm-threat-expected-from-april-1620", "date": "2026-04-14T18:58:00+07:00", "desc": "The Meteorological Department has warned of summer storms expected to affect the upper part of Thailand from Thursday until next Monday.", "desc_original": "The Meteorological Department has warned of summer storms expected to affect the upper part of Thailand from Thursday until next Monday.", "title_cn": "泰国气象局发布预警：4月16日至20日多地将迎来夏季风暴", "summary_cn": "泰国气象局（Meteorological Department）发布天气预警，预计从本周四（16日）至下周一（20日），泰国北部及上部地区将受到夏季风暴的影响。届时可能伴有强降雨、雷暴和阵风。在此提醒居住在上述地区的民众及游客密切关注天气变化，做好防风避雨措施，警惕因极端天气引发的次生灾害。", "importance": "P1", "section_hint": "thailand", "location_detail": "泰国北部", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-15", "event_id": "thailand_summer_storm_alert_2026_04", "time_sensitive": true, "expires_date": "2026-04-30"}, {"id": "ccb51eb09d65", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Culprits behind Kaeng Krachan fire sought", "url": "https://www.bangkokpost.com/thailand/general/3236883/culprits-behind-kaeng-krachan-fire-sought", "date": "2026-04-14T18:19:00+07:00", "desc": "Authorities have vowed to track down those responsible for illegal forest encroachment and arson after a wildfire burned more than 1,700 rai of protected watershed forest in Kaeng Krachan National Park recently.", "desc_original": "Authorities have vowed to track down those responsible for illegal forest encroachment and arson after a wildfire burned more than 1,700 rai of protected watershed forest in Kaeng Krachan National Park recently.", "title_cn": "康卡占国家公园（Kaeng Krachan）过火面积逾1700莱，泰方全力搜捕纵火者", "summary_cn": "近期，泰国康卡占国家公园（Kaeng Krachan National Park）发生严重林火，导致超过1,700莱的受保护水源林被毁。相关部门初步调查认为火灾涉及非法侵占林地及蓄意纵火，官方表示已誓言将全力追踪并逮捕涉案嫌疑人。康卡占作为世界自然遗产，其森林破坏严重威胁当地生态安全，军警及有关单位已介入调查。", "importance": "P2", "section_hint": "thailand", "location_detail": "康卡占国家公园 Kaeng Krachan", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-15", "event_id": "thailand_forest_fire_arson_2026", "time_sensitive": false, "expires_date": "2026-05-15"}, {"id": "da391e94a4e2", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Feasibility studies behind Land Bridge ‘inaccurate’", "url": "https://www.bangkokpost.com/thailand/general/3236864/feasibility-studies-behind-land-bridge-inaccurate", "date": "2026-04-14T18:12:00+07:00", "desc": "A coalition of academics, environmental organisations and civil society groups has urged Prime Minister Anutin Charnvirakul to disclose all environmental and health impact assessment (EHIA) reports related to the proposed southern Land Bridge project.", "desc_original": "A coalition of academics, environmental organisations and civil society groups has urged Prime Minister Anutin Charnvirakul to disclose all environmental and health impact assessment (EHIA) reports related to the proposed southern Land Bridge project.", "title_cn": "南部“陆桥”项目可行性遭质疑，民间组织敦促阿努廷（Anutin）总理公开评估报告", "summary_cn": "多名学者、环保组织及公民社会团体组成的联盟指出，泰国南部陆桥（Land Bridge）项目的可行性研究存在“不准确”之处，并正式要求总理阿努廷（Anutin Charnvirakul）公开所有相关的环境与健康影响评估（EHIA）报告。该项目旨在连接泰国湾与安达曼海，虽然经济前景宏大，但其对当地生态的影响一直处于舆论漩涡中。", "importance": "P2", "section_hint": "property", "location_detail" r Phiphat Ratchakitprakarn.", "desc_original": "Public transport usage during the Songkran holiday period has exceeded 10 million passenger trips over the first four days, up 1.6% from last year, according to Transport Minister Phiphat Ratchakitprakarn.", "summary_cn": "泰国交通部长披帕（Phiphat Ratchakitprakarn）透露，在宋干节（Songkran）假期前四天里，全国公共交通出行总量已突破1000万人次，较去年同期增长1.6%。这反映出今年泼水节期间民众出行意愿强烈。交通部已加强各交通枢纽的运力保障，以应对节日期间的大规模客流高峰，确保民众平安返乡或旅游。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_songkran_transport_2026", "added_date": "2026-04-15", "time_sensitive": true, "expires_date": "2026-04-30", "title_cn": "宋干节（Songkran）前四日公共交通出行量突破1000万人次"}, {"id": "afdba5e69c8f", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "南向火车延误7小时，调皮猫咪遭网友“背锅”指责", "url": "https://www.bangkokpost.com/thailand/general/3236818/cranky-cat-unfairly-blamed-for-trains-7hour-delay", "date": "2026-04-14T15:27:00+07:00", "desc": "A cat that was not enjoying the ride has become the object of some online criticism after a southbound train arrived at its final destination seven hours behind schedule.", "desc_original": "A cat that was not enjoying the ride has become the object of some online criticism after a southbound train arrived at its final destination seven hours behind schedule.", "summary_cn": "一列前往泰国南部的火车比原计划晚点了整整7小时才抵达终点站。令人意外的是，一只在旅途中表现“烦躁”的猫咪成为了网友热议和批评的对象，被指由于其干扰导致了行程延误。尽管猫咪遭到了舆论的“背锅”指责，但实际延误原因往往涉及铁路调度或技术故障。此事件引起了对携带宠物乘坐公共交通的广泛讨论。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.95, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_train_delay_cat_2026", "added_date": "2026-04-15", "time_sensitive": false, "expires_date": "2026-05-15", "title_cn": "南向火车延误7小时，调皮猫咪遭网友“背锅”指责"}, {"id": "0c6316942417", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "宋干节“危险七日”前四天累计154人死于车祸，曼谷居首", "url": "https://www.bangkokpost.com/thailand/general/3236804/154-road-deaths-in-first-four-songkran-travel-days", "date": "2026-04-14T14:21:00+07:00", "desc": "A total of 154 people have been killed and 705 injured in road accidents across Thailand during the first four days of the &ldquo;seven dangerous days&rdquo; of Songkran holiday travel, with Bangkok recording the highest cumulative number of fatalities, authorities said on Tuesday.", "desc_original": "A total of 154 people have been killed and 705 injured in road accidents across Thailand during the first four days of the &ldquo;seven dangerous days&rdquo; of Songkran holiday travel, with Bangkok recording the highest cumulative number of fatalities, authorities said on Tuesday.", "summary_cn": "官方于周二通报，在宋干节“危险七日”长假的前四天里，全泰范围内交通事故已造成154人死亡、705人受伤。其中曼谷（Bangkok）累计死亡人数最高。尽管政府加大了执法和宣传力度，但酒驾和超速仍是事故主因。当局提醒民众在假期后半段返程期间务必注意交通安全，各府已加强值守排查风险。", "importance": "P1", "section_hint": "thailand", "location_detail": "Bangkok", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_songkran_road_accidents_2026", "added_date": "2026-04-15", "time_sensitive": true, "expires_date": "2026-04-30", "title_cn": "宋干节“危险七日”前四天累计154人死于车祸，曼谷居首"}, {"id": "1bc4e2facb6d", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "一名中国籍男子涉嫌在飞往曼谷航班上盗窃被捕", "url": "https://www.bangkokpost.com/thailand/general/3236793/chinese-man-arrested-at-bangkok-airport-after-inflight-thefts", "date": "2026-04-14T12:53:00+07:00", "desc": "A Chinese man has been apprehended after emerging from an aircraft for allegedly stealing money from his compatriots on a flight to Bangkok from Vientiane, authorities said on Tuesday.", "desc_original": "A Chinese man has been apprehended after emerging from an aircraft for allegedly stealing money from his compatriots on a flight to Bangkok from Vientiane, authorities said on Tuesday.", "summary_cn": "当局周二表示，一名中国籍男子因涉嫌在从老挝万象（Vientiane）飞往曼谷（Bangkok）的航班上偷窃同胞钱财，在抵达曼谷机场下机后被立即逮捕。此类针对机舱乘客财物的“空中大盗”行为近期偶有发生，警方提醒旅客在飞行过程中应妥善保管随身贵重物品。该男子目前已被移送至相关部门接受法律审判。", "importance": "P1", "section_hint": "cn_thai", "location_detail": "Suvarnabhumi Airport", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_inflight_theft_arrest_2026", "added_date": "2026-04-15", "time_sensitive": false, "expires_date": "2026-05-15", "title_cn": "一名中国籍男子涉嫌在飞往曼谷航班上盗窃被捕"}, {"id": "17bf110c7327", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "清莱（Chiang Rai）宋干节旅游火热，三国边界庆典吸引大量游客", "url": "https://thethaiger.com/news/national/chiang-rai-songkran-festival-boosts-tourism-despite-heat", "date": "2026-04-14T08:30:19+00:00", "desc": "Chiang Rai Songkran festival boosts tourism despite heat Legacy Chiang Rai&#8217;s Songkran festival draws crowds to the Mekong River, with tourists cooling off in water activities and celebrating the Thai New Year along the banks in Chiang Saen district. The &#8220;Maha Songkran Three Nations&#8221; festival officially kicked off on April 13, with visitors braving the northern Thailand heat to join in the festivities.", "desc_original": "Chiang Rai Songkran festival boosts tourism despite heat Legacy Chiang Rai's Songkran festival draws crowds to the Mekong River, with tourists cooling off in water activities and celebrating the Thai New Year along the banks in Chiang Saen district. The \"Maha Songkran Three Nations\" festival officially kicked off on April 13, with visitors braving the northern Thailand heat to join in the festivities.", "summary_cn": "清莱（Chiang Rai）的宋干节庆祝活动极大地提振了当地旅游业。尽管北泰地区气候炎热，但在清盛县（Chiang Saen）湄公河畔举行的“三国大宋干节”系列活动吸引了大量游客。游客们前往岸边戏水消暑，庆祝泰国新年。该活动深入结合了当地边境文化特色，展现了清莱作为重要旅游目的地的活力。", "importance": "P3", "section_hint": "thailand", "location_detail": "Chiang Saen", "city_t c12a2a7", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "114万人同一天挤地铁，宋干节期间曼谷到底有多火", "url": "https://www.thaiheadlines.com/187014/", "date": "2026-04-14T06:36:12+00:00", "desc_original": "泰国头条新闻社讯 据泰媒报道，4月13日，正值2026年宋干节出行高峰期，曼谷城市轨道交通迎来客流爆发式增长。泰国交通部轨道交通厅发布数据显示，当天曼谷及周边轨道系统总客流达到114.86万人次。", "title_cn": "曼谷（Bangkok）宋干节交通压力剧增：轨道交通单日客流破114万人次", "summary_cn": "4月13日正值宋干节首日出行高峰。泰国交通部最新数据显示，曼谷及周边地区的捷运系统（MRT/BTS）单日总客流突破114.86万人次。大量游客与本地民众选择轨道交通出行以避开地面拥堵。提醒由于泼水节庆祝活动仍在继续，相关站点接下来的客流量仍将保持高位。", "importance": "P2", "section_hint": "bangkok", "location_detail": "曼谷轨道交通系统", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-04-30", "event_id": "bangkok_mrt_bts_peak_songkran_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "c08e9f2b7809", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Online scams top 7,300 cases in week", "url": "https://www.bangkokpost.com/thailand/general/3236530/online-scams-top-7300-cases-in-week", "date": "2026-04-14T06:34:00+07:00", "desc_original": "More than 7,300 online crime cases were reported last week, with losses exceeding 397 million baht, says assistant national police chief Pol Lt Gen Jirabhop Bhuridej.", "title_cn": "泰国单周网络诈骗案超7300宗，涉案金额近4亿铢", "summary_cn": "泰国警察总署副署长吉拉普（Pol Lt Gen Jirabhop Bhuridej）透露，仅在过去一周，全国接报的网络犯罪案件就超过了7300起，损失金额高达3.97亿泰铢。最常见的作案手段包括虚假购物、诱导理财和电信诈骗。警方提醒，宋干节期间是网络诈骗的高发期，在泰居民需警惕不明链接及非官方交易平台，以免陷入财务陷阱。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": true, "expires_date": "2026-04-29", "event_id": "thailand_online_crime_stat_april_2026", "status": "pending", "added_date": "2026-04-14"}, {"id": "a99ed960b30a", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "中国男子在航班上偷同胞6.5万泰铢，落地泰国当场被抓", "url": "https://www.thaiheadlines.com/187010/", "date": "2026-04-14T06:06:24+00:00", "desc_original": "泰国头条新闻社讯 据泰媒报道，4月13日，一名中国籍男子在从老挝飞往泰国的航班上盗窃同胞财物，落地曼谷素万那普机场后即被警方当场抓获。", "title_cn": "中国籍男子在老挝飞曼谷航班上行窃，于素万那普机场（Suvarnabhumi）被捕", "summary_cn": "4月13日，一名中国籍男子在老挝飞往泰国的航班上，趁隙盗取同胞游客行李中的6.5万泰铢。落地曼谷素万那普机场后，泰国警方接报后介入调查并当场抓获该嫌疑人。节日期间出行频繁，提醒游客在机舱内务必看管好个人贵重财物，警惕跨国航班上的“拉链贼”。", "importance": "P1", "section_hint": "cn_thai", "location_detail": "素万那普机场 Suvarnabhumi Airport", "city_tag": "#曼谷", "topic_tag": "#中泰", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-15", "event_id": "bkk_airport_chinese_theft_arrest_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "9b14fcc75370", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "UK pushes digital trade ties", "url": "https://www.bangkokpost.com/thailand/general/3236590/uk-pushes-digital-trade-ties", "date": "2026-04-14T06:01:00+07:00", "desc_original": "The United Kingdom is looking to expand cooperation with Thailand in digital technology, covering trade and innovation, says Martin Kent, His Majesty's Trade Commissioner for Asia Pacific, during a recent visit to Thailand.", "title_cn": "英国拟深化与泰国数字贸易合作，涵盖创新与技术领域", "summary_cn": "英国驻亚太地区贸易专员马丁·肯特（Martin Kent）在访泰期间表示，英国正致力于扩大与泰国在数字技术领域的深度合作。此次合作旨在加强双方在跨境贸易、数字创新及科技研发方面的联系。英方看好泰国的数字先行潜力，认为通过技术共享与政策对接，两国企业可共同开拓东盟数字市场。这也标志着泰国正加速吸引高质量外资及高端技术人才。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.85, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-14", "event_id": "uk_thailand_digital_trade_talks_2026", "status": "pending", "added_date": "2026-04-14"}, {"id": "4d5863baa6f4", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国保委会（OIC）降低风险资本费率，股指有望迎来机构资金加持", "url": "https://www.bangkokpost.com/business/general/3236615/bourse-to-benefit-from-oics-lower-risk-charge", "date": "2026-04-14T05:47:00+07:00", "desc_original": "The Office of Insurance Commission's (OIC) decision to reduce the equity risk charge for domestic investments is expected to unlock significant institutional inflows into the stock market this year, as insurers gain greater flexibility to allocate capital to higher-return assets.", "summary_cn": "泰国保险委员会办公室（OIC）宣布决定降低国内投资的股权风险费用，此举被视为股市重大利好。通过降低风险拨备门槛，保险公司将拥有更大的灵活性将资金调配至高回报资产。预计这一政策调整将在今年内为泰国股票市场释放大量机构资金流入，提振资本市场流动性。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_oic_investment_policy_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": true, "expires_date": "2026-04-29", "title_cn": "泰国保委会（OIC）降低风险资本费率，股指有望迎来机构资金加持"}, {"id": "980210f2e867", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "男子因在宋干节期间猥亵女记者被捕", "url": "https://thethaiger.com/news/national/man-arrested-for-groping-journalist-during-songkran-festival", "date": "2026-04-14T05:45:46+00:00", "desc": "Police arrested a man accused of groping a female journalist on Rama 4 Road during Songkran celebrations on Sunday afternoon.", "desc_original": "Police arrested a man accused of groping a female journalist on Rama 4 Road during Songkran celebrations on Sunday afternoon.", "title_cn": "男子因在宋干节期间猥亵女记者在拉玛四路（Rama 4 Road）被捕", "summary_cn": "上周日下午，泰国警方逮捕了一名涉嫌猥亵女记者的男子。事发时，该记者正在曼谷拉玛四路（Rama 4 Road）进行宋干节庆祝活动的直播报道。该男子的不当行为被直播镜头捕捉并在社交媒体广泛传播，警方迅速采取行动将其抓获，并提醒在节日期间尊重女性及公共道德法规。", "importance": "P1", "section_hint": "bangkok", "location_detail": "拉玛四路 Rama 4 Road", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-15", "event_id": "bangkok_songkran_harassment_arrest", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "26e312eed15c", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国政府住宅银行（GH Bank）宣布数字化转型，引入生成式AI提升服务", "url": "https://www.bangkokpost.com/business/general/3236630/gh-bank-aims-to-elevate-operations-with-digital-upgrade", "date": "2026-04-14T05:17:00+07:00", "desc_original": "Government Housing (GH) Bank, a state financial institution specialising in housing loans, is preparing to upgrade its operations through digital transformation and the adoption of generative artificial intelligence (AI).", "summary_cn": "专门从事住房贷款的泰国国营金融机构——政府住宅银行（GH Bank）正准备通过数字化转型升级其业务模式。该银行计划引入生成式人工智能（AI）技术，以优化运营效率并提升客户服务体验。作为国家住房信贷的核心力量，此举标志着政府机构在金融科技领域的深度应用迈入新阶段。", "importance": "P2", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "gh_bank_digital_transformation_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": false, "expires_date": "2026-05-14", "title_cn": "泰国政府住宅银行（GH Bank）宣布数字化转型，引入生成式AI提升服务"}, {"id": "1beb767cae35", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "宋干节安保升级：曼谷考山路与席隆路部署无人机监控人潮", "url": "https://www.bangkokpost.com/thailand/general/3236430/checkpoints-drones-used-to-secure-songkran-crowds", "date": "2026-04-14T05:02:00+07:00", "desc_original": "Authorities have stepped up safety measures nationwide as crowds surge into key Songkran hotspots, with Khao San and Silom roads drawing particularly large numbers of revellers.", "summary_cn": "随着宋干节人流涌向各大热门地点，泰国当局已在全国范围内加强安保措施。特别是在曼谷的考山路（Khao San Road）和席隆路（Silom Road）等泼水节核心战区，警方不仅设立了多个检查站，还部署了无人机进行实时航拍监控，以防止拥挤踩踏事故并确保民众及游客的安全。", "importance": "P1", "section_hint": "bangkok", "location_detail": "考山路、席隆路", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "origin": "rss", "event_id": "songkran_safety_measures_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": true, "expires_date": "2026-04-29", "title_cn": "宋干节安保升级：曼谷考山路与席隆路部署无人机监控人潮"}, {"id": "f8d69826c258", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "民主党副主席 Korn 敦促证监会（SEC）调查邦查克（Bangchak）董事会变动疑云", "url": "https://www.bangkokpost.com/thailand/general/3236525/korn-urges-sec-to-probe-bangchak-board-changes", "date": "2026-04-14T04:23:00+07:00", "desc_original": "Deputy Democrat leader Korn Chatikavanij has called on the Securities and Exchange Commission (SEC) to investigate alleged irregularities at Bangchak Corporation Plc, citing concerns over corporate governance, board appointments and possible links to so-called \"grey capital\".", "summary_cn": "泰国民主党副党魁 Korn Chatikavanij 公开呼吁证券交易委员会（SEC）对邦查克公司（Bangchak Corporation Plc）近期的人事变动展开调查。Korn 对该公司的企业治理表示担忧，质疑董事会任命过程中存在违规行为，并称可能与所谓的“灰色资本”有关联，要求监管部门彻查以维护市场透明度。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "bangchak_sec_investigation_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": false, "expires_date": "2026-05-14", "title_cn": "民主党副主席 Korn 敦促证监会（SEC）调查邦查克（Bangchak）董事会变动疑云"}, {"id": "b8166f0714e5", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "标准普尔（S&P）警示泰国企业信用压力：高杠杆公司现金流面临挑战", "url": "https://www.bangkokpost.com/business/general/3236575/sp-warns-of-rising-corporate-credit-stress", "date": "2026-04-14T04:06:00+07:00", "desc_original": "Thai companies with high leverage are likely to face negative cash flow over the next two years, due to the impact of the conflict in the Middle East.", "summary_cn": "国际评级机构标准普尔（S&P）发布报告警告称，受中东冲突影响导致的全球局势不稳定，高杠杆的泰国企业在未来两年内可能面临负现金流的困境。高企的债务负担结合地缘政治引发的供应链和成本波动，使得泰国企业的信用风险进一步上升，投资者需警惕潜在的企业违约压力。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "sandp_thai_corporate_warning_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": false, "expires_date": "2026-05-14", "title_cn": "标准普尔（S&P）警示泰国企业信用压力：高杠杆公司现金流面临挑战"}, {"id": "90f7c5feeb53", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国宋干节出“最严规定”，不守规最高罚20万泰铢！", "url": "https://www.thaiheadlines.com/187004/", "date": "2026-04-14T04:03:04+00:00", "desc": "泰国头条新闻社讯 4月14日，据泰媒报道，泰国警方公布2026年宋干节考山路泼水活动 management 措施及“宋干节10项禁令”，对游客行为进行全面规范。", "desc_original": "泰国头条新闻社讯 4月14日，据泰媒报道，泰国警方公布2026年宋干节考山路泼水活动 management 措施及“宋干节10项禁令”，对游客行为进行全面规范。", "title_cn": "曼谷考山路（Khaosan Road）发布“宋干节10项禁令”，违反者最高罚款20万铢", "summary_cn": "泰国警方针对2026年宋干节发布了考山路（Khaosan Road）强化管理规定，旨在规范游客行为并保障安全。禁令内容包括严禁携带高压水枪、严禁泼冷水、严禁在非规定区域进行性暗示舞蹈等。若违反相关治安法规或公共卫生管理条例，由于正值全国重点管控期，涉事者最高可面临20万泰铢的重罚。", "importance": "P1", "section_hint": "bangkok", "location_detail": "考山路 Khaosan Road", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-04-30", "event_id": "songkran_regulations_khaosan_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "81f036f60bb8", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Chinese man caught stealing on flight to Thailand", "url": "https://thethaiger.com/news/national/chinese-man-caught-stealing-on-flight-to-thailand", "date": "2026-04-14T02:45:20+00:00", "desc": "Thai tourist police arrested a Chinese national on Sunday, April 13, after he was caught stealing cash from a fellow passenger aboard a flight arriving at Suvarnabhumi Airport from Laos.", "desc_original": "Thai tourist police arrested a Chinese national on Sunday, April 13, after he was caught stealing cash from a fellow passenger aboard a flight arriving at Suvarnabhumi Airport from Laos.", "title_cn": "一中国籍男子在飞往曼谷素万那普机场（Suvarnabhumi Airport）的航班上因行窃被捕", "summary_cn": "4月13日，泰国旅游警察在曼谷素万那普机场（Suvarnabhumi Airport）逮捕了一名中国籍男子。据悉，该男子在从老挝飞往泰国的航班上位移他人行李并窃取现金，被同机乘客察觉。飞机降落后，机组人员配合警方迅速将其控制。由于当前正值旅游旺季，警方特别提醒旅客在机舱内务必看管好个人财物。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "素万那普机场 Suvarnabhumi Airport", "city_tag": "#曼谷", "topic_tag": "#中泰", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-15", "event_id": "china_national_flight_theft_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "6a2b156e32f2", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国总理太接地气！亲自下场打水仗，与民同乐玩嗨了", "url": "https://www.thaiheadlines.com/186997/", "date": "2026-04-14T02:20:58+00:00", "desc": "泰国头条新闻社讯 据泰媒报道，4月13日，泰国总理兼内政部长阿努廷在红统府出席“考素路宋干节”活动，并亲自下场与民众一起打水仗。", "desc_original": "泰国头条新闻社讯 据泰媒报道，4月13日，泰国总理兼内政部长阿努廷在红统府出席“考素路宋干节”活动，并亲自下场与民众一起打水仗。", "title_cn": "泰国总理阿努廷（Anutin）现身红统府（Ang Thong）与民同乐欢庆宋干节", "summary_cn": "4月13日，泰国总理兼内政部长阿努廷（Anutin Charnvirakul）前往红统府（Ang Thong）参加当地著名的“考素路宋干节”庆祝活动。阿努廷不仅亲自参与了传统泼水互动，还与当地民众亲切交流，展现亲民形象。此举旨在提振地方旅游士气并推广宋干节作为泰国软实力的全球影响力。", "importance": "P3", "section_hint": "thailand", "location_detail": "红统府 Ang Thong", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-15", "event_id": "pm_anutin_songkran_participation_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "4cde9547c344", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "油价狂飙怎么办？泰国启动全国降价行动，3000种商品降幅达58%", "url": "https://www.thaiheadlines.com/186994/", "date": "2026-04-14T01:59:27+00:00", "desc": "泰国头条新闻社讯 4月14日，据泰媒报道，受美伊谈判破裂影响，国际油价大幅上涨。在此背景下，泰国政府紧急出手应对通胀压力，启动“泰国人帮泰国人”项目。", "desc_original": "泰国头条新闻社讯 4月14日，据泰媒报道，受美伊谈判破裂影响，国际油价大幅上涨。在此背景下，泰国政府紧急出手应对通胀压力，启动“泰国人帮泰国人”项目。", "title_cn": "应对国际油价上涨，泰国启动“泰国人帮泰国人”万款商品降价行动", "summary_cn": "受中东局势影响，国际油价波动引发泰国通胀压力。泰国政府紧急启动“泰国人帮泰国人”大规模降价项目。该计划联手全国各大型商超及连锁零售商，针对食品、生活日用品等逾3000种商品进行降价处理，最高降幅达58%，旨在减轻老百姓的生活负担，缓解油价上涨对居民日常消费的连锁冲击。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-04-30", "event_id": "thailand_anti_inflation_discount_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "d800b34a7fd8", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泼水节曼谷人潮汹涌，60万人次单日制造近60吨垃圾", "url": "https://www.thaiheadlines.com/186987/", "date": "2026-04-14T01:42:06+00:00", "desc": "泰国头条新闻社讯 据泰媒报道，4月13日，曼谷市政府公布2026年宋干节最新数据。4月10日至12日三天，曼谷重点泼水活动区域累计吸引参与人数达60.3万人次，仅4月12日当天就达55.8万人次。与此同时，单日垃圾总量达到58.65吨，节日氛围与人流压力并存。", "desc_original": "泰国头条新闻社讯 据泰媒报道，4月13日，曼谷市政府公布2026年宋干节最新数据。4月10日至12日三天，曼谷重点泼水活动区域累计吸引参与人数达60.3万人次，仅4月12日当天就达55.8万人次。与此同时，单日垃圾总量达到58.65吨，节日氛围与人流压力并存。", "title_cn": "泼水节曼谷人潮汹涌，60万人次单日制造近60吨垃圾", "summary_cn": "曼谷市政府公布2026年宋干节（Songkran）期间数据，4月10至12日重点泼水区域累计吸引超60.3万人次。其中4月12日单日人流量达55.8万，造成全市单日垃圾总量飙升至58.65吨。大量外籍游客与本土民众涌入，给曼谷市政环卫及交通系统带来巨大压力，政府正加强清运处理以维持市容。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷重点泼水活动区", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-15", "event_id": "bangkok_songkran_waste_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-15"}, {"id": "92e7e65235c5", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "R&B歌手 Jenevieve 将于6月登陆曼谷 BKK 开启首演", "url": "https://www.bangkokpost.com/life/arts-and-entertainment/3236625/rb-singer-jenevieve-coming-to-bkk-in-june", "date": "2026-04-14T01:01:00+07:00", "desc_original": "Miami-born R&amp;B and neo-soul artist Jenevieve is set to make her highly anticipated Bangkok debut as part of her \"The CRYSALIS Tour &ndash; Worldwide\", with a live performance scheduled for June 2 at Samyan Mitrtown Hall.", "title_cn": "R&B 歌手 Jenevieve 将于6月在曼谷 Samyan Mitrtown 首演", "summary_cn": "出生于迈阿密的 R&B 和新灵魂乐艺人 Jenevieve 将在曼谷开启其备受期待的首秀。作为其“The CRYSALIS Tour – Worldwide”全球巡演的一部分，她定于6月2日在曼谷三养米特尔顿大厅（Samyan Mitrtown Hall）举行现场表演。这为喜爱西方流行音乐的在泰听众提供了高水准的视听盛宴。", "importance": "P3", "section_hint": "bangkok", "location_detail": "Samyan Mitrtown", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.8, "tags": [], "origin": "rss", "event_id": "jenevieve_bangkok_concert_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": true, "expires_date": "2026-04-29"}, {"id": "c7e0d65e695a", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "Choose your shield against UV rays", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3236570/choose-your-shield-against-uv-rays", "date": "2026-04-14T01:01:00+07:00", "desc_original": "Ultraviolet radiation levels in Thailand have been steadily rising, leading to more people incorporating sunscreen into their daily routines. With the country's tropical climate and strong year-round sun exposure, UV rays remain a constant presence even on cloudy days.", "title_cn": "面对泰国不断攀升的紫外线指数，如何选择防晒盾牌", "summary_cn": "泰国境内的紫外线辐射水平持续呈上升趋势，促使更多居民将防晒纳入日常护理。由于泰国属于典型的热带气候，全年阳光照射强烈，即使在阴天，紫外线依然无处不在。专家提醒在泰外籍人士和游客注意防晒，以应对强烈的紫外线对皮肤健康的潜在威胁。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#健康", "relevance_score": 0.75, "tags": [], "origin": "rss", "event_id": "thailand_uv_protection_guide_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": false, "expires_date": "2026-05-14"}, {"id": "224a65aa281f", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "Queen Mother honoured at Central Embassy's 'A Sense Of Thai 2026' textile showcase", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3236580/queen-mother-honoured-at-central-embassys-a-sense-of-thai-2026-textile-showcase", "date": "2026-04-14T01:01:00+07:00", "desc_original": "The heritage of Thai textiles is presented in a contemporary global context during \"A Sense Of Thai 2026: Rooted In Heritage &ndash; A Textile Through Time\", which is running at Central Embassy, Phloenchit Road, until Sunday.", "title_cn": "曼谷尚泰领使商场 Central Embassy 举办织物展，致敬泰国王太后", "summary_cn": "名为“2026 泰之感：植根遗产——跨越时空的织物”的展览正在位于曼谷菲隆奇路（Phloenchit Road）的尚泰领使商场（Central Embassy）举行。此次展览旨在通过现代全球视野展示泰国传统纺织遗产，并向诗丽吉王太后致敬。活动将持续至本周日，是了解泰国丝绸文化与现代设计的绝佳机会。", "importance": "P3", "section_hint": "bangkok", "location_detail": "Phloenchit Road", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "central_embassy_thai_textile_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": true, "expires_date": "2026-04-29"}, {"id": "6684201dae5d", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "Samui Summer Jazz series returns to InterContinental", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3236595/samui-summer-jazz-series-returns-to-intercontinental", "date": "2026-04-14T01:01:00+07:00", "desc_original": "Sk&aring;l International Koh Samui will bring back its Samui Summer Jazz series in 2026 with \"Jazz Rhythms In The Air\" for one night only on April 28 at 8pm, at the InterContinental Koh Samui Resort, Surat Thani.", "title_cn": "苏梅岛夏季爵士音乐系列赛回归洲际酒店", "summary_cn": "苏梅岛 Skål 国际协会宣布，2026年苏梅岛夏季爵士乐系列赛将回归。名为“空中爵士律动”（Jazz Rhythms In The Air）的特别演出定于4月28日晚上8点在素叻他尼府（Surat Thani）的苏梅岛洲际度假酒店（InterContinental Koh Samui Resort）限时举行一晚。此类文化活动极大地丰富了苏梅岛作为高端度假胜地的娱乐体验。", "importance": "P3", "section_hint": "thailand", "location_detail": "Koh Samui", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "samui_summer_jazz_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": true, "expires_date": "2026-04-29"}, {"id": "221d7b429784", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "The unfinished rainbow", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3236635/the-unfinished-rainbow", "date": "2026-04-14T01:01:00+07:00", "desc_original": "Thailand's legalisation of same-sex marriage is often touted as a sign of progress in gender equality. Advocates, however, point out that controversy over gender recognition reveals conditional acceptance.", "title_cn": "泰国同性婚姻合法之后：平权之路仍面临“有条件的接纳”", "summary_cn": "泰国同性婚姻合法化被视为性别平等的一大进步，但社会各界对此仍有不同声音。倡导者指出，关于法律性别认定（Gender Recognition）的争议暴露了当前社会对LGBTQ+群体仅是“有条件的接纳”。这反映出泰国在法律形式进步之后，在更深层次的权利保障与社会认知层面仍面临诸多挑战。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_lgbtq_rights_progress_2026", "status": "pending", "added_date": "2026-04-14", "time_sensitive": false, "expires_date": "2026-05-14"}, {"id": "37b4270ff305", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "陶公府议员遭伏击案取得进展，4名嫌疑人落网", "title_cn": "陶公府议员遭伏击案取得进展，4名嫌疑人落网（Narathiwat）", "url": "https://www.bangkokpost.com/thailand/general/3236375/arrests-made-in-mp-ambush-case", "date": "2026-04-13T19:05:00+07:00", "desc": "The Fourth Army Region commander confirmed the arrest of four suspects linked to the attempted assassination of Narathiwat MP Kamonsak Leewamoh, as authorities continue to hunt for a fifth suspect.", "desc_original": "The Fourth Army Region commander confirmed the arrest of four suspects linked to the attempted assassination of Narathiwat MP Kamonsak Leewamoh, as authorities continue to hunt for a fifth suspect.", "summary_cn": "泰军第四军区指挥官证实，军警已逮捕4名涉嫌暗杀陶公府（Narathiwat）民代卡蒙萨（Kamonsak Leewamoh）的嫌疑人。此前该议员在驾车途中遭遇武装伏击，引发社会高度关注。目前警方仍在全力追捕第5名在逃嫌疑人。此案凸显了泰国南部边境地区安全局势的复杂性与政治人物面临的安全风险。", "importance": "P2", "section_hint": "thailand", "location_detail": "陶公府 Narathiwat", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-14", "event_id": "thailand_mp_assassination_arrest_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-14"}, {"id": "813cfb64e9d6", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": 间向公众开放去年泰柬边境冲突中的两个重要战略点：历史文化遗址塔快古庙（Ta Kwai）及附近的350高地。此举旨在刺激当地边境旅游，展现边境局势趋于稳定。军方将负责游客在参观敏感区域时的安全监管。此地过去曾因领土主权问题爆发激烈军事碰撞。", "importance": "P3", "section_hint": "thailand", "location_detail": "苏林府 Surin", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-04-29", "event_id": "surin_border_opening_songkran_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-14"}, {"id": "3f12c8d98c83", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "受燃油成本上涨影响，韩国航司调整赴泰航班", "title_cn": "受燃油成本上涨影响，韩国航司调整赴泰航班", "url": "https://www.bangkokpost.com/business/general/3236279/south-korean-airlines-make-changes-to-thai-flights", "date": "2026-04-13T14:31:00+07:00", "desc": "Jet fuel hikes have forced South Korean no-frills airlines to adjust or in some cases suspend flights to Thai destinations as the Middle East war continues to bite into the aviation sector.", "desc_original": "Jet fuel hikes have forced South Korean no-frills airlines to adjust or in some cases suspend flights to Thai destinations as the Middle East war continues to bite into the aviation sector.", "summary_cn": "由于中东战争局势持续紧张导致航空燃油价格飙升，多家韩国廉价航空公司（LCC）被迫调整，甚至暂停部分飞往泰国的定期航班。燃油附加费的上涨显著增加了承运成本，影响了宋干节及随后的往返旅游运力。泰方相关部门正密切关注国际航权变动对韩国客源市场的影响，相关航线乘客需及时核实行程状态。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-14", "event_id": "korean_airlines_thai_flight_changes_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-14"}, {"id": "036dfcae4ab5", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "顶风作案，泰男试图偷运汽油至缅甸被捕", "title_cn": "泰男顶风作案企图向缅甸私运400升汽油被捕", "url": "https://www.thaiheadlines.com/186982/", "date": "2026-04-13T09:45:16+00:00", "desc": "泰国头条新闻社讯 4月13日，泰国Surasee部队Lat Ya特别任务小组于近日联合桑卡拉武里警察局、第134边境巡逻警察，以及桑卡拉武里县的行政工作人员，在Nong Lu镇第8村Nam Krik检查点抓获了一名56岁的泰国男子，其在车内偷藏近400升汽油，正准备运往缅甸出售。", "desc_original": "泰国头条新闻社讯 4月13日，泰国Surasee部队Lat Ya特别任务小组于近日联合桑卡拉武里警察局、第134边境巡逻警察，以及桑卡拉武里县的行政工作人员，在Nong Lu镇第8村Nam Krik检查点抓获了一名56岁的泰国男子，其在车内偷藏近400升汽油，正准备运往缅甸出售。", "summary_cn": "4月13日，泰国Surasee部队联合桑卡拉武里（Sangkhlaburi）警方在北碧府Nong Lu镇边境检查点拦截一辆改装货车，抓获一名56岁泰国籍男子。该男子在车内私自加装油箱，企图非法向缅甸偷运并走私贩卖400余升汽油以牟取差价。目前该男子已被带往警局接受调查，此案暴露了边境燃油走私活动的活跃及军方严密的边防巡查。", "importance": "P3", "section_hint": "thailand", "location_detail": "桑卡拉武里 Sangkhlaburi", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-14", "event_id": "thailand_myanmar_fuel_smuggling_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-14"}, {"id": "4ab6c918cba5", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国宋干节（Songkran）前3天交通运力充足，累计出行超780万人次", "url": "https://www.thaiheadlines.com/186979/", "date": "2026-04-13T09:14:42+00:00", "desc_original": "泰国头条新闻社讯 4月13日，泰国交通部交通安全指挥中心透露，截至今天上午7点，宋干节期间（4月10-12日）的公共交通系统运力充足，全国累计公共交通使用量为7,817,280人次，较去年同期（2025年4月11-13日）微降0.11%。", "summary_cn": "泰国交通部发布数据，2026年宋干节（Songkran）假期前三天（4月10日至12日），泰国全国公共交通系统运行平稳，总客流量达到781.7万人次，较去年同期略微下降0.11%。官方表示运力准备充分，能够满足节日期间大规模人口流动及旅游出行的需求。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-04-29", "origin": "rss", "event_id": "thailand_songkran_transport_2026", "status": "pending", "added_date": "2026-04-14", "title_cn": "泰国宋干节（Songkran）前3天交通运力充足，累计出行超780万人次"}, {"id": "16e97a09c75d", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国新内阁施政方针遭敦促落实，各界呼吁采取可衡量的行动", "url": "https://www.bangkokpost.com/business/general/3236088/calls-for-measurable-action", "date": "2026-04-13T07:25:00+07:00", "desc": "Two months after a hard-fought general election, the new government has begun its administration, having formally pr 34:46+00:00", "desc_original": "泰国头条新闻社讯 4月13日，泰国陆军司令部公布了2026年度征兵检查结果。统计数据显示，今年共有434,778名泰国男性接受征兵检查，总征召人数为62,318人，比去年减少5,504人。其中志愿入伍者共27,698人，占征召总数的44.45%，较去年增加1,508人。", "summary_cn": "泰国陆军司令部公布2026年征兵统计，今年共有43.4万余名男性参加检查，实际征召62,318人。值得关注的是，志愿入伍人数达27,698人，占比提升至44.45%，显示出泰国民众通过志愿渠道参军的意愿增强。尽管总征兵数较去年有所下降，但军方政策导向正逐渐向全面志愿兵役制转型过渡。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-14", "origin": "rss", "event_id": "thailand_military_draft_2026_results", "status": "pending", "added_date": "2026-04-14", "title_cn": "2026年泰国陆军征兵结果公布，志愿入伍比例显著上升"}, {"id": "3fef1bb8bd44", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国民主党副党魁辞职并加入政府团队，负责欧盟自贸协定谈判", "url": "https://www.thaiheadlines.com/186962/", "date": "2026-04-13T03:13:11+00:00", "desc_original": "泰国头条新闻社讯 4月12日，泰国民主党副党魁威拉蓬已正式递交辞呈，辞去民主党副党魁一职，并官宣加入副总理兼商业部部长素帕琪的团队，出任泰国贸易代表，负责泰国与欧盟自由贸易协定（FTA）的谈判工作。", "summary_cn": "原泰国民主党副党魁威拉蓬（Wiraphon）辞去党内职务，高调加盟政府经济团队。他将担任泰国贸易代表，受副总理兼商业部长素帕琪（Suphakit）直接领导，主要抓手是负责泰国与欧盟（EU）之间的自由贸易协定（FTA）谈判。此举反映了泰国政坛人员跨党派流动及其对国际贸易协定的高度重视。", "importance": "P2", "section_hint": "thailand", "location_detail": "曼谷", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-14", "origin": "rss", "event_id": "thailand_politics_fta_negotiator_2026", "status": "pending", "added_date": "2026-04-14", "title_cn": "泰国民主党副党魁辞职并加入政府团队，负责欧盟自贸协定谈判"}, {"id": "5e8a0206543e", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泼水变“灭火”？两名外国人在泰持灭火器向人群喷射", "url": "https://www.thaiheadlines.com/186956/", "date": "2026-04-13T02:42:59+00:00", "desc": "泰国头条新闻社讯 4月13日凌晨约5点，两名外国人在泰国芭提雅步行街的宋干节庆祝活动中，竟拿出灭火器朝狂欢人群喷射，引发现场混乱，并造成不少财物损坏。", "desc_original": "泰国头条新闻社讯 4月13日凌晨约5点，两名外国人在泰国芭提雅步行街的宋干节庆祝活动中，竟拿出灭火器朝狂欢人群喷射，引发现场混乱，并造成不少财物损坏。", "title_cn": "泼水变“灭火”？两名外国人在芭提雅 Pattaya 持灭火器向人群喷射被捕", "sum -seize-five-boats-cambodia-smuggling-bust", "date": "2026-04-12T10:27:35+00:00", "desc": "Trat officials seize five boats in Cambodia smuggling bust Legacy Officials intercepted a smuggling operation transporting consumer goods and animal products from Thailand to Cambodia along the coastal border in Hat Lek, Trat, on April 12, seizing multiple boats and arresting six suspects .", "tags": [], "origin": "rss", "topic_tag": "#治安", "relevance_score": 0.9, "added_date": "2026-04-13", "desc_original": "Trat officials seize five boats in Cambodia smuggling bust Legacy Officials intercepted a smuggling operation transporting consumer goods and animal products from Thailand to Cambodia along the coastal border in Hat Lek, Trat, on April 12, seizing multiple boats and arresting six suspects .", "title_cn": "达府（Trat）官员截获五艘涉嫌向柬埔寨走私货物的快艇", "summary_cn": "4月12日，泰国达府（Trat）哈莱克（Hat Lek）沿海边境官员成功拦截了一起跨国走私行动。执法人员查获了五艘正试图向柬埔寨非法运送消费品和动物产品的船只。行动中共有六名嫌疑人被捕。此次打击行动旨在维护泰柬边境贸易秩序，严查逃避关税的非法跨境运输行为。", "importance": "P2", "section_hint": "thailand", "location_detail": "哈莱克 Hat Lek", "city_tag": "#达府", "time_sensitive": false, "expires_date": "2026-05-13", "event_id": "trat_cambodia_smuggling_bust_2026", "status": "pending"}, {"id": "49e8db2cd12b", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "护泰党（Rak Chart Party）向联合国教科文组织 UNESCO 递交信函，敦促进行更严格审查", "url": "https://thethaiger.com/news/world/rak-chart-party-submits-unesco-letter-urging-tighter-review", "date": "2026-04-12T09:40:49+00:00", "desc": "Rak Chart Party submits UNESCO letter urging tighter review Legacy Representatives of the Rak Chart Party travelled to Paris, France, to submit a letter to UNESCO headquarters today, April 12, expressing appreciation for its recognition of Thai cultural heritage while also calling for careful evaluation of world heritage registrations .", "desc_original": "Rak Chart Party submits UNESCO letter urging tighter review Legacy Representatives of the Rak Chart Party travelled to Paris, France, to submit a letter to UNESCO headquarters today, April 12, expressing appreciation for its recognition of Thai cultural heritage while also calling for careful evaluation of world heritage registrations .", "title_cn": "护泰党（Rak Chart Party）向联合国教科文组织 UNESCO 递交信函，敦促加强文化遗产审查权", "summary_cn": "4月12日，护泰党（Rak Chart Party）代表前往法国巴黎，向联合国教科文组织（UNESCO）总部提交正式信函。该党在信中对 UNESCO 认可泰国文化遗产表示感谢，同时强烈呼吁在世界遗产申请审查中保持严谨性和公正性，确保护泰立场得到体现。此举背景涉及泰国对周边国家申遗项目的领土与主权敏感神经，反映了泰国政界对文化遗产主权的高度关注。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "status": "pending", "added_date": "2026-04-13", "event_id": "thailand_unesco_rak_chart_2026", "time_sensitive": false, "expires_date": "2026-05-13", "origin": "rss"}, {"id": "326aaee9140a", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Indian tourist reports 25k baht theft by transgender in Pattaya", "url": "https://thethaiger.com/news/pattaya/indian-tourist-reports-25k-baht-theft-by-transgender-pattaya", "date": "2026-04-12T08:38:45+00:00", "desc": "Indian tourist reports 25k baht theft by transgender in Pattaya Legacy An Indian tourist filed a police report after allegedly being robbed by a transgender woman in a hotel room in Pattaya , Chon Buri, early yesterday, April 11.", "desc_original": "Indian tourist reports 25k baht theft by transgender in Pattaya Legacy An Indian tourist filed a police report after allegedly being robbed by a transgender woman in a hotel room in Pattaya , Chon Buri, early yesterday, April 11.", "title_cn": "印度游客在芭提雅（Pattaya）报案，称被变性人盗走2.5万泰铢", "summary_cn": "4月11日，一名印度籍游客向春武里府芭提雅（Pattaya）警方报案，称其在入住的酒店房间内被一名变性女子实施盗窃。受害人表示，对方趁机偷走了价值约2.5万泰铢的财物。此类针对游客的盗窃案在旅游旺季时有发生，芭提雅警方已调取录像展开调查。提醒赴泰游客在社交与住宿环境中保持警惕，妥善保管个人财物。", "importance": "P1", "section_hint": "pattaya", "location_detail": "芭提雅", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "status": "pending", "added_date": "2026-04-13", "event_id": "pattaya_indian_tourist_theft_2026", "time_sensitive": false, "expires_date": "2026-05-13", "origin": "rss"}, {"id": "06e328256a0c", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国老年人情绪困境：抑郁了怎么办？多数选择沉默", "url": "https://www.thaiheadlines.com/186934/", "date": "2026-04-12T08:33:13+00:00", "desc": "泰国头条新闻社讯 4月12日，据泰媒报道，泰国国家发展管理学院民调中心NIDA Poll 联合老龄社会研究中心发布了一项关于“泰国老年人抑郁状况”的调查。", "desc_original": "泰国头条新闻社讯 4月12日，据泰媒报道，泰国国家发展管理学院民调中心NIDA Poll 联合老龄社会研究中心发布了一项关于“泰国老年人抑郁状况”的调查。", "title_cn": "泰国老年人抑郁状况民调报告：多数患者倾向于自我调节或保持沉默", "summary_cn": "根据泰国国家发展管理学院（NIDA Poll）联合老龄社会研究中心最新发布的调查结果，泰国老年人群体正面临显著的情绪困境。数据显示，面对抑郁情绪，绝大多数泰国长者选择沉默、不去就医或仅通过宗教信仰、独自排解等方式应对。随着泰国社会进入老龄化，银发族的心理健康保障已成为政府和社会亟待关注的公共卫生议题。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "status": "pending", "added_date": "2026-04-13", "event_id": "thailand_elderly_depression_nida_2026", "time_sensitive": false, "expires_date": "2026-05-13", "origin": "rss"}, {"id": "833e994d93e1", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Fatal collision claims two lives during Phatthalung’s dangerous period", "url": "https://thethaiger.com/?p=996067", "date": "2026-04-12T08:30:42+00:00", "desc": "Two people died after a high-speed motorcycle collision on April 11 in Phatthalung, raising the province's death toll during the annual Songkran seven-day dangerous period to two.", "desc_original": "Two people died after a high-speed motorcycle collision on April 11 in Phatthalung, raising the province's death toll during the annual Songkran seven-day dangerous period to two.", "title_cn": "宋干节“危险七日”期间博他仑府（Phatthalung）发生致命车祸致2人遇难", "summary_cn": "4月11日，博他仑府（Phatthalung）发生一起严重的高速摩托车碰撞事故，导致2人不幸丧生。这使得该府在今年宋干节“危险七日”道路安全监控期内的死亡人数增至2人。泰国传统的“泼水节”假期由于返乡潮与酒驾频发，被视为交通事故高发期，交通管理部门已在全国范围内加强巡逻执勤，严控超速驾驶。", "importance": "P2", "section_hint": "thailand", "location_detail": "博他仑府", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "status": "pending", "added_date": "2026-04-13", "event_id": "phatthalung_songkran_traffic_fatal_2026", "time_sensitive": true, "expires_date": "2026-04-28", "origin": "rss"}, {"id": "7879b90418db", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "宋干节来了！总理阿努廷带头送祝福：出行平安、阖家幸福", "url": "https://www.thaiheadlines.com/186928/", "date": "2026-04-12T07:53:03+00:00", "desc": "泰国头条新闻社讯 4月12日，据泰媒报道，泰国总理兼内政部长阿努廷通过官方平台向全国民众发表宋干节祝福。", "desc_original": "泰国头条新闻社讯 4月12日，据泰媒报道，泰国总理兼内政部长阿努廷通过官方平台向全国民众发表宋干节祝福。", "title_cn": "泰国副总理兼内政部长阿努廷（Anutin）发表宋干节贺词，呼吁安全文明出行", "summary_cn": "4月12日，泰国副总理兼内政部长阿努廷（Anutin Charnvirakul）通过官方平台向全国民众及游客致以宋干节祝福。他在致辞中强调了阖家团圆的文化意义，并特别叮嘱民众在节日出行期间注意交通安全、遵循文明泼水指引。作为内政部长，阿努廷此举旨在提升公众在长假期间的安防意识，并传递政府对传统节日庆典的支持。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "status": "pending", "added_date": "2026-04-13", "event_id": "thailand_songkran_greeting_anutin_2026", "time_sensitive": true, "expires_date": "2026-04-28", "origin": "rss"}, {"id": "7e975f96ab45", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "泰国尚未准备好与柬埔寨进行边界谈判：西哈萨克 Sihasak", "url": "https://www.bangkokpost.com/thailand/general/3235523/thailand-not-ready-for-border-talks-with-cambodia-sihasak", "date": "2026-04-12T06:37:00+07:00", "desc_original": "Thailand is not ready to attend the Thailand-Cambodia Joint Boundary Commission (JBC) meeting scheduled for April 17-25, as internal procedures remain incomplete, Foreign Minister Sihasak Phuangketkeow said on Saturday.", "summary_cn": "泰国外交部长西哈萨克（Sihasak Phuangketkeow）于周六表示，泰国尚未准备好参加原定于4月17日至25日举行的泰柬联合边界委员会（JBC）会议。主要原因是泰国内部的相关审议程序尚未完成。此举反映了泰柬双方在领土边界划分及共同开发区等历史遗留问题上的复杂性，目前泰方仍需在内部达成一致后再开启正式的双边会谈。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": d for the southern tourist island of Koh Samui, at a pier in Bangkok. Four suspects were arrested.", "summary_cn": "周五，泰国警方在曼谷（Bangkok）一个码头成功截获近2,000公斤冰毒。这批毒品当时被藏匿在一辆皮卡车内，并已装载上准备前往南部旅游胜地苏梅岛（Koh Samui）的渡轮。警方在行动中当场抓获4名犯罪嫌疑人。此次缴获数量巨大且目标指向高端旅游岛屿，反映出贩毒集团分销网络正试图渗透进主要旅游区。", "importance": "P2", "section_hint": "bangkok", "location_detail": "曼谷码头", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "status": "pending", "event_id": "thailand_drug_seizure_samui_ferry_2026", "origin": "rss", "added_date": "2026-04-11", "title_cn": "曼谷码头拦截2000公斤冰毒，原计划运往苏梅岛（Koh Samui）"}, {"id": "98ce11c51ba0", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国SET指数逆势回升，重破1500点大关", "url": "https://www.bangkokpost.com/business/general/3234728/resilient-set-index-pushes-above-1500-points", "date": "2026-04-10T19:04:00+07:00", "desc": "Despite recent geopolitical tensions, particularly the escalation in the Middle East and energy market disruptions, Thailand’s equity market has demonstrated resilience, with the benchmark SET Index rebounding past the 1,500-point mark on Friday.", "desc_original": "Despite recent geopolitical tensions, particularly the escalation in the Middle East and energy market disruptions, Thailand’s equity market has demonstrated resilience, with the benchmark SET Index rebounding past the 1,500-point mark on Friday.", "summary_cn": "尽管近期地缘政治紧张局势加剧，尤其是中东冲突引发的能源市场波动对全球金融造成冲击，但泰国股市显现出较强的韧性。周五，基准指数SET Index成功收复并站上1500点整数关口。这显示出投资者对泰国经济基本面的信心，以及市场在外部干扰下具备的一定自我修复能力。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "status": "pending", "event_id": "thailand_set_index_rebound_2026", "origin": "rss", "added_date": "2026-04-11", "title_cn": "泰国SET指数逆势回升，重破1500点大关"}, {"id": "6672438d7b9d", "source": "Bangkok Post", "source_id s": [], "time_sensitive": false, "expires_date": "2026-05-11", "event_id": "bangkok_chinese_drug_arrest_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-11"}, {"id": "79f867651530", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰警总署公布泼水节路段封控计划 重点打击两类违规车辆", "url": "https://www.thaiheadlines.com/186859/", "date": "2026-04-10T09:27:28+00:00", "desc_original": "泰国头条新闻社 据泰媒报道，4月10日，泰国国家警察总署副署长兼交通管理中心主任桑兰表示...为应对宋干节假期连续出行高峰...", "summary_cn": "泰国国家警察总署副署长桑兰宣布，为迎接2026年宋干节（Songkran）出行高峰，交通管理中心将分段对重点地区进行交通封控。警方将严查酒驾并重点打击货车非法载人、摩托车无证驾驶等违规行为。官方提醒民众提前规划路线，遵守临时交通管治，确保泼水节期间的道路出行安全性，以减少交通事故发生率。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "time_sensitive": true, "expires_date": "2026-04-26", "event_id": "thailand_songkran_traffic_control_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-11", "title_cn": "泰警总署公布泼水节路段封控计划 重点打击两类违规车辆"}, {"id": "39dbb638303e", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰副总理阿努廷 Anutin 主持空军日招待会 提及守边记录感触落泪", "url": "https://www.thaiheadlines.com/186856/", "date": "2026-04-10T09:23:41+00:00", "desc_original": "泰国头条新闻社 据泰媒报道，4月9日18时45分，泰国总理兼内政部长阿努廷在泰国空军航空公园与夫人共同主持了2026年空军日招待会。国防部长阿杜、各军种司令、各国大使及历任空军司令等出席活动。泰国空军司令塞桑与空军配偶协会主席到场迎接。 阿努廷与夫人抵达后与F-5战机合影，并与塞桑同框留念。随后，塞桑向阿努廷赠送了Mark82炸弹模型作为纪念品。 塞桑在现场宣读了一名空军军械部门技师的工作记录。该记录称，2025年12月26日夜间，相关人员接到命令，为战机安装武器，准备在次日凌晨打击重要目标，“夺回我们的领土”。记录还称，这是一次“最后的任务”，技师表示自己很期待完成任务后回家与家人团聚，并回忆在此前任务中，飞行员每次出击均能安全返航，所装武器从未出现问题。记录称，技师最自豪的是曾在生命中的某一刻，以微小但真实的方式参与守护国家主权，并表示即使未来再次为履职而离开家人，也不会有丝毫犹豫。 阿努廷在致辞中向空军官兵表达祝福，称很高兴并深感荣幸参加2026年空军日招待会，并对空军全体官兵长期以坚韧、奉献精神履职，坚定维护国家独立、主权与安全表示感谢与赞许。他表示，过去一段时期，空军在多项政府任务中发挥了突出作用，包括灾害救援、物资赈济运输、医疗运送与空中转运病患，以及国土防卫等，具有重要价值并对国家贡献显著。 阿努廷进一步表示，赞赏空军司令、各级指挥官与全体官兵以专业精神持续推进工作，", "summary_cn": "2026年4月9日，泰国副总理兼内政部长阿努廷（Anutin Charnvirakul）主持空军日招待会。现场宣读了一份关于空军技师在2025年底执行夺回主权任务的感人工作记录。阿努廷深受触动，在致辞中赞扬空军在国土防卫、灾害救援和医疗转运方面的卓越贡献，并向守卫国家领土主权的士兵表达崇高敬意。多国大使及军方高层出席该庆典。", "importance": "P2", "section_hint": "thailand", "location_detail": "空军航空公园", "city_tag": "#曼谷", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "event_id": "thailand_air_force_day_2026_anutin", "status": "pending", "origin": "rss", "added_date": "2026-04-11", "title_cn": "泰副总理阿努廷 Anutin 主持空军日招待会 提及守边记录感触落泪"}, {"id": "1bf727cfc31a", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "宋卡府 Songkhla 发现80余名非法入境缅甸劳工 藏匿山脚灌木丛", "url": "https://thethaiger.com/news/south/more-than-80-undocumented-myanmar-migrants-found-in-songkhla", "date": "2026-04-10T09:14:17+00:00", "desc_original": "More than 80 undocumented Myanmar migrants found in Songkhla Legacy More than 80 Myanmar migrants were found hiding in a forested area at the foot of a hill in Songkhla, yesterday, April 9, as officials investigated a suspected migrant smuggling operation . Officials acted after village and subdistrict leaders reported a large group hiding in the area. District officers, police and Songkhla immigration officers were then sent to inspect the site. They found more than 80 Myanmar migrants sitting among bushes. None had identification documents or passports, so officials took them to the Na Mom d", "summary_cn": "4月9日，泰国宋卡府（Songkhla）警方与移民局官员根据村民举报，在山脚下的森林灌木丛中查获80多名缅甸籍偷渡人员。这批人员均未持有合法身份证件或护照，疑似为劳务中介偷渡至泰国境内。目前所有人已被带往纳芒县（Na Mom）警局接受调查。警方正深化行动以摧毁背后的跨国人口走私犯罪链。", "importance": "P1", "section_hint": "thailand", "location_detail": "纳芒县 Na Mom", "city_tag": "#宋卡府", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "event_id": "songkhla_illegal_migrants_arrest_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-11", "title_cn": "宋卡府 Songkhla 发现80余名非法入境缅甸劳工 藏匿山脚灌木丛"}, {"id": "f9fd86e4f3a1", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "法籍通缉犯在普吉岛 Phuket 落网 涉毒品走私及洗钱30余宗案件", "url": "https://thethaiger.com/news/phuket/wanted-frenchman-arrested-in-phuket-hotel", "date": "2026-04-10T08:15:58+00:00", "desc_original": "Frenchman wanted for drugs and money laundering arrested in Phuket Legacy A Frenchman wanted for more than 30 offences in his home country was arrested in Phuket yesterday, April 9, after fleeing to Thailand to avoid prosecution. Royal Thai Police instructed Phuket Provincial Immigration Office to locate the Frenchman, later identified as 50 year old Ani. French police were seeking his arrest over more than 30 offences linked to drug trafficking and money laundering. Investigators said the Frenchman fled after he was caught smuggling a large quantity of cocaine from Dubai into France via Paris", "summary_cn": "泰国普吉岛（Phuket）移民局于4月9日成功逮捕一名50岁法籍男子Ani。该嫌疑人在法国境内涉嫌包括跨境可卡因走私、大宗洗钱在内的30多项指控，此前其从迪拜将毒品私运至巴黎后潜逃至泰国。泰国警方在接获法方协助请求后锁定了其在普吉酒店的藏身地。目前该嫌疑人正等待引渡程序回国受审。", "importance": "P1", "section_hint": "thailand", "location_detail": "普吉岛度假酒店", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "event_id": "phuket_french_fujitive_arrest_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-11", "title_cn": "法籍通缉犯在普吉岛 Phuket 落网 涉毒品走私及洗钱30余宗案件"}, {"id": "d923cbb4c0a5", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "因鸣笛误会引发冲突 春武里邦拉蒙 Bang Lamung 外卖骑手伤错人", "url": "https://thethaiger.com/news/national/food-rider-accused-of-assaulting-wrong-man-in-honking-dispute", "date": "2026-04-10T08:05:02+00:00", "desc_original": "Food rider accused of assaulting wrong man in honking dispute Legacy A man filed a police complaint yesterday, April 9, after he was allegedly assaulted by a food delivery rider in Bang Lamung district, Chon Buri, in a dispute he said was triggered by a car horn he did not sound . Bang Lamung Police Station received the complaint from 44 year old Ekkasit, who said he had never met the rider before the incident. Ekkasit told police he was riding through Soi Nong Ket Yai to a job when an elderly couple behind him sounded their horn to warn that a plastic bag was caught in his rear wheel. Photo v", "summary_cn": "春武里府（Chon Buri）邦拉蒙县（Bang Lamung）发生一起乌龙伤害案。44岁男子报案称，其在骑行时被一名外卖骑手殴打。起因是后方一对老夫妇鸣笛提醒报案人轮毂卷入了塑料袋，但该骑手误以为是报案人对自己挑衅鸣笛。骑手拦截报案人并实施暴力，随后发现伤错人。警方目前已介入调查，再次引发对泰国路怒症及外卖配送员管理问题的讨论。", "importance": "P1", "section_hint": "pattaya", "location_detail": "邦拉蒙县 Bang Lamung", "city_tag": "#芭提雅", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "event_id": "chonburi_rider_assault_dispute_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-11", "title_cn": "因鸣笛误会引发冲突 春武里邦拉蒙 Bang Lamung 外卖骑手伤错人"}, {"id": "c212c574899b", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "外国人在曼谷（Bangkok）能买公寓吗？流程详解", "url": "https://thethaiger.com/thai-life/property/can-foreigners-buy-a-condo-in-bangkok", "date": "2026-04-10T07:31:58+00:00", "desc_original": "Can foreigners buy a condo in Bangkok? Yes, and here is how Legacy A lot of foreign residents assume they cannot own property in Thailand . That assumption is only partially correct, but when it comes to foreigners and condos in Bangkok, it is largely wrong. Under Thai law, foreign nationals can hold a full freehold title to a condominium unit, with the same ownership rights as a Thai national. Data from the Thailand Board of Investment (BOI) shows that approved foreign direct investment reached 985,337 million baht in 2025, an 82% increase from the year prior, and a growing number of foreign ", "title_cn": "外国人在曼谷（Bangkok）可以购买公寓吗？详细指南与法律权益解析", "summary_cn": "许多外籍人士误以为无法在泰国拥有房产，但法律规定外籍人士可持有公寓的永久产权（Freehold），享有与泰国国民同等的权利。根据泰国投资促进委员会（BOI）数据，2025年外国直接投资额逆势猛增82%至9853.37亿泰铢，曼谷公寓市场正吸引大量外资。本文详细分析了外籍人士在曼谷购房的门槛、操作流程及其法律保障。", "importance": "P2", "section_hint": "property", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#房产", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-11", "event_id": "bangkok_foreign_property_guide_2026", "status": "pending", "added_date": "2026-04-11", "origin": "rss"}, {"id": "ccf1ad7fa42a", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "国家广电通委会 NBTC 将把 OTT 平台监管纳入五年发展规划", "url": "https://www.bangkokpost.com/business/general/3234404/nbtc-to-embed-ott-oversight-in-plan", "date": "2026-04-10T07:26:00+07:00", "desc_original": "The National Broadcasting and Telecommunications Commission (NBTC) has reached a consensus that it has the authority to regulate over-the-top (OTT) platforms, and will delete this oversight in its upcoming Broadcasting and Television Master Plan (2026–2030).", "summary_cn": "泰国国家广播电视和通信委员会（NBTC）已达成共识，确认其有权监管 OTT（流媒体）平台。该机构计划将相关监管规则正式纳入即将出台的《2026-2030年广播电视总体规划》中。此举意味着 Netflix、YouTube 及其他互联网音视频服务在泰国的运营将面临更严格的合规性监测和法律制约，旨在优化行业管理秩序，填补数字内容领域的监管空白。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_nbtc_ott_regulation_2026", "status": "pending", "added_date": "2026-04-10", "time_sensitive": false, "expires_date": "2026-05-10", "title_cn": "国家广电通委会 NBTC 将把 OTT 平台监管纳入五年发展规划"}, {"id": "6523e0d9f4c0", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Black panther cub seized in Mae Sot sting operation", "url": "https://thethaiger.com/hot-news/crime/black-panther-cub-seized-in-mae-sot-sting-operation", "date": "2026-04-10T07:13:00+00:00", "desc_original": "Black panther cub seized in Mae Sot sting operation Legacy A black panther cub was recovered in a sting operation at a shopping centre car park in Mae Sot district, Tak province, yesterday, April 9, where police arrested two Myanmar nationals over an alleged cross-border wildlife trafficking attempt. The operation was carried out by the Central Investigation Bureau with officers from the Natural Resources and Environmental Crime Suppression
