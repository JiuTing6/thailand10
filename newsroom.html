<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thailand10 News Room | 新闻看板</title>
  <link rel="stylesheet" href="assets/style-thailand10.css">
  <style>
    /* ── News Room 专属样式 ── */
    .nr-header {
      background: var(--primary);
      color: #fff;
      border-bottom: 3px solid var(--accent);
    }
    .nr-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nr-title-block .kicker {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }
    .nr-title-block h1 {
      font-size: 22px;
      font-family: var(--font-ui);
      font-weight: 700;
      letter-spacing: 1px;
    }
    .nr-meta {
      font-family: var(--font-ui);
      font-size: 12px;
      color: #999;
      text-align: right;
    }
    .nr-meta strong { color: #ccc; }

    /* ── 控制栏 ── */
    .nr-controls {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .nr-controls-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 20px;
    }
    .nr-search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nr-search {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: var(--font-ui);
      background: var(--bg);
      outline: none;
      transition: border-color .2s;
    }
    .nr-search:focus { border-color: var(--primary); background: #fff; }
    .nr-count {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .nr-count strong { color: var(--accent); }

    /* ── Section 筛选 ── */
    .nr-sections {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .sec-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--tag-bg);
      font-size: 12px;
      font-family: var(--font-ui);
      cursor: pointer;
      color: var(--text-muted);
      transition: all .15s;
    }
    .sec-btn:hover { border-color: var(--primary); color: var(--primary); }
    .sec-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── Tag 筛选 ── */
    .nr-tags-wrap {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .nr-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
    }
    .tag-btn {
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 11px;
      font-family: var(--font-ui);
      cursor: pointer;
      color: var(--text-muted);
      transition: all .15s;
    }
    .tag-btn:hover { border-color: var(--accent-light); color: var(--accent); }
    .tag-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .clear-btn {
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 11px;
      font-family: var(--font-ui);
      cursor: pointer;
      color: #999;
      white-space: nowrap;
    }
    .clear-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── 新闻卡片网格 ── */
    .nr-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .nr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nr-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border-color: #ccc;
    }
    .nr-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
    }
    .nr-card-source {
      font-weight: 600;
      color: var(--primary);
    }
    .nr-card-importance {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
    }
    .imp-P1 { background: #fee; color: var(--accent); }
    .imp-P2 { background: #fef5e7; color: #e67e22; }
    .imp-P3 { background: #f0f8f0; color: #27ae60; }
    .nr-card-title {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-ui);
      line-height: 1.4;
      color: var(--text);
    }
    .nr-card-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      font-family: var(--font-ui);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .nr-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .nr-card-tag {
      font-size: 10px;
      font-family: var(--font-ui);
      color: var(--text-muted);
      background: var(--tag-bg);
      padding: 1px 7px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* ── 空状态 ── */
    .nr-empty {
      max-width: 1100px;
      margin: 60px auto;
      text-align: center;
      font-family: var(--font-ui);
      color: var(--text-muted);
      display: none;
    }
    .nr-empty.show { display: block; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 10px;
      max-width: 680px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      font-family: var(--font-ui);
      line-height: 1.4;
      color: var(--text);
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #999;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
    }
    .modal-close:hover { color: var(--accent); }
    .modal-body {
      padding: 20px 24px 24px;
    }
    .modal-meta {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .modal-summary {
      font-size: 15px;
      line-height: 1.75;
      font-family: var(--font-ui);
      color: var(--text);
      margin-bottom: 16px;
    }
    .modal-desc {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-muted);
      font-family: var(--font-ui);
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-bottom: 16px;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 18px;
    }
    .modal-tag {
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--text-muted);
      background: var(--tag-bg);
      padding: 2px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .modal-link {
      display: inline-block;
      padding: 9px 20px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      transition: background .2s;
    }
    .modal-link:hover { background: #003d9e; }

    @media (max-width: 600px) {
      .nr-grid { grid-template-columns: 1fr; padding: 12px 12px 40px; }
      .nr-header-inner { flex-direction: column; align-items: flex-start; }
      .nr-meta { text-align: left; }
    }
  </style>
</head>
<body>

<div class="nr-header">
  <div class="nr-header-inner">
    <div class="nr-title-block">
      <div class="kicker">Thailand10 · 泰兰德10:00</div>
      <h1>📋 News Room — 新闻看板</h1>

<div class="nr-controls">

<div class="modal-overlay" id="modal-overlay">

      <div class="modal-title" id="modal-title"></div>

    </div>
  </div>
</div>

 "pending", "added_date": "2026-04-23", "origin": "rss", "title_cn": "泰国参议员称取消议会免费餐食是“对其尊严的侮辱”，引发网民炮轰"}, {"id": "aaaeaac7836c", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "泰国外交部代表团访问缅甸，寻求加强边境安全与双边合作", "url": "https://thethaiger.com/hot-news/politics/thailand-seeks-closer-cooperation-myanmar-visit", "date": "2026-04-22T06:31:41+00:00", "desc_original": "Thailand seeks closer cooperation in Myanmar visit Legacy Thailand said talks with Myanmar’s new leadership today, April 22, would focus on key bilateral and regional issues including border security...", "summary_cn": "泰国政府代表团于4月22日访问缅甸，与缅甸新领导层举行正式会谈。此次访问的核心议题集中在边境安全、打击跨国犯罪以及区域稳定合作。泰国官方希望通过加强外交联系，共同应对日益严峻的边境走私和难民安置问题，并探讨在东盟（ASEAN）框架下的多边合作可能性，旨在维持两国长期邻里经济协作关系。", "importance": "P1", "section_hint": "thailand", "location_detail": "Myanmar-Thailand Border", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-23", "event_id": "thailand_myanmar_diplomatic_visit_2026", "status": "pending", "added_date": "2026-04-23", "origin": "rss", "title_cn": "泰国外交部代表团访问缅甸，寻求加强边境安全与双边合作"}, {"id": "1e05969ea08d", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "航司缩减航班导致燃油附加费飙升，赴泰成本增加", "url": "https://www.bangkokpost.com/business/general/3241398/fuel-surcharges-jump-as-airlines-tighten-schedules", "date": "2026-04-22T05:58:00+07:00", "desc": "Local airlines have continued to reduce capacity by consolidating less profitable flights into remaining services to stay afloat amid rising jet fuel prices, while Japan Airlines and ANA announced a doubling of fuel surcharges, with Thailand-bound fuel surchanges increasing from about 3,000 baht to 6,000 baht.", "desc_original": "Local airlines have continued to reduce capacity by consolidating less profitable flights into remaining services to stay afloat amid rising jet fuel prices, while Japan Airlines and ANA announced a doubling of fuel surcharges, with Thailand-bound fuel surchanges increasing from about 3,000 baht to 6,000 baht.", "title_cn": "航司缩减航班导致燃油附加费飙升，赴泰成本翻倍", "summary_cn": "受燃油价格持续上涨影响，泰国本土航空公司不得不通过裁撤低利润航班并合并航线来维持运营。与此同时，日本航空（JAL）和全日空（ANA）宣布燃油附加费翻倍，导致往返泰国的相关费用从约3000泰铢直接飙升至6000泰铢左右。这一变动将显著增加赴泰旅客的出行成本，反映出航空业在能源压力下普遍采取的紧缩策略。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-07", "origin": "rss", "event_id": "thailand_airline_fuel_surcharge_2026_04", "status": "pending", "added_date": "2026-04-22"}, {"id": "7aaac8ede249", "source": "Pattaya Mail", "source_id": "pattayamail", "lang": "en", "title": "中天海滩（Jomtien）本氏剧院季终演出：小提琴与钢琴的华彩时刻", "url": "https://www.pattayamail.com/latestnews/news/magical-moments-the-last-of-the-season-at-bens-theater-jomtien-545308", "date": "2026-04-22T05:46:32+00:00", "desc_original": "Chasa Niyomsub (vln) and Anant Changwaiwit (pno). PATTAYA, Thailand: The last concert of the season at Ben’s Theater, Jomtien was given by violinist Chasa Niyomsub and pianist Anant Changwaiwit...", "summary_cn": "位于芭提雅中天海滩（Jomtien）的知名文化场馆本氏剧院（Ben's Theater）举办了本表演季的最后一场音乐会。小提琴手 Chasa Niyomsub 与钢琴家 Anant Changwaiwit 为当地外籍社区及艺术爱好者献上了精彩的古典乐合奏。该活动标志着当地文化演季的暂告一段落，展示了芭提雅除了夜生活之外的高雅艺术氛围。", "importance": "P3", "section_hint": "pattaya", "location_detail": "Ben's Theater, Jomtien", "city_tag": "#芭提雅", "topic_tag": "#旅居", "relevance_score": 0.75, "tags": [], "time_sensitive": true, "expires_date": "2026-05-08", "event_id": "bens_theater_season_finale_2026", "status": "pending", "added_date": "2026-04-23", "origin": "rss", "title_cn": "中天海滩（Jomtien）本氏剧院季终演出：小提琴与钢琴的华彩时刻"}, {"id": "9d3374cf8223", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Industrial land prices flat as Chinese investors sell up", "url": "https://www.bangkokpost.com/business/general/3241568/industrial-land-prices-flat-as-chinese-investors-sell-up", "date": "2026-04-22T05:36:00+07:00", "desc": "Despite strong demand, average asking prices for industrial land are expected to remain flat due to an influx of land from Chinese investors unable to lease or operate businesses on their plots, according to property consultancy Cushman &amp; Wakefield Thailand.", "desc_original": "Despite strong demand, average asking prices for industrial land are expected to remain flat due to an influx of land from Chinese investors unable to lease or operate businesses on their plots, according to property consultancy Cushman & Wakefield Thailand.", "title_cn": "中国投资者抛售土地，泰国工业用地价格预期持平", "summary_cn": "根据房地产咨询公司戴德梁行（Cushman & Wakefield Thailand）的分析，尽管当前工业用地市场需求强劲，但平均挂牌价格预计将保持平稳。主要原因是部分中国投资者由于无法在持有的土地上顺利运营业务或将其出租，近期出现了大量土地抛售潮，供应量的激增抵消了价格上涨的动力。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-22", "origin": "rss", "event_id": "thailand_industrial_land_price_2026_04", "status": "pending", "added_date": "2026-04-22"}, {"id": "1df1a8eb602f", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Plastic supply dubbed stable", "url": "https://www.bangkokpost.com/business/general/3241503/plastic-supply-dubbed-stable", "date": "2026-04-22T05:32:00+07:00", "desc": "Supplies of plastic pellets and plastic packaging are sufficient and expected to last until at least July, according to plastic pellet manufacturers, distributors, and industrial users.", "desc_original": "Supplies of plastic pellets and plastic packaging are sufficient and expected to last until at least July, according to plastic pellet manufacturers, distributors, and industrial users.", "title_cn": "泰国塑料及其包装原料供应保持稳定", "summary_cn": "据泰国塑料粒子生产商、经销商及工业用户的最新调研显示，目前国内塑料粒子及塑料包装的供应十分充足。行业预测现有储备至少足以支撑至今年7月，能够满足下游制造业的生产需求，短期内不会出现原材料短缺问题，有助于稳定相关产业链的物价成本。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国" nd expanding the country's public debt ceiling.", "desc_original": "Prime Minister Anutin Charnvirakul has instructed his deputy Ekniti Nitithanprapas and the Council of State to study the legal implications of issuing an emergency loan decree and expanding the country's public debt ceiling.", "title_cn": "泰国总理阿努廷拟申请5000亿泰铢贷款案报告", "summary_cn": "泰国总理阿努廷（Anutin Charnvirakul）已指示副总理兼财政部长埃克尼提（Ekniti Nitithanprapas）及内阁国务委员会，就颁布紧急贷款法令和提高国家公共债务上限的法律影响进行紧急研究。这笔高达5000亿泰铢的潜在贷款计划引发关注，旨在应对当前的经济挑战，但面临着严格的财政纪律审查及法律程序评估。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-07", "origin": "rss", "event_id": "thailand_pm_loan_decree_500bn_2026_04", "status": "pending", "added_date": "2026-04-22"}, {"id": "e4ee7c565700", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "曼谷水门 Flyover 高架桥 Phetchaburi 路段将关闭至明年2月", "url": "https://www.bangkokpost.com/thailand/general/3241353/flyover-to-close-until-february", "date": "2026-04-22T05:01:00+07:00", "desc_original": "The busy Pratunam flyover on Phetchaburi Road will close from Friday at 10pm until next February to allow for the construction of an underground section of the Orange Line MRT, according to the Metropolitan Police Bureau (MPB) and the Mass Rapid Transit Authority of Thailand (MRTA).", "summary_cn": "根据曼谷大都会警局（MPB）和泰国大众捷运局（MRTA）的消息，位于新碧武里路（Phetchaburi Road）繁忙的水门（Pratunam）高架桥将从本周五晚22:00起关闭，直至明年2月。此次封路旨在配合捷运橙线（MRT Orange Line）地下段工程施工。建议通勤者避开该路段，预料将对曼谷市中心交通造成显著影响。", "importance": "P1", "section_hint": "bangkok", "location_detail": "水门 Pratunam", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-07", "event_id": "bangkok_pratunam_flyover_closure_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-22", "title_cn": "曼谷水门 Flyover 高架桥 Phetchaburi 路段将关闭至明年2月"}, {"id": "d76c87378e65", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国汽油用户被排除在油价降价福利外引发争议", "url": "https://www.bangkokpost.com/business/general/3241473/gasoline-users-left-out-of-fuel-price-cut", "date": "2026-04-22T04:50:00+07:00", "desc_original": "Fuel pricing policy is again under scrutiny as critics urge the government to extend benefits from falling global crude oil prices to gasoline and gasohol consumers, who they argue are disproportionately burdened by contributions to the Oil Fuel Fund.", "summary_cn": "随着全球原油价格下跌，泰国的燃料定价政策再次受到审视。批评人士呼吁政府将降价福利扩大至汽油和乙醇汽油（Gasohol）消费者。目前，这些消费者承担了较重的燃油基金（Oil Fuel Fund）缴纳负担，而降价福利主要倾向于柴油。此举旨在减轻普通私家车主的生活成本。 ", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-22", "event_id": "thailand_fuel_price_policy_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-22", "title_cn": "泰国汽油用户被排除在油价降价福利外引发争议"}, {"id": "87d6baaf14a5", "source": "Pattaya Mail", "source_id": "pattayamail", "lang": "en", "title": "2026年泰国外国房产所有权：严格监管下的“代持”架构终结", "url": "https://www.pattayamail.com/newsrussian/%d0%b8%d0%bd%d0%be%d1%81%d1%82%d1%80%d0%b0%d0%bd%d0%bd%d0%b0%d1%8f-%d1%81%d0%be%d0%b1%d1%81%d1%82%d0%b2%d0%b5%d0%bd%d0%bd%d0%be%d1%81%d1%82%d1%8c-%d0%bd%d0%b0-%d0%bd%d0%b5%d0%b4%d0%b2%d0%b8%d0%b6-545303", "date": "2026-04-22T04:43:02+00:00", "desc_original": "2026 год становится историческим поворотным моментом в регулировании Таиланда, где «правовая целостность» переходит от рекомендации к строгому исполнению закона, а отказ от номинальных структур отражает усиление контроля над инвестиционной средой...", "summary_cn": "2026年标志着泰国法律监管的历史性转折，政府对外国投资的“法律完整性”已从单纯的建议转为严格执行。特别是针对外资在泰购房常用的“代持结构（Nominee Structures）”正被逐步清理，这反映了泰国对投资环境管控的全面加强。对于投资者而言，合规化已成为硬性生存要求，传统的法律漏洞正在逐步关闭。", "importance": "P1", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#房产", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-23", "event_id": "thailand_property_nominee_crackdown_2026", "status": "pending", "added_date": "2026-04-23", "title_cn": "2026年泰国外国房产所有权：严格监管下的“代持”架构终结"}, {"id": "2d4721f96425", "source": "Pattaya Mail", "source_id": "pattayamail", "lang": "en", "title": "2026年外国人在泰置业：避开“代持陷阱”与严管时代到来", "url": "https://www.pattayamail.com/latestnews/news/foreign-property-ownership-in-2026-the-nominee-trap-and-the-new-era-of-strict-enforcement-545297", "date": "2026-04-22T03:55:53+00:00", "desc_original": "2026 marks a historic shift in Thailand’s regulatory landscape, as “legal integrity” moves from recommendation to firm enforcement. The phase-out of nominee structures signals a broader policy crackdown, reshaping expectations for investors and legal compliance across the country. PATTAYA, Thailand – As an international lawyer practicing in the heart of Pattaya for many years, I have witnessed the many seasons of the Thai real estate market. However, 2026 marks a historic shift a year where “legal integrity” has moved from a mere recommendation to an absolute mandate for surv", "summary_cn": "资深律师指出，2026年是泰国房产市场的转折年。在芭提雅（Pattaya）等外资集中的核心区，过去通过人头代持（Nominee）持有不动产的模式正面临巨大风险。随着泰国法规进入“严厉执法时代”，政府正逐步取缔不合规架构。此举不仅重塑了投资者的合规预期，也意味着外国人在泰投资房产必须走合法合规的正轨，法律监管门槛显著提升。", "importance": "P1", "section_hint": "pattaya", "location_detail": "芭提雅", "city_tag": "#芭提雅", "topic_tag": "#房产", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-23", "event_id": "pattaya_nominee_property_law_2026", "status": "pending", "added_date": "2026-04-23", "title_cn": "2026年外国人在泰置业：避开“代持陷阱”与严管时代到来"}, {"id": "530c4ba4b7df", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "中国男子在芭提雅醉酒骚扰女生被警方带走", "url": "https://www.thaiheadlines.com/187326/", "date": "2026-04-22T03:29:22+00:00", "desc_original": "泰国头条新闻社讯 4月22日凌晨1点左右，泰国芭提雅警察局接到报案称，芭提雅南路一家知名娱乐场所内发生争执，有人受伤，于是立即组织警力赶往现场。到达时警方发现，几名保安正控制着一名中国籍男子，且该男子醉酒明显，一直大声吵闹。警方上前平息事态后，将这名中国男子带回了芭提雅警察局。 由于上述中国男子左眉处受伤，鲜血流得满脸满衣服都是，警方先协调芭提雅明满善坛基金会救援人员前来为他进行治疗，而他依然在警察局里大喊大叫。 两名女性受害者分别为19岁的贾贾和20岁的帕米，她们告诉警方，事发时她们正站在店外等着继续去下一家娱乐场所，那名中国男子突然走过来抱住她们，并动手骚扰，抓了贾贾的臀部三次。前两次她们还忍着，但第三次实在无法忍受，就喊来保安帮忙。没想到在保安上前制止的过程中，这名男子突然变得非常生气，还试图伤害她们，又是用脚踢又是扔杯子，还好都没有打中。接着，他与保安发生扭打，这才导致他自己受伤。两名受害者说，她们一定要追究到底，无论对方是谁、有什么身份或背景，都不能接受这种行为。 芭提雅警察局表示，警方会公平处理该案，将调取店内监控录像仔细调查。但由于涉事中国籍男子目前仍处于醉酒状态，警方只能先将他控制起来，等他清醒后再进行讯问，并依法进一步处理。 （编译：KA；来源：thaich8） The post 中国男子在芭提雅醉酒骚扰女生被警方带走 appeared first on 泰国头条", "summary_cn": "4月22日凌晨，芭提雅（Pattaya）警局在南路（South Road）一娱乐场所抓获一名当众骚扰女性的中国籍游客。该男子因处于重度醉酒状态，在场所外交际处抱住并骚扰两名年轻女子，更在保安制止时暴力反抗，随后在扭打中受伤自残。受害人表示绝不和解。目前警方已将其扣押，待其清醒后将调取监控进一步调查，并依据法律程序追究其民事及刑事责任。", "importance": "P1", "section_hint": "cn_thai", "location_detail": "芭提雅南路", "city_tag": "#芭提雅", "topic_tag": "#中泰", "relevance_score": 0.95, "tags": [], "time_sensitive": true, "expires_date": "2026-05-08", "event_id": "pattaya_chinese_tourist_harassment_2026", "status": "pending", "added_date": "2026-04-23", "title_cn": "中国男子在芭提雅醉酒骚扰女生被警方带走"}, {"id": "9f7ec92acc81", "source": "Pattaya Mail", "source_id": "pattayamail", "lang": "en", "title": "芭提雅步行街夺命枪击案：涉案警察申请50万铢保释被法庭拒绝", "url": "https://www.pattayamail.com/newsrussian/%d1%81%d1%83%d0%b4-%d0%be%d1%82%d0%ba%d0%b0%d0%b7%d0%b0%d0%bb-%d0%b2-%d0%b7%d0%b0%d0%bb%d0%be%d0%b3%d0%b5-%d0%b2-500-000-%d0%b1%d0%b0%d1%82-%d0%bf%d0%be%d0%bb%d0%b8%d1%86%d0%b5%d0%b9%d1%81-545293", "date": "2026-04-22T03:10:27+00:00", "desc_original": "Обвиняемый полицейский, известный как «Инспектор Джо Стрелок», доставляется в специальную тюрьму Паттайи на тюремном транспорте после отказа суда в залоге по делу о смертельной стрельбе на Walking Street. ПАТТАЙЯ, Таиланд – Полицейский, известный как «Инспектор Джо Стрелок», был отправлен в тюрьму после того, как Провинциальный суд Паттайи отклонил его ходатайство об освобождении под залог по делу о смертельной стрельбе на Walking Street. Младший лейтенант полиции Джирасак Срикаттанам, 54 года, сотрудник следственного подразделения полиции Паттайи, обвиняется в том, что застрелил 41-летнего вл", "summary_cn": "被绰号为“枪手乔”的芭提雅警察中尉Jirasak Srikanthanam（54岁），因涉嫌在芭提雅步行街（Walking Street）制造的一起致命枪击案而被拘留。尽管其提出了50万泰铢的保释申请，但芭提雅省级法院出于案情恶劣及涉嫌谋杀的考虑，拒绝了其保释请求。该警员目前已被押送至芭提雅特别监狱候审。此案因涉及警务人员执法期间犯罪，引发社会高度关注。", "importance": "P2", "section_hint": "pattaya", "location_detail": "芭提雅步行街", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-08", "event_id": "pattaya_walking_street_cop_shooting_2026", "status": "pending", "added_date": "2026-04-23", "title_cn": "芭提雅步行街夺命枪击案：涉案警察申请50万铢保释被法庭拒绝"}, {"id": "7402e6b59c21", "source": "Pattaya Mail", "source_id": "pattayamail", "lang": "en", "title": "芭提雅发布气象预警：泰国北部夏季风暴南下，周末或迎极端天气", "url": "https://www.pattayamail.com/newsrussian/%d0%bf%d0%b0%d1%82%d1%82%d0%b0%d0%b9%d1%8f-%d0%b3%d0%be%d1%82%d0%be%d0%b2%d0%b8%d1%82%d1%81%d1%8f-%d0%ba-%d0%bf%d0%b5%d1%80%d0%b5%d0%bc%d0%b5%d0%bd%d1%87%d0%b8%d0%b2%d0%be%d0%b9-%d0%bf%d0%be-545290", "date": "2026-04-22T03:07:26+00:00", "desc_original": "В Паттайе сохраняется жаркая и влажная погода, однако усиление штормовой активности над Таиландом может принести в регион локальные грозы и сильный ветер в ближайшие дни по мере продвижения летней погодной системы на юг. ПАТТАЙЯ, Таиланд – В то время как в Паттайе сохраняется характерная для конца апреля жаркая и влажная погода, Метеорологический департамент Таиланда объявил предупреждение о летних штормах для северных регионов страны на период с 23 по 25 апреля, что указывает на изменение погодных условий. Предупреждение включает грозы, сильный ветер, молнии и возможный град в северных, север", "summary_cn": "泰国气象局发布最新预警，一场夏季风暴预计在4月23日至25日期间席卷泰国北部并逐步南下。目前芭提雅（Pattaya）维持高温潮湿天气，但受此气象系统影响，该地区在接下来几天可能遭遇局部雷暴、阵风、强雷电及可能的冰雹。建议当地市民和游客关注天气变化，加强出行防范并固定户外加盖物。本轮风暴标志着典型的从酷暑到风雨的天气突变。", "importance": "P3", "section_hint": "thailand", "location_detail": "芭提雅", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 0.8, "ta 泰国的深深喜爱，并将曼谷描述为其心目中的“梦想之城”。此类现象反映了曼谷作为国际大都市和数字游民高地的持续吸引力，展现了泰国在全球创作者社区中极高的软实力认知度。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.8, "tags": [], "time_sensitive": false, "expires_date": "2026-05-22", "event_id": "foreign_content_creator_bangkok_move_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-22"}, {"id": "1ab74e3a9b6b", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国警方澄清“水枪投毒”案受害者身份：系泰国籍并非中国公民", "url": "https://www.thaiheadlines.com/187310/", "date": "2026-04-21T07:29:14+00:00", "desc_original": "泰国头条新闻社讯 4月21日，针对近日网络热议的“宋干节女子疑遭高压水枪投毒”事件，泰国警方于4月20日正式发布澄清声明。声明指出，该事件受害者为泰国籍女性，并非部分网传信息所称的中国公民。", "title_cn": "泰国警方澄清“宋干节水枪投毒”传闻：受害者系泰籍，并非中国游客", "summary_cn": "针对宋干节期间引发热议的“高压水枪疑遭投毒”事件，泰国警方于4月20日发布正式声明辟谣。警方的调查结果证实，受害女性为泰国籍，而非网络传言的中国公民。此声明及时纠正了误导性的涉外消息，旨在平息可能引发的国际游客安全担忧，建议公众通过官方渠道获取案件最新进展。", "importance": "P1", "section_hint": "cn_thai", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-07", "event_id": "songkran_poison_rumor_clarification_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-22"}, {"id": "fa422f87e35b", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "中国外交部长王毅（Wang Yi）将于4月22日至26日访问柬埔寨、泰国及缅甸", "url": "https://www.thaiheadlines.com/187306/", "date": "2026-04-21T07:24:33+00:00", "desc_original": "泰国头条新闻社讯 外交部发言人宣布：中共中央政治局委员、外交部长王毅将于4月22日至26日应邀访问柬埔寨、泰国、缅甸。访柬期间，王毅将与国防部长董军共同出席中柬外长、防长“2+2”战略对话机制首次会议。 (来源：外交部网站) The post 王毅将于4月22日至26日应邀访问柬埔寨、泰国、缅甸 appeared first on 泰国头条新闻 .", "summary_cn": "中国外交部宣布，中共中央政治局委员、外交部长王毅（Wang Yi）将于2026年4月22日至26日出访东南亚三行。此次行程包括应邀访问柬埔寨、泰国和缅甸。此次访问旨在加强中国与中南半岛国家的外交关系与战略合作，特别是深化中国与相关国家在安全与政治领域的对话沟通。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expir i Ta-iad, Chalong subdistrict. According to a report from the Phuket Times Facebook page, Kurchenko withdrew cash 16 times, totalling around 331,000 baht. Police said the funds were linked to 1", "summary_cn": "2026年4月20日，普吉岛（Phuket）警方逮捕了一名41岁的俄罗斯男子Anton Kurchenko。该男子在查龙区（Chalong）塔艾路（Soi Ta-iad）的一家超市ATM机多次取款被查，总计取款16次，金额达33.1万泰铢。警方调查显示，这些资金与一个电话诈骗团伙的非法所得有关，目前该男子因涉嫌协助电信欺诈被扣留。", "importance": "P1", "section_hint": "thailand", "location_detail": "查龙区 Chalong", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-22", "status": "pending", "event_id": "phuket_russian_scam_arrest_2026", "origin": "rss", "added_date": "2026-04-22", "title_cn": "俄罗斯男子在普吉岛（Phuket）因涉嫌为电话诈骗团伙取款被捕"}, {"id": "324679239851", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "People's Party plans May Day rally", "url": "https://www.bangkokpost.com/thailand/politics/3240590/peoples-party-plans-may-day-rally", "date": "2026-04-21T07:00:00+07:00", "desc": "The People's Party (PP) has called on the public to mobilise at parliament on May 1, coinciding with National Labour Day, to submit its draft Social Security Bill and launch a campaign to \"reclaim social security\" for all citizens.", "desc_original": "The People's Party (PP) has called on the public to mobilise at parliament on May 1, coinciding with National Labour Day, to submit its draft Social Security Bill and launch a campaign to \"reclaim social security\" for all citizens.", "summary_cn": "人民党（People's Party, PP）呼吁民众于5月1日国际劳动节当天在国会（Parliament）集会。届时该党将提交其拟定的《社会保障法案》草案，并启动一项名为“为全体公民夺回社保”的运动。此次行动旨在推动泰国社会保障体系的全面改革，反映了在野党对劳工权益及福利分配问题的政治动态。", "title_cn": "人民党（People's Party）计划于五一劳动节在国会发起集会", "importance": "P1", "section_hint": "bangkok", "location_detail": "杜斯特 Dusit", "city_tag": "#曼谷", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": true, "expires_date": "2026-05-06", "event_id": "tha  has drawn attention online after claiming to have bought a 56 million baht home in Phuket and could live in Thailand long-term while paying zero tax on global income. The post, shared on X, showed the individual with his partner alongside a message stating they had signed a contract to purchase a “dream home” near Bang Tao Beach for 56 million baht, or £1.3 million. The foreign man described his Phuket home as a freehold property and said the purchase would allow him to qualify for “Wealthy Glob", "summary_cn": "一名外籍人士在社交媒体分享其在普吉岛邦涛海滩（Bang Tao Beach）斥资5600万泰铢购入永久产权豪宅的消息，引发广泛关注。该男子声称，通过此项投资他有资格申请泰国LRT“全球富裕公民”签证，从而合法实现长期居留，并对其全球收入享受零税收政策。此事件反映出泰国通过签证激励吸引高净值投资者的现状。", "importance": "P1", "section_hint": "property", "location_detail": "邦涛海滩 Bang Tao", "city_tag": "#普吉岛", "topic_tag": "#房产", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-22", "status": "pending", "event_id": "phuket_property_tax_visa_story_2026", "origin": "rss", "added_date": "2026-04-22", "title_cn": "外籍人士在普吉岛（Phuket）购入5600万泰铢豪宅，宣称享受“零税收”长期居留"}, {"id": "a9079e23bc20", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "War set to boost condo demand in major markets", "url": "https://www.bangkokpost.com/business/general/3240800/war-set-to-boost-condo-demand-in-major-markets", "date": "2026-04-21T05:59:00+07:00", "desc": "Condominiums and rental homes in key destinations, including Bangkok, Phuket, Pattaya, Samui and Chiang Mai, are likely to benefit from migration from countries affected by the Middle East conflict, according to property consultancy Colliers Thailand.", "desc_original": "Condominiums and rental homes in key destinations, including Bangkok, Phuket, Pattaya, Samui and Chiang Mai, are likely to benefit from migration from countries affected by the Middle East conflict, according to property consultancy Colliers Thailand.", "summary_cn": "房地产咨询公司高力国际（Colliers Thailand）指出，受中东冲突影响，大量高净值避险人群可能向泰国外流。包括曼谷（Bangkok）、普吉岛（Phuket）、 s to their highest level since the pandemic, increasing cost pressures on contractors, according to Kasikorn Research Center.", "summary_cn": "开泰研究中心（Kasikorn Research Center）表示，持续的中东局势紧张已将泰国建筑材料价格推至新冠疫情以来的最高水平。这一趋势导致承包商面临显著的成本压力。能源成本上升以及供应链不确定性共同抬高了钢铁、水泥等建筑原料价格，可能导致泰国境内在建和待建的基建及房产项目成本激增。", "title_cn": "局势紧张致建材价格创疫情以来新高，泰国工程承包商成本压力剧增", "importance": "P2", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.8, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-21", "event_id": "thailand_construction_costs_surge_2026", "status": "pending", "added_date": "2026-04-21"}, {"id": "dcde506d570e", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Families turn to insurance for inheritance planning", "url": "https://www.bangkokpost.com/business/general/3240790/families-turn-to-insurance-for-inheritance-planning", "date": "2026-04-21T05:35:00+07:00", "desc": "Life insurance is emerging as a powerful solution for wealth transfer, enabling families to distribute inheritances fairly among heirs while preserving asset value and minimising tax burdens, according to Muang Thai Life Assurance (MTL).", "desc_original": "Life insurance is emerging as a powerful solution for wealth transfer, enabling families to distribute inheritances fairly among heirs while preserving asset value and minimising tax burdens, according to Muang Thai Life Assurance (MTL).", "summary_cn": "人寿保险公司 Muang Thai Life（MTL）观察到，越来越多的泰国富裕家庭开始利用终身寿险作为财富传承的解决方案。通过保险计划，家庭能更公平地在继承人之间分配遗产，且在保留资产价值的同时，有效降低税务负担。这一现象反映出泰国高净值人群在法律与税务复杂化背景下，对资产保护和有序传承的需求不断增长。", "title_cn": "泰国财富管理新趋势：泰人寿保险（Muang Thai Life）称更多家庭倾向利用保险进行遗产规划", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.7, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-21", "event_id": "thailand_mtl_insurance_inheritance_2026", "status": "pe acing intensifying scrutiny over its proposed restructuring plan to integrate three key subsidiaries into a virtual banking ecosystem, after independent directors formally opposed the move.", "summary_cn": "泰国零售龙头企业 CP All（CPALL）提出的虚拟银行生态系统重组计划正面临严格审查。该计划拟整合旗下三家核心子公司，但遭到独立董事的正式反对。此举引发了市场对企业管治和关联交易透明度的关注，可能延迟其进入泰国蓬勃发展的虚拟银行业务（Virtual Banking）的进程。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.95, "tags": [], "origin": "rss", "event_id": "cpall_virtual_banking_restructure_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": false, "expires_date": "2026-05-21", "title_cn": "泰国零售巨头 CP All 虚拟银行重组计划遭独立董事反对"}, {"id": "00873afa13cf", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "失踪海上原油案：泰国特调局（DSI）传唤八家货运公司", "url": "https://www.bangkokpost.com/thailand/general/3240575/dsi-summons-eight-shipping-firms", "date": "2026-04-21T05:12:00+07:00", "desc": "Eight shipping companies have been summoned to give information this week as witnesses in a probe into missing oil shipments at sea, according to the Department of Special Investigation (DSI).", "desc_original": "Eight shipping companies have been summoned to give information this week as witnesses in a probe into missing oil shipments at sea, according to the Department of Special Investigation (DSI).", "summary_cn": "泰国特别案件调查厅 DSI 针对近期发生的“海上石油运输失踪案”展开深入调查，并于本周正式传唤了八家货运公司作为证人提供线索。此次调查旨在厘清海上原油非法流向及供应链中的漏洞，打击涉及海上大宗商品的犯罪活动，维护泰国海域商业安全与能源税收利益。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "dsi_shipping_oil_investigation_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": true, "expires_date": "2026-05-06", "title_cn": "失踪海上原油案：泰国特调局（DSI）传唤八家货运公司"}, {"id": "2d63fca8571c", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "tit  "e61ef1b90f60", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "曼谷将首次举办 One Run 国际半程马拉松", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3240765/bangkok-to-host-one-run-halfmarathon-for-first-time", "date": "2026-04-21T01:01:00+07:00", "desc_original": "The One Run international half-marathon will take place at Suan Luang Rama IX Park in Prawet district of Bangkok on May 23 at 4.30am.", "summary_cn": "One Run 国际半程马拉松赛将于 5 月 23 日凌晨 4:30 在曼谷普拉韦区（Prawet）的九世王御苑（Suan Luang Rama IX Park）举行。这是该项赛事首次落地曼谷，预计将吸引大量跑步爱好者和国际游客参与，该公园也是曼谷当地著名的户外运动聚集地。", "importance": "P3", "section_hint": "bangkok", "location_detail": "普拉韦区 Prawet", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "bangkok_one_run_marathon_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": true, "expires_date": "2026-05-06", "title_cn": "曼谷将首次举办 One Run 国际半程马拉松"}, {"id": "5c4315542fdc", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "清迈万豪酒店（Chiang Mai Marriott）焕新升级，兰纳文化深度体验", "url": "https://www.bangkokpost.com/life/travel/3240398/lanna-refined", "date": "2026-04-20T18:41:00+07:00", "desc_original": "Since opening in November 2023, Chiang Mai Marriott Hotel, which was rebranded from Le M&eacute;ridien Chiang Mai, continues to refine and improve with the latest addition of a new complex dedicated to event facilities and entertainment.&nbsp;", "title_cn": "清迈万豪酒店（Chiang Mai Marriott）焕新升级，兰纳文化深度体验", "summary_cn": "自2023年11月由清迈美爵酒店（Le Méridien Chiang Mai）改名开业以来，清迈万豪酒店持续进行设施升级。最新动态显示，该酒店新增了一个集活动设施与娱乐于一体的复合建筑空间，不仅提升了宴会承载能力，更深度融入了兰纳文化的建筑美学。这标志着该品牌在深耕清迈旅游市场、提升高端住宿品质方面的进一步努力。", "importance": "P2", "section_hint": "property", "location_detail": "清迈海雅区 Hai Ya", "city_tag": "#清迈", "topic_tag": "#房产", "relevance_score": 0.75, "tags": [], "origin": "rss", "event_id": "chiangmai_marriott_renovation_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": false, "expires_date": "2026-05-21"}, {"id": "a50bf23429f5", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "缅甸炸弹落入泰境，夜丰颂府（Mae Hong Son）边境受惊扰", "url": "https://www.bangkokpost.com/thailand/general/3240379/panic-as-myanmar-bomb-lands-inside-thailand", "date": "2026-04-20T17:34:00+07:00", "desc_original": "MAE HONG SON - Thai villagers along the Salween River in Sob Moei district fled their homes on Monday after a bomb dropped by the Myanmar air force landed inside Thai territory during air strikes against ethnic Karen forces. &nbsp;", "title_cn": "缅甸炸弹落入泰境引发民众恐慌，边境村落紧急避险", "summary_cn": "周一，在泰国夜丰颂府（Mae Hong Son）萨尔温江沿岸的颂梅县（Sob Moei），缅甸空军在打击克伦族（Karen）武装的空袭行动中，一枚炸弹不幸落入泰国领土境内。袭击引发当地村民极度恐慌，多人被迫紧急逃离家园寻找安全避难所。目前泰方正密切关注边境局势，以防冲突进一步波及泰国居民安全及主权利益。", "importance": "P1", "section_hint": "thailand", "location_detail": "夜丰颂府颂梅县 Sob Moei", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_myanmar_border_bomb_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": true, "expires_date": "2026-05-06"}, {"id": "c091b7a453d5", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "普吉岛（Phuket）迈考海滩爆发冲突，外国游客驱逐泰意混血网红引发公愤", "url": "https://thethaiger.com/news/phuket/dispute-between-foreign-couple-and-thai-youtuber-on-mai-khao-beach-divides-opinion", "date": "2026-04-20T10:58:04+00:00", "desc_original": "Controversy erupts after Thai-Italian YouTuber told to move on Phuket beach Legacy A Mai Khao Beach dispute in Phuket drew mixed reactions online after a foreign couple was seen asking a Thai-Italian YouTuber to move while filming on the public beach.", "title_cn": "普吉岛网红海滩冲突：外国夫妇驱赶本土博主引发舆论两极分化", "summary_cn": "普吉岛迈考海滩（Mai Khao Beach）近日发生一起纠纷。一名泰意混血网红在公共海滩拍摄视频时，遭到一对外国夫妇驱赶并要求离开其休息区域。视频流出后引发网络热议，讨论焦点集中在公共空间使用权及部分外国游客对当地人的态度上。此事再次引发民众对普吉岛旅游区行为规范及领土意识的关注。", "importance": "P2", "section_hint": "pattaya", "location_detail": "普吉岛迈考海滩 Mai Khao", "city_tag": "#普吉岛", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "phuket_beach_vlogger_dispute_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": false, "expires_date": "2026-05-21"}, {"id": "fa4d3e33836d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "重返全球前20！泰国为何成为全球资本的新选择？", "url": "https://www.thaiheadlines.com/187275/", "date": "2026-04-20T10:29:13+00:00", "desc_original": "泰国头条新闻社讯 科尔尼（Kearney）《2026年外商直接投资信心指数》近日发布，泰国时隔3年重返全球FDI吸引力前25强，跃居第20位。", "title_cn": "泰国重返全球前20！2026年外商直接投资（FDI）信心显著回升", "summary_cn": "根据科尔尼（Kearney）发布的《2026年外商直接投资信心指数》报告，泰国表现亮眼，时隔三年再次跻身全球最具吸引力的投资目的地前25强，并一举跃升至第20位。这得益于泰国政府积极的新能源汽车支持政策、东部经济走廊（EEC）的稳步推进以及持续的产业优化，显示出国际资本对泰国市场长期潜力和经济环境的认可。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_fdi_ranking_up_2026", "status": "pending", "added_date": "2026-04-21", "time_sensitive": false, "expires_date": "2026-05-21"}, {"id": "40f2bd7112fe", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "泰国政府发布2027财年国防预算，聚焦提升军事作战能力", "url": "https://thethaiger.com/hot-news/politics/thailand-outlines-military-capability-in-2027-budget", "date": "2026-04-20T09:41:43+00:00", "desc_original": "Thailand outlines military capability in 2027 budget Legacy Military capability and national sovereignty will be central to the Thailand defence budget 2027...", "title_cn": "泰国拟定2027财年预算纲要：军事能力与国家主权成核心支出项", "summary_cn": "泰国政府近日公布了2027财年国防预算草案大纲，核心聚焦于增强军事作战能力及维护国家主权。该预算计划拨款用于军事装备现代化、防御系统升级以及加强边境安保。副总理阿努廷（Anutin Charnvirakul）等政府要员强调，在多变的地区安全局势下，维持强有力的国防开支对保障国家稳定和主权至关重要。", "importance": "P2", "section_hint": "thailand", "location_detail": "曼谷枢密院/国会区", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "thailand_military_budget_2027", "status": "pending", "added_date": "2026-04-21", "time_sensitive": true, "expires_date": "2026-05-06"}, {"id": "43f422dad0d3", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "外籍男子故意逃避摩的费 谎称忘带钱包逃离廊曼机场（Don Mueang）", "url": "https://thethaiger.com/news/bangkok/foreigner-avoid-paying-full-taxi-fare-at-don-mueang-airport", "date": "2026-04-20T08:36:30+00:00", "desc_original": "Foreigner allegedly tries to dodge taxi bill, claiming he forgot his wallet Legacy A foreigner allegedly tried to underpay for a motorcycle taxi ride from Nana to Don Mueang International Airport...", "summary_cn": "一名外籍男乘客搭乘摩托车出租车从曼谷那那（Nana）前往廊曼国际机场（Don Mueang International Airport），并在到达目的地后试图赖账。该男子谎称忘带钱包且手机电量不足，最初仅支付了小部分车费便试图进入航站楼。由于此类涉及外籍游客的小额诈骗事件频发，当地警方介入调查并提醒交通服务者提高警惕。此事引发了关于在泰游客行为规范和本地从业者权益保护的讨论。", "importance": "P1", "section_hint": "bangkok", "location_detail": "廊曼（Don Mueang）", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-21", "event_id": "bangkok_taxi_fare_dodge_2026_04", "status": "pending", "added_date": "2026-04-21", "title_cn": "外籍男子故意逃避摩的费 谎称忘带钱包逃离廊曼机场（Don Mueang）"}, {"id": "24827f4eb500", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "泰国交通处罚民调：多数民众支持重罚违法者 除超速外", "url": "https://thethaiger.com/news/national/most-support-thailand-traffic-fine-system-except-for-speeding", "date": "2026-04-20T08:08:58+00:00", "desc_original": "Thailand traffic fine survey finds majority back harsher penalties, except for speeding Legacy A new survey has found broad public support for the new Thailand traffic fines...", "summary_cn": "一项针对新版泰国交通违章罚款制度的最新民意调查显示，绝大多数公众支持对闯红灯、酒驾和逆行等高危违规行为实施更严厉的经济处罚和记分制，认为这有助于减少交通事故。然而，调查也反映出民众在“超速罚款”项目上存在分歧，部分受访者认为现有测速标准和罚款金额在实际路况中略显过重。该民调将作为有关部门后续评估法律执行效果的重要参考。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.95, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-21", "e xecutive.", "title_cn": "泰国拟对加油站实施“夜间宵禁”以应对能源危机", "summary_cn": "泰国政府正考虑从本周起实施加油站夜间强制关闭政策。能源行业高管表示，此举旨在提升公众对燃油供应波动和油价上涨的危机意识。目前国际油价持续走高，泰国社会对经济压力的担忧加剧，政府希望通过限制供应时长来引导民众节约能源，以缓解能源进口和财政补贴支付的压力。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-05", "event_id": "thailand_petrol_station_curfew_2026", "status": "pending", "added_date": "2026-04-20", "origin": "rss"}, {"id": "114a8c4671ad", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "New plan to lower oil price", "url": "https://www.bangkokpost.com/thailand/general/3239858/new-plan-to-lower-oil-price", "date": "2026-04-20T05:14:00+07:00", "desc": "Energy Minister Akanat Promphan has signalled that a second reduction in refining margins of more than 2 baht per litre could be implemented this week, raising expectations of relief at the pump.", "desc_original": "Energy Minister Akanat Promphan has signalled that a second reduction in refining margins of more than 2 baht per litre could be implemented this week, raising expectations of relief at the pump.", "title_cn": "泰国能源部拟本周下调炼油利润，油价有望每升再降2铢", "summary_cn": "泰国能源部长阿卡纳（Akanat Promphan）表示，政府计划在本周内实施第二轮削减炼油利润（Refining Margins）的措施，预计幅度将超过每升2泰铢。此举旨在直接降低加油站的燃油零售价，缓解由于全球通胀和地缘政治导致的民众生活成本压力，是政府能源价格调控计划的关键一环。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.95, "tags": [], "time_sensitive": true, "expires_date": "2026-05-05", "event_id": "thailand_oil_price_reduction_2026", "status": "pending", "added_date": "2026-04-20", "origin": "rss"}, {"id": "f4df320dfbc2", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Leadership shake-up for opposition People's Party", "url": "https://www.bangkokpost.com/thailand/politics/3239973/leadership-shakeup-for-opposition-peoples-party", "date": "2026- [], "time_sensitive": false, "expires_date": "2026-05-20", "event_id": "thailand_stagflation_risk_2026", "status": "pending", "added_date": "2026-04-20", "origin": "rss"}, {"id": "2100154830c1", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title_cn": "拉玛二路（Rama 2 Road）建设再度延期：项目延至2027年完工", "url": "https://thethaiger.com/news/national/rama-2-road-construction-delayed-over-rising-fuel-and-material-cost", "date": "2026-04-20T04:36:56+00:00", "desc_original": "Construction on Rama 2 Road will continue until mid-2027 after the Ministry of Transport delayed the project...", "summary_cn": "泰国交通部宣布，受燃油价格上涨和建筑原材料成本攀升影响，连接曼谷南部的拉玛二路（Rama 2 Road）扩建项目工期将再次推迟，预计直到2027年中期才可能完工。拉玛二路因工期极长被称为“永不完工之路”，此次延期将继续影响沿线房产价值及前往华欣、南部各府的出行效率。对于曼谷南郊的楼盘投资者而言，这是一个需要关注的长期阻碍因素。", "importance": "P2", "section_hint": "property", "location_detail": "拉玛二路 Rama 2 Road", "city_tag": "#曼谷", "topic_tag": "#房产", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "rama_2_road_delayed_2027", "status": "pending", "time_sensitive": true, "expires_date": "2026-05-06", "added_date": "2026-04-21"}, {"id": "43c1920a29f3", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "斩获超20亿订单，泰国木薯成功打入中国重庆市场", "url": "https://www.thaiheadlines.com/187260/", "date": "2026-04-20T04:21:31+00:00", "desc_original": "泰国头条新闻社讯 4月20日，泰国对外贸易厅厅长阿拉达透露成功将泰国木薯出口扩展至中国西部这一新市场...", "summary_cn": "泰国对外贸易厅（DFT）厅长阿拉达透露，泰国木薯已成功敲开中国西部重庆市场的大门，首批斩获超过20亿泰铢的订单。此举是泰国政府积极拓展出口渠道、降低对单一市场依赖的重要成果。通过与中国内陆城市的直接合作，将极大提升泰国农产品的出口附加值，并加强中泰经济走廊的物流联动。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-21", "origin": "rss", "event_id": "thailand_china_cassava_export_2026", "status": "pending", "added_date": "2026-04-21"}, {"id": "ec2f405e490e", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "银发经济持续增长，泰国高龄人口增至1480万人", "url": "https://www.thaiheadlines.com/187257/", "date": "2026-04-20T03:59:23+00:00", "desc_original": "泰国头条新闻社讯 4月19日，泰国人口结构正在发生明显变化，60岁以上的高龄人口已达1480万人，占总人口的22.5%，预计2026年还将继续增加。其中60–69岁群体的占比最高，且不少仍身体健朗、有稳定收入，他们不再满足于基本医疗照顾，而是追求更高品质的生活，尤其是在医疗服务、旅游和生活方式领域，这也与全球“银发经济”强调提高生活品质而非仅基础照护的趋势一致。 另一方面，泰国的家庭结构逐渐转向“核心家庭”或单人居住，很多高龄者独自生活或仅与配偶同住，使得新型照顾服务的需求大幅增加。国家统计局数据显示，这类群体占高龄人口总数的35%以上。 面对这一巨大趋势，泰京银行信用卡业务中心（KTC）积极从金融业务扩展到“生活方式平台”，如与提供“小辈代驾服务”的Joy Ride合作打造以“信任”为核心的高龄照顾模式。这项服务根据高龄者的实际生活需求设计，从陪同就医、办理个人事务、参加社会活动，到短期旅游等，都可由经过严格筛选和专业培训的照顾者提供，让使用者和家属都能放心。 KTC信用卡营销主管诗利拉表示，新一代高龄者有经济能力，也希望过有品质的生活，因此进入高龄社会并非只有挑战，更有“经济机会”，企业必须主动调整应对。这次与Joy Ride的合作以“KTC Wellness: The Journey to Well-being”为理念，共同构建健康与生活方式生态系统，KTC卡友可直接使用Jo", "summary_cn": "泰国已正式步入高龄化社会，60岁以上人口达1480万占总人口22.5%。随着“银发经济”崛起，具备支付能力的长者更追求高品质的医疗、旅游与生活服务。针对核心家庭化导致的养老需求，泰京银行信用卡业务中心（KTC）与服务商合作推出陪诊、代办、伴游等个性化照护方案，将人口老龄化转变为全新的市场商机。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-21", "origin": "rss", "event_id": "thailand_silver_economy_2026", "status": "pending", "added_date": "2026-04-21"}, {"id": "526362761158", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "泰国拟修订《外商经营法》Foreign Business Act，封堵“代持人”漏洞", "url": "https://www.thaiheadlines.com/187252/", "date": "2026-04-20T02:59:11+00:00", "desc_original": "泰国头条新闻社讯 4月19日，泰国商业部消息人士透露，商业发展厅正在评估1999版《外商经营法》及其多项子法的实施成效。这部法律已实施超过20年，是规范外国人在泰国投资的重要法规之一，此次修订是为了让法律只保留必要规定、更符合国际标准和泰国对国际的承诺，以及减少法律重叠与冲突、降低不平等现象，提升社会公平性。 商业发展厅指出，1999版《外商经营法》在20多年的实际执行中累积了不少问题，需要在本次修订中重点解决，包括： 1. 持股结构过于复杂：尤其是在两家公司交叉持股的情况下，如甲公司持有乙公司的多数股份，而乙公司又持有甲公司的多数股份时，判断其中一家公司是否为“外国人”企业，必须依赖另一家公司的身份，但双方互相依存，无法明确界定，最终形成执法漏洞； 2. 处罚规定存在空白：对于外国人未依该法第11条或第12条取得证书就先行经营业务这类行为，现行法律并未明确规定处罚标准，根据刑法“法无明文不定罪”原则，执法单位无法追究责任； 3. 登记事项不够明确：虽然法律规定了修改登记的费用，但并未清楚列出登记项目的包含内容，也没有要求外国人必须通报未在泰正式注册法人的负责人变更，尽管实际操作中，登记人员会收集相关信息，但缺乏明确法律条文支持仍是明显弱点； 4. 现行处罚力度不足以威慑违法行为：这是最严重的问题。商业发展厅发现，有些外国人即使因违反第36条“让泰国人或他人代为经营”被起诉，仍会", "summary_cn": "泰国商业部拟大幅修订实施逾20年的《外商经营法》，旨在解决目前复杂的交叉持股定性难题、堵住非法利用“代持人”（Nominee）的执法漏洞。本次修订重点包括明确未经授权经营的处罚标准、强化股权登记透明度及加大对违规行为的威慑力。此举将对在泰外籍投资者产生深远影响，也是打击灰产、规范外资营商环境的重要举措。", "importance": "P1", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-06", "origin": "rss", "event_id": "thailand_fba_nominee_reform_2026", "status": "pending", "added_date": "2026-04-21"}, {"id": "1fe913bae68c", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "泰国1艘货船顺利通过霍尔木兹海峡 Hormuz Strait", "url": "https://www.thaiheadlines.com/187248/", "date": "2026-04-20T02:20:51+00:00", "desc_original": "泰国头条新闻社讯 4月19日，泰国外交部透露，泰国暹罗水泥集团（SCG）管理层报告称，此前通过外交部请伊朗方面协助的2艘船只中，已有1艘顺利驶离霍尔木兹海峡。据悉，副总理兼外交部部长西哈萨于4月15日至17日访问阿曼时，除了加强两国双边关系外，也请阿曼进一步协调伊朗提供帮助。 外交部表示，此次SCG of 1艘货船顺利离开霍尔木兹海峡，是一个好消息，外交部将继续跟进该船抵达泰国后的情况，并持续协助其它仍滞留在霍尔木兹海峡的泰国船只。 （编译：KA；来源：pptvhd36） The post 泰国1艘货船顺利通过霍尔木兹海峡 appeared first on 泰国头条新闻 .", "summary_cn": "泰国外交部通报，在副总理西哈萨访问阿曼并多方协调下，属于暹罗水泥集团（SCG）的一艘货船已顺利驶离局势紧张的霍尔木兹海峡。此前因地区局势该船受阻。泰国当局表示将持续监控该船返回泰国的进程，并继续协助目前仍滞留在该海域的其他泰国籍船只，确保海上贸易运输通道的安全与通畅。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-06", "origin": "rss", "event_id": "thailand_ship_hormuz_strait_2026", "status": "pending", "added_date": "2026-04-21"}, {"id": "06b44d6b4fad", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "PM, key ministers head North to ramp up pollution fight", "url": "https://www.bangkokpost.com/thailand/general/3239983/pm-key-ministers-head-north-to-ramp-up-pollution-fight", "date": "2026-04-20T01:01:00+07:00", "desc": "Prime Minister Anutin Charnvirakul will travel to Chiang Mai today with a team of ministers to step up efforts to tackle PM2.5 pollution in the North.", "desc_origina ran shooting on Pattaya Walking Street early today, April 19.", "desc_original": "A police officer was arrested after allegedly shooting a cannabis shop owner dead in a Songkran shooting on Pattaya Walking Street early today, April 19.", "summary_cn": "4月19日清晨，芭提雅步行街（Pattaya Walking Street）在宋干节庆祝期间发生命案。一名警察因涉嫌枪杀一名大麻店老板被捕。事件发生在游客密集的娱乐区，正值泼水节假期收尾阶段，案件性质恶劣引起社会广泛关注。目前涉案警员已被控制，相关部门正就行凶动机展开调查。", "importance": "P1", "section_hint": "pattaya", "location_detail": "Pattaya Walking Street", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": true, "expires_date": "2026-05-05", "event_id": "pattaya_walking_street_shooting_2026_04", "status": "pending", "added_date": "2026-04-20", "title_cn": "芭提雅步行街宋干节期间发生枪击案：警员涉嫌枪杀大麻店老板"}, {"id": "e0b5165832c4", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "东部经济走廊 EEC 酒类销售或可 24 小时开放", "url": "https://www.bangkokpost.com/thailand/general/3239570/booze-sales-in-eec-could-go-247", "date": "2026-04-19T06:41:00+07:00", "desc_original": "The government is preparing to allow 24-hour alcohol sales in the Eastern Economic Corridor (EEC) to boost investment and economic activity, with the process set to be finalised next month.", "summary_cn": "泰国政府计划在东部经济走廊（EEC）特别开发区内放开酒类销售限制，允许 24 小时全天候售酒，以刺激当地投资与经济活力。该政策正处于筹备阶段，预计将于下月敲定细节。此举旨在通过营造更自由的商业环境吸引国际游客和投资者，但具体实施标准仍待政府进一步公布。", "importance": "P1", "section_hint": "thailand", "location_detail": "东部经济走廊", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-04", "event_id": "thailand_eec_alcohol_24h_policy_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-19", "title_cn": "东部经济走廊 EEC 酒类销售或可 24 小时开放"}, {"id": "211e068e0b2d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "Lisa亮相科切拉 Coachella：全息舞台+新歌首秀引爆全球！", "url": "https://www.thaiheadlines.com/187238/", "date": "2026-04-19T06:26:48+00:00" ployment of 3,800 mobile \"Pum-Puang\" vehicles under a Commerce Ministry initiative aimed at selling low-cost goods across the country.", "summary_cn": "泰国省政厅已下令全国各级官员支持内政部与商务部的合作倡议，部署 3,800 辆被称为“Pum-Puang”的移动杂货车向全国各地分销廉价民生物资。该举措旨在通过这种灵活的形式，缓解偏远地区物价上涨的压力，让更多民众能够以优惠价格购买生活必需品，减轻民众生活负担。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "thailand_mobile_lowcost_goods_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-19", "title_cn": "泰国政府推行“移动杂货车”下乡售低价商品"}, {"id": "c58a3e2fbcf7", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "曼谷卡赛纳瓦明 Kaset-Nawamin 区一跨性别人士在公寓坠楼身亡", "url": "https://thethaiger.com/news/national/unidentified-transgender-individual-falls-to-death-in-bangkok-condo", "date": "2026-04-19T05:45:53+00:00", "desc": "An unidentified transgender woman fell to her death from a luxury condominium in the Kaset-Nawamin area of Bangkok on Friday night.", "desc_original": "An unidentified transgender woman fell to her death from a luxury condominium in the Kaset-Nawamin area of Bangkok on Friday night.", "summary_cn": "上周五晚间，在曼谷卡赛纳瓦明（Kaset-Nawamin）地区发生一起悲剧，一名身份尚不明确的跨性别人士从一栋高档公寓楼上坠落身亡。警方接报后介入调查，案件焦点在于排查是意外事故、自杀或是刑事刑事案件。目前正通过调取监控及走访目击者来核实坠楼前的详细情况。", "importance": "P3", "section_hint": "bangkok", "location_detail": "Kaset-Nawamin", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-20", "event_id": "bangkok_condo_fall_death_2026_04", "status": "pending", "added_date": "2026-04-20", "title_cn": "曼谷卡赛纳瓦明 Kaset-Nawamin 区一跨性别人士在公寓坠楼身亡"}, {"id": "586685ea6873", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "消费者委员会支持曼谷轨道交通绿线 20 铢均一票价", "url": "https://www.bangkokpost.com/thailand/general/3239575/consumer-council-backs-b20-fare-on-green-line", "date": "2026-04-19T04:33:00+07:00", "desc_original": "The Thailand Consumers Council (TCC) backs a flat 20-baht fare on Bangkok's Green Line electric railway, while calling for restructuring of mass transit pricing to increase ridership by 50% and ease the cost of living.", "summary_cn": "泰国消费者委员会（TCC）公开支持对曼谷 BTS 绿线（Green Line）实施“20泰铢封顶”均一票价政策。TCC 呼吁重组公共交通定价系统，认为通过降低票价可将乘客量提高 50%，并显著减轻上班族的生活成本。该政策若能落地，将对曼谷及其周边通勤者产生重大利好，推动城市轨道交通的可持续运营。", "importance": "P1", "section_hint": "bangkok", "location_detail": "曼谷绿线铁路", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "time_sensitive": true, "expires_date": "2026-05-04", "event_id": "bangkok_greenline_20baht_fare_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-19", "title_cn": "消费者委员会支持曼谷轨道交通绿线 20 铢均一票价"}, {"id": "993f91689ad0", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "曼谷邦纳（Bang Na）豪宅深夜失火，致2死2伤含德籍公民", "url": "https://www.thaiheadlines.com/187231/", "date": "2026-04-19T04:13:39+00:00", "desc_original": "泰国头条新闻社讯 4月19日凌晨，泰国曼谷邦纳警局接到报警称辖区内一高档住宅小区发生火灾。警方随即联同素坤逸消防与救援人员赶赴现场。 据悉，起火建筑为一栋四层联排别墅，火势主要集中在二至三层并迅速蔓延。消防人员持续灭火30分钟，成功将火势控制住，避免波及周边房屋。 此次事故造成两人死亡，分别为一名约40岁女性及一名70岁德国籍女性，均因吸入浓烟身亡。另有两人受伤，包括一名约50岁德国籍男子，全身多处烧伤，已被送往医院治疗；一名约20岁德国籍男子，因吸入浓烟出现不适，被送医救治。 目前，警方正对火灾原因展开进一步调查。 （编译：jinda；审校：wan；来源：khaosod） The post 曼谷一豪宅深夜失火，致2死2伤 appeared first on 泰国头条新闻 .", "summary_cn": "4月19日凌晨，曼谷邦纳（Bang Na）区一栋四层高档联排别墅发生火灾。火势从二、三层迅速蔓延，素坤逸（Sukhumvit）消防队耗时30分钟才控制住火情。事故导致一名40岁泰籍女子及一名70岁德籍女子不幸遇难，另有两名德籍男子受伤送医。目前警方正调查火灾诱因，此事件再次引发对高层联排建筑消防安全的关注。", "importance": "P2", "section_hint": "bangkok", "location_detail": "Bang Na", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-20", "event_id": "bangkok_bangna_villa_fire_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-20", "title_cn": "曼谷邦纳（Bang Na）豪宅深夜失火，致2死2伤含德籍公民"}, {"id": "3bbc3af7758c", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "热爆了！曼谷（Bangkok）发布高温警报，体感温度达“危险级”", "url": "https://www.thaiheadlines.com/187227/", "date": "2026-04-19T03:52:43+00:00", "desc_original": "泰国头条新闻社讯 4月19日，泰国曼谷市政府环境部门发布高温预警称，当日体感温度指数已升至“危险级”，提醒广大市民及游客密切关注自身健康状况。 曼谷市政府环境部门通过官方平台通报指出，4月19日当日体感温度指数已处于“危险级”。一般人群应留意自身身体状况变化，老年人、儿童及慢性病患者等高风险群体需密切关注，如出现异常症状，应尽快就医。 环境部门同时建议，民众可通过空气质量监测网站或应用程序持续关注空气质量及相关环境因素，以便及时采取防护措施，降低高温恶劣天气带来的不利影响。 （编译：jinda；审校：wan；来源：thairath） The post 热爆了！曼谷发布高温警报，体感温度已达“危险级”！ appeared first on 泰国头条新闻 .", "summary_cn": "曼谷（Bangkok）市政府于4月19日发布极端高温预警。监测显示当日体感温度已飙升至“危险级”水平。政府提醒市民及在泰游客尽量避免长时间高温暴露，特别是老人、儿童和慢性病患者等高危人群需警惕热射病及相关症状。民众可通过官方App实时掌握气象动态。由于正直热季，该警告反映了泰国极端气候对日常生活的直接威胁。", "importance": "P1", "section_hint": "bangkok", "location_detail": "", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-05", "event_id": "bangkok_heatwave_warning_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-20", "title_cn": "热爆了！曼谷（Bangkok）发布高温警报，体感温度达“危险级”"}, {"id": "ece3f492678d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "阿努廷（Anutin）率多部委赴清迈（Chiang Mai）督战PM2.5及山火治理", "url": "https://www.thaiheadlines.com/187224/", "date": "2026-04-19T03:33:10+00:00", "desc_original": "泰国头条新闻社讯 4月19日，泰国总理府发言人拉差妲透露，在完成2027财年预算政策会议相关行程后，总理兼内政部长阿努廷将率多名内阁部长及有关部门官员一同前往清迈，督导解决持续影响北部地区的山火、烟霾及PM2.5粉尘问题。 此次随行人员包括副总理颂萨、副总理兼商业部长素帕琪、国防部长阿杜、农业部长素利亚、数字经济与社会部长猜差诺、自然资源与环境部长素查、卫生部长帕塔纳以及内政部副部长杰萨等。 行程期间，政府高层将与国家防灾减灾指挥中心召开会议，跟进北部上部地区灾情及治理进展，发布更具前瞻性的政策与指示，推动问题取得实质性改善。重点措施包括规范高地农业活动、研究限制涉及焚烧生产的农产品进口、加强民众健康防护以及加大对山火防控工作的支持力度。 此外，总理一行还将实地了解灾情发展，慰问一线工作人员。政府强调，将从环境、农业、旅游及公共卫生等多维度统筹推进治理，在缓解当前影响的同时，推动问题实现长期、可持续解决。 （编译：jinda；审校：wan；来源：matichon） The post 阿努廷将率内阁多部门赴清迈，紧急应对山火与PM2.5危机 appeared first on 泰国头条新闻 .", "summary_cn": "内政部长阿努廷（Anutin）率领跨部委高级官员代表团前往清迈（Chiang Mai），应对持续严重的北部山火及PM2.5雾霾危机。政府拟从规范高地农业、研究进口限制及加强医疗防护多管齐下。此次视察显示了中央政府对北部空气污染问题的重视，试图平衡农业生产与公共卫生需求。治理成效将直接影响清迈及周边府份的旅游业修复与民生健康。", "importance": "P2", "section_hint": "thailand", "location_detail": "Chiang Mai", "city_tag": "#清迈", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-05", "event_id": "chiangmai_pm25_fire_crisis_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-20", "title_cn": "阿努廷（Anutin）率多部委赴清迈（Chiang Mai）督战PM2.5及山火治理"}, {"id": "355c7c4db6b2", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "芭提雅（Pattaya）醉酒警察当街枪杀大麻店主入狱", "url": "https://www.thaiheadlines.com/187221/", "date": "2026-04-19T02:47:58+00:00", "desc_original": "泰国头条新闻社讯 近日，泰国芭提雅南部步行街发生一起枪击命案。一名警员在醉酒状态下开枪，不仅向附近的娱乐场所开枪，还将枪口对准了前来劝阻的大麻店老板，致其伤重不治。 现场监控画面显示，41岁的大麻店老板帕塔通走近一名身穿黑衣、在店后饮酒的便衣警员。该警员当时明显处于醉酒状态，此前已掏出手枪向附近一处娱乐场所开枪，所幸未造成人员伤亡。 帕塔通见状上前劝阻，以合十礼请求对方收起枪支。然而，该警员却突然开枪，连射两发子弹击中帕塔通。中枪后，帕塔通仍奋力夺下对方手枪，但随后意识到自己受伤，逐渐体力不支倒地，面部撞向墙壁。救援人员赶到现场全力施救，但最终未能挽回其生命。 事发后，该警员拿走死者手机并将其抛入海中，疑似试图销毁证据。周边民众合力将其控制，当时其面部带血，神志不清。 初步调查显示，涉事警员当时处于严重醉酒状态，供述混乱，否认曾开枪。目前，警方已将其拘留，案件仍在进一步调查中，后续将依法处理。 （编译：jinda；审校：wan；来源：thaich8news） The post 芭提雅醉酒警员当街开枪，大麻店主劝阻反遭射杀 appeared first on 泰国头条新闻 .", "summary_cn": "芭提雅（Pattaya）南部步行街近日发生恶性枪击案。一名醉酒的便衣警察在公共场所漫无目的开枪，41岁的大麻店主帕塔通（Pattathorn）上前以合十礼劝阻时，竟遭该警察近距离枪杀。涉事警员事后还试图销毁死者手机证据，最终被民众合力制服并交由警方。该案严重损害了泰国警察形象，引发社会对公职人员酒后携枪安全性的剧烈讨论。", "importance": "P1", "section_hint": "pattaya", "location_detail": "South Pattaya Walking Street", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-20", "event_id": "pattaya_police_shooting_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-20", "title_cn": "芭提雅（Pattaya）醉酒警察当街枪杀大麻店主入狱"}, {"id": "59c5837a9a60", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "陆路运输厅（DLT）延长燃料补贴登记期限", "url": "https://www.bangkokpost.com/thailand/general/3239460/dlt-extends-fuel-subsidy-deadline", "date": "2026-04-19T02:00:00+07:00", "desc_original": "The Department of Land Transport (DLT) has extended the registration period for fuel subsidy assistance to April 24, following an overwhelming response in the first two days of the scheme.", "title_cn": "泰国陆路运输厅（DLT）宣布延长燃料补贴登记截止日期至4月24日", "summary_cn": "由于该计划在启动前两天反应异常热烈，泰国陆路运输厅（Department of Land Transport，简称DLT）已决定将燃料补贴申请登记期限延长至4月24日。此举旨在确保符合条件的运输运营商和个人有充足时间提交申请，从而缓解能源价格波动带来的财务压力。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.95, "tags": [], "origin": "rss", "time_sensitive": true, "expires_date": "2026-05-04", "event_id": "thailand_dlt_fuel_subsidy_2026", "status": "pending", "added_date": "2026-04-19"}, {"id": "26810836ad17", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "DSI widens probe into fuel industry", "url": "https://www.bangkokpost.com/thailand/general/3239450/dsi-widens-probe-into-fuel-industry", "date": "2026-04-19T01:17:00+07:00", "desc_original": "The Department of Special Investigation (DSI) will inspect an oil depot in Surat Thani on Monday and summon executives from multiple oil transport companies as part of a widening probe into alleged fuel stockpiling and irregularities in oil shipments.", "title_cn": "泰国特案厅（DSI）扩大燃料行业反腐调查 目标直指素叻他尼府（Surat Thani）", "summary_cn": "泰国特案厅（Department of Special Investigation）正扩大对燃料行业的违规调查。本周一，调查组将突击检查素叻他尼府（Surat Thani）的一个油库，并计划传唤多家石油运输公司的高管。此项行动涉及非法囤积燃料及油品运输过程中的账目违规嫌疑。", "importance": "P2", "section_hint": "thailand", "location_detail": "素叻他尼府", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "thailand_dsi_fuel_probe_2026", "status": "pending", "added_date": "2026-04-19"}, {"id": "8224a9eebfae", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "On Nut elevated road nears completion: Wisanu", "url": "https://www.bangkokpost.com/thailand/general/3239590/on-nut-elevated-road-nears-comple 道路安全报告：累计 242 人死亡", "url": "https://thethaiger.com/news/pattaya/songkran-festival-242-fatalities-in-thailands-road-safety-report", "date": "2026-04-18T08:30:01+00:00", "desc": "Thailand recorded 242 deaths... during the Songkran road safety campaign from April 10 to 16, with Bangkok posting the highest death toll at 21.", "desc_original": "Thailand recorded 242 deaths... during the Songkran road safety campaign from April 10 to 16, with Bangkok posting the highest death toll at 21.", "summary_cn": "根据泰国官方发布的跨年道路安全报告，在4月10日至16日的宋干节（Songkran）“危险七日”期间，泰国全国共记录了242起死亡事故。其中，曼谷（Bangkok）以21人死亡成为伤亡人数最多的地区。尽管当局加强了执法和安全提醒，但假期间的交通事故仍是泰国民众和游客面临的主要风险。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-05-04", "event_id": "thailand_songkran_road_safety_2026", "status": "pending", "added_date": "2026-04-19", "origin": "rss", "title_cn": "泰国宋干节（Songkran）道路安全报告：累计 242 人死亡"}, {"id": "5f720432e3c2", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国华商关注：郑丽文率团访陆有助开启两岸和平窗口", "url": "https://www.thaiheadlines.com/187197/", "date": "2026-04-18T08:12:51+00:00", "desc": "泰国头条新闻社讯 4月7日至12日，中国国民党主席郑丽文应邀率团访问大陆，先后赴江苏、上海、北京开展参访交流。", "desc_original": "泰国头条新闻社讯 4月7日至12日，中国国民党主席郑丽文应邀率团访问大陆，先后赴江苏、上海、北京开展参访交流。", "summary_cn": "中国国民党主席郑丽文于4月7日至12日应邀率团访问中国大陆，到访江苏、上海及北京。对此，泰国及东南亚华商领袖表示高度关注，认为此类交流有助于开启两岸和平对话窗口，并对区域经贸环境的稳定持乐观看法，体现了东南亚侨界对两岸关系良性发展的期盼。", "importance": "P3", "section_hint": "cn_thai", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.8, "tags": [], "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "thai_chinese_business_reaction_taiwan_visit", "status": "pending", "added_date": "2026-04-19", "origin": "rss", "title_cn": "泰国华商关注：郑丽文率团访陆有助开启两岸和平窗口"}, {"id": "4afdacef9287", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "耐克 Nike “青木瓜沙拉鞋”走红！泰国美食元素惊艳全球潮流圈", "url": "https://www.thaiheadlines.com/187200/", "date": "2026-04-18T08:09:49+00:00", "desc": "泰国头条新闻社讯 4月18日，据泰媒报道，国际知名运动品牌耐克推出的一款特别版运动鞋Nike Dunk Low“Som Tum”在全球引发关注。", "desc_original": "泰国头条新闻社讯 4月18日，据泰媒报道，国际知名运动品牌耐克推出的一款特别版运动鞋Nike Dunk Low“Som Tum”在全球引发关注。", "summary_cn": "国际运动品牌耐克（Nike）推出以泰国国民美食“青木瓜沙拉”为灵感的特别版运动鞋 Nike Dunk Low 'Som Tum'。该鞋款融合了丰富的泰国文化元素，通过色彩与细节致敬泰国饮食文化，在全球时尚圈引发热议。这一跨界设计展示了泰国文化在全球消费市场日益增长的影响力。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "nike_som_tum_shoes_launch_2026", "status": "pending", "added_date": "2026-04-19", "origin": "rss", "title_cn": "耐克 Nike “青木瓜沙拉鞋”走红！泰国美食元素惊艳全球潮流圈"}, {"id": "fddf65ce85fb", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "阿努廷（Anutin）结束南部视察，拟在陶公府（Narathiwat）边境修建围栏", "url": "https://www.thaiheadlines.com/187194/", "date": "2026-04-18T07:20:49+00:00", "desc_original": "泰国头条新闻社 据泰媒报道，4月17日，泰国总理兼内政部长阿努廷结束了对泰南边境地区的视察后抵达Don Mueang第6空军联队第2军用机场，他对媒体表示，此行已尽可能与各方沟通，相关部门将共同努力改善当地局势。他称，当天相关部门部长几乎全部到场，仅卫生部未随行。 针对内政安全行动指挥部（ISOC）职能是否需要调整的问题，阿努廷表示，已下达更严格的执法政策，并将充分运用“理解、接近、发展”原则，同时提升情报工作，推动南部边境三府民众协作更具实效。 关于枪击陶公府民族党议员一案，阿努廷表示自己已与当事人卡摩萨沟通，获悉案件进展迅速，已抓获4名嫌疑人，仍需扩大侦办追捕剩余1人；目前尚不确定该嫌疑人是否已偷渡逃离。 此外，阿努廷提到，内政安全行动指挥部（ISOC）已就一名批准借用车辆的海军上校报案追责，相关进展正在推进。他同时表示，原则上同意在陶公府Waeng县沿Ko-Lok 河边境路段修建围栏，防止走私货物或“不受欢迎物品”通过自然通道进入泰国并造成不良后果，并要求将该工程同时用于防洪，应对该区域长期存在的洪水问题。", "summary_cn": "泰国副总理兼内政部长阿努廷（Anutin）结束对南部边境地区的视察。针对近期陶公府（Narathiwat）发生的国会议员枪击案，他证实已抓获4名嫌疑人。为加强边境管控，他原则上同意在陶公府瓦县（Waeng）沿哥乐河（Ko-Lok River）地段修建围栏，旨在打击走私及非法入境行为，同时该工程将兼顾防洪功能，解决当地长期水患。此外，他还强调将通过ISOC加强南部三府的情报工作。 ", "importance": "P2", "section_hint": "thailand", "location_detail": "陶公府 Waeng 县", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "thailand_south_border_fence_2026", "status": "pending", "added_date": "2026-04-19", "title_cn": "阿努廷（Anutin）结束南部视察，拟在陶公府（Narathiwat）边境修建围栏"}, {"id": "398664fd7401", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "暖武里府（Nonthaburi）理发店命案：老板夫妇涉嫌设局诱杀26岁男子", "url": "https://www.thaiheadlines.com/187190/", "date": "2026-04-18T06:58:28+00:00", "desc_original": "泰国头条新闻社讯 近日，泰国暖武里府发生一起恶性案件。58岁理发店老板吉拉瓦涉嫌设局诱骗一名26岁男子到店，随后与两名妻子合力将其捆绑并殴打致死。案发后，一段记录死者生前呼救的音频曝光，成为关键证据，引发社会广泛关注。 据警方通报，4月17日，死者被以领取手机为由骗至北革县邦普地区一处理发店。进入店内后，吉拉瓦及妻子三人将其控制并绑住双手，使用石杵反复击打其头部，直至死亡。事后，嫌疑人试图伪造现场，将尖刀放入死者手中，声称对方持刀上门索要2万泰铢，自己出于正当防卫才动手。 然而，一名在场女性顾客录下了案发过程中的关键音频。录音中，死者不断呼喊求救，直至遇害，这一证据对案件性质判断具有重要意义。 4月18日，警方将三名嫌疑人带至北革警局连夜审讯。三人均否认预谋杀人，坚持称行为属于自我防卫。目前，警方已以“故意杀人”“预谋杀人”及“掩盖真实死因”等罪名对其立案并押送至暖武里府法院申请羁押，同时反对保释，理由是案件情节严重，可能面临重刑。", "summary_cn": "泰国暖武里府（Nonthaburi）北革县（Pak Kret）发生一起恶性杀人案。理发店老板与两名妻子涉嫌谎称赠送手机，诱骗一名26岁男子至店中后实施捆绑殴打，导致其死亡。嫌疑人虽一度辩称为正当防卫且试图伪造现场，但现场关键求救录音戳穿了谎言。目前警方已以预谋杀人等重罪对三人提起诉讼并拒绝保释。此案因手段残忍及复杂的人际背景引发社会高度关注。", "importance": "P2", "section_hint": "thailand", "location_detail": "北革县 Pak Kret", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-19", "event_id": "nonthaburi_barbershop_murder_2026", "status": "pending", "added_date": "2026-04-19", "title_cn": "暖武里府（Nonthaburi）理发店命案：老板夫妇涉嫌设局诱杀26岁男子"}, {"id": "016caa99cfe6", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "泰国航司大幅削减航班，出境游人数预计下降10%至20%", "url": "https://thethaiger.com/news/business/thai-flight-cuts-lead-to-10-drop-in-outbound-travel", "date": "2026-04-18T06:45:59+00:00", "desc_original": "Thai flight cuts lead to 10% drop in outbound travel Legacy Flight cancellations and capacity reductions are expected to push outbound trips down by 15 to 20% during the low season, with a 10% decline projected across the full year. Several Thai carriers have trimmed their schedules on specific routes. Thai AirAsia X has pulled back on its Bangkok to Sapporo service, while Thai AirAsia has reduced flights to China for the remainder of the summer schedule. Thai Airways has also cut a number of domestic and international routes in May. Chotechuang Soorangura, vice-president of the Thai Travel Ag", "summary_cn": "受各大航空公司航班消减影响，泰国今年出境旅游人数预计下降约10%。泰亚航X（Thai AirAsia X）裁减了曼谷至札幌航线，泰亚航（Thai AirAsia）也缩减了夏季飞往中国的航班频率，泰航（Thai Airways）同样削减了5月部分国内外航线。泰国旅游协会预测，淡季期间出境游客降幅可能扩大至15-20%。航司运营策略的调整及运力缩减直接推高了票价，抑制了民众的飞行意愿。", "importance": "P1", "section_hint": "thailand", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.9, "tags": [], "time_sensitive": true, "expires_date": "2026-05-04", "event_id": "thai_flight_cuts_2026_04", "status": "pending", "added_date": "2026-04-19", "title_cn": "泰国航司大幅削减航班，出境游人数预计下降10%至20%"}, {"id": "070eb8432dda", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "泰运输业者欢迎燃油补贴，但对严苛申领条件表示不满", "url": "https://www.bangkokpost.com/thailand/general/3238994/drivers-welcome-aid-chafe-at-rules", "date": "2026-04-18T06:21:00+07:00", "desc": "Crowds of transport operators packed the registration centre in Bangkok as fuel aid opened, expressing relief but also concern over strict conditions amid surging diesel costs.", "desc_original": "Crowds of transport operators packed the registration centre in Bangkok as fuel aid opened, expressing relief but also concern over strict conditions amid surging diesel costs.", "title_cn": "泰运输业者欢迎燃油补贴，但对严苛申领条件表示不满", "summary_cn": "曼谷 Bangkok 的燃油补贴登记中心近日排起长队，大批运输业者前往申请政府发放的财务援助。虽然在该项计划下，柴油成本上涨带来的压力有所缓解，但申请者普遍对严苛的准入规则和程序表示担忧。目前燃油价格波动已严重影响物流利润，业界呼吁政府简化手续。此举反映了泰国目前面对能源通胀压力时，社会福利执行层面存在的阻碍。", "importance": "P2", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "time_sensitive": true, "expires_date": "2026-05-03", "event_id": "thailand_fuel_subsidy_complaints_2026", "status": "pending", "added_date": "2026-04-18"}, {"id": "00721ce7b46f", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国政府住宅银行推出40亿铢针对长者的房贷方案", "url": "https://www.bangkokpost.com/business/general/3239214/gh-bank-rolls-out-b4bn-mortgage-scheme-for-elderly", "date": "2026-04-18T06:06:00+07:00", "desc": "Government Housing (GH) Bank is moving forward with its housing loan programme for senior citizens, covering both elderly people who wish to buy a home and those who wish to sell their own homes, with total lending of 4 billion baht.", "desc_original": "Government Housing (GH) Bank is moving forward with its housing loan programme for senior citizens, covering both elderly people who wish to buy a home and those who wish to sell their own homes, with total lending of 4 billion baht.", "title_cn": "泰国政府住宅银行推出40亿铢针对长者的房贷方案", "summary_cn": "泰国政府住宅银行 GH Bank 正式推进一项总额为40亿泰铢的专项信贷计划，旨在服务于步入老龄社会的银发群体。该方案涵盖了希望贷款购房致老的群体，以及希望通过“反向抵押”或持有住房套现养老的群体。该计划不仅反映了泰国房地产市场对人口老龄化的适应，也为本地长者通过房产优化资产配置提供了政策渠道。对房产市场和养老金融具有指向意义。", "importance": "P2", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#房产", "relevance_score": 0.9, "tags": [], "origin": "rss", "time_sensitive": true, "expires_date": "2026-05-03", "event_id": "thailand_elderly_mortgage_scheme_2026", "status": "pending", "added_date": "2026-04-18"}, {"id": "17e37284fbcd", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "Nex Point（纳思通）领航泰国商用电动车生态化转型", "url": "https://www.thaiheadlines.com/187184/", "date": "2026-04-18T05:55:15+00:00", "desc_original": "泰国头条新闻社讯 近日，泰华新媒体协会执行会长、泰国亚洲大众集团（大众）有限公司董事长、 泰国头条新闻社社长、@ManGu曼谷杂志社社长郭蕊女士对泰国 Nex Point 公共股份有限公司联席首席执行官Thanapat Suksuthamwong先生进行了专访. Nex Point 主要从事电动汽车研发与制造，是泰国商用电动车领域的重要推动力量。采访中，Thanapat先生回顾企业三十余年的发展路径：从高精密电子零部件制造起家，再到迈向电动商用车生产与租赁，企业在扩展业务的同时稳步完成了产业转型。", "summary_cn": "泰国商用电动车大厂Nex Point首席执行官Thanapat在专访中分享了企业转型之路。该公司从电子零件制造成功跨向电动商用车制造与租赁，并提前布局充电网络基础设施。Thanapat强调企业在泰国电动车生态普及中的作用，并鼓励创业者跳出舒适圈尝试创新。Nex Point的发展反映了泰国在区域绿色能源物流领域的野心和产业升级方向。 ", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "t
