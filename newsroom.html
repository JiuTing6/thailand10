section_hint": "thailand", "location_detail": "叻丕府 Ratchaburi", "city_tag": "#叻丕府", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "status": "pending", "event_id": "ratchaburi_child_abuse_death_2026", "time_sensitive": false, "added_date": "2026-04-10", "expires_date": "2026-05-10", "origin": "rss", "title_cn": "叻丕府（Ratchaburi）继父虐杀一岁男童，竟试图用电击装置“复活”受害者"}, {"id": "b0668a660ddf", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "拥有10万粉丝的假钻卖家落网，巴吞他尼府（Pathum Thani）涉案金额超400万铢", "url": "https://thethaiger.com/hot-news/crime/fake-diamond-seller-arrested-over-4-million-baht-losses", "date": "2026-04-09T09:25:02+00:00", "desc_original": "The owner of a jewellery sales page with nearly 100,000 followers was arrested today, April 9, for allegedly selling fake diamonds and gems through livestreams... Pathum Thani.", "summary_cn": "4月9日，巴吞他尼府（Pathum Thani）警方逮捕了一名拥有近10万粉丝的珠宝社交账号主。该嫌疑人涉嫌利用直播带货，将廉价的人造宝石包装成名贵钻石及宝石出售。目前已有大量受害者报案，累计经济损失超过400万泰铢。此案再次提醒在泰外籍人士网购贵重物品需极度谨慎。", "importance": "P1", "section_hint": "thailand", "location_detail": "巴吞他尼府 Pathum Thani", "city_tag": "#巴吞他尼", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "status": "pending", "event_id": "thailand_fake_jewelry_fraud_arrest_2026", "time_sensitive": false, "added_date": "2026-04-10", "expires_date": "2026-05-10", "origin": "rss", "title_cn": "拥有10万粉丝的假钻卖家落网，巴吞他尼府（Pathum Thani）涉案金额超400万铢"}, {"id": "7f16dc7575c0", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "金价预测：第三季度有望突破每盎司6000美元", "url": "https://www.bangkokpost.com/business/investment/3233558/gold-prices-projected-to-hit-6000-by-third-quarter", "date": "2026-04-09T09:21:00+07:00", "desc_original": "Gold prices are expected to reach US$6,000 an ounce in the third quarter of this year... even though short-term volatility is expected amid lingering uncertainties, traders say.", "summary_cn": "据泰媒援引交易商观点，金价受全球不确定性因素及避险需求推动，预计在今年第三季度可能冲破每盎司6000美元大关。尽管短期内市场仍会面临波动，但在泰投资者及金店行业对长期走势依然看好。作为避险资产，黄金的剧烈价格变动直接影响泰国本土金饰及实物金交易行情。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.4, "tags": [], "status": "pending", "event_id": "global_gold_price_forecast_2026", "time_sensitive": true, "added_date": "2026-04-10", "expires_date": "2026-04-25", "origin": "rss", "title_cn": "金价预测：第三季度有望突破每盎司6000美元"}, {"id": "a40b6cd917b0", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "邓丽君逝世31年后，清迈（Chiang Mai）昔日管家首谈去世细节", "url": "https://thethaiger.com/news/chiang-mai/treatment-for-teng-li-chun-delayed-by-chiang-mai-traffic", "date": "2026-04-09T09:00:57+00:00", "desc_original": "A Thai man, who said he was the butler of Taiwanese singer Teng Li-Chun , recalled the events before her death in Chiang Mai...", "summary_cn": "一名曾担任华语巨星邓丽君在清迈（Chiang Mai）居所管家的泰国男子最近打破沉默。他回忆称，当年邓丽君不幸去世前夕，曾因病重急需救治，但其就医过程受到清迈当时交通状况的延误。这段往事再次引发华人社会对这位巨星英年早逝的唏嘘。该新闻反映了清迈与国际巨星的一段历史渊源。", "importance": "P3", "section_hint": "thailand", "location_detail": "美平饭店 Chiang Mai", "city_tag": "#清迈", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "status": "pending", "event_id": "teresa_teng_chiang_mai_recollection_2026", "time_sensitive": false, "added_date": "2026-04-10", "expires_date": "2026-05-10", "origin": "rss", "title_cn": "邓丽君逝世31年后，清迈（Chiang Mai）昔日管家首谈去世细节"}, {"id": "524dd7f22a1b", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "一名以色列籍男子因在普吉岛（Phuket）非法经营代持旅行社被捕", "url": "https://thethaiger.com/news/phuket/israeli-national-arrested-for-illegal-travel-agency-in-phuket", "date": "2026-04-09T07:15:02+00:00", "desc": "Israeli national arrested for nominee-run travel agency in Phuket Legacy Police arrested an Israeli national in Phuket yesterday, April 8, for operating a travel agency illegally through a Thai nominee . Officers from the Department of Tourism and Tourist Police investigated illegal travel agencies in Phuket and found two companies in breach of the law.", "desc_original": "Israeli national arrested for nominee-run travel agency in Phuket Legacy Police arrested an Israeli national in Phuket yesterday, April 8, for operating a travel agency illegally through a Thai nominee . Officers from the Department of Tourism and Tourist Police investigated illegal travel agencies in Phuket and found two companies in breach of the law.", "summary_cn": "普吉岛（Phuket）警方昨日逮捕了一名以色列籍男子。该男子涉嫌通过泰国代持人（Nominee）非法经营旅行社。泰国旅游厅与旅游警察在针对非法旅游业者的专项调查中发现，当地有两家公司违反法律规定。此次行动显示了泰国当局打击“影子代持者”及维护旅游市场秩序的决心，外国人在泰经商需严格遵守股权及执照规定。", "importance": "P1", "section_hint": "thailand", "location_detail": "普吉岛 Phuket", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-10", "event_id": "phuket_israeli_nominee_arrest_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-10", "title_cn": "一名以色列籍男子因在普吉岛（Phuket）非法经营代持旅行社被捕"}, {"id": "9d7659d2d99a", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "Grab 推出 AI 伴侣服务提升收益", "url": "https://www.bangkokpost.com/business/general/3233628/grab-rolls-out-ai-companion-services-to-boost-earnings", "date": "2026-04-09T07:08:00+07:00", "desc_original": "Grab is accelerating its shift beyond transaction-based services to become an \"intelligent everyday guide\", evolving from a super-app into a more integrated, AI-driven companion.", "title_cn": "Grab 推出 AI 助手服务致力于从超级 App 转型为“智能生活指南”", "summary_cn": "东南亚网约车巨头 Grab 正在加速业务转型，目标是从单纯的交易型服务平台演变为“智能日常指南”。公司推出了一系列 AI 驱动的伴侣式服务，通过整合人工智能技术，将 Grab 从一个超级应用程序（Super-app）升级为更具交互性的 AI 驱动平台。此举旨在通过智能化手段优化用户体验，并以此提升公司的整体盈利能力与市场竞争力。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "thailand_grab_ai_expansion_2026", "status": "pending", "added_date": "2026-04-09", "time_sensitive": false, "expires_date": "2026-05-09"}, {"id": "731a8a5b3785", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "宋干节（Songkran）期间泰国各大机场推出停车福利迎出行高峰", "url": "https://www.thaiheadlines.com/186828/", "date": "2026-04-09T07:01:15+00:00", "desc": "泰国头条新闻社 据泰媒报道，4月8日，泰国机场集团（AOT）CEO帕维娜表示，宋干节期间民众返乡与旅游出行增加。", "desc_original": "泰国头条新闻社 据泰媒报道，4月8日，泰国机场集团（AOT）CEO帕维娜表示，宋干节期间民众返乡与旅游出行增加。", "summary_cn": "针对即将到来的宋干节（Songkran）假期出行高峰，泰国机场集团（AOT）宣布将在节日期间，为其管辖的各大机场提供停车优惠福利。CEO帕维娜指出，此举旨在应对激增的返乡及旅游客流。对于在泰华人及游客，这不仅能缓解机场周边交通压力，也为长假自驾往返机场的民众提供了便利和成本优惠。", "importance": "P1", "section_hint": "thailand", "location_detail": "泰国机场", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-04-25", "event_id": "aot_songkran_parking_discount_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-10", "title_cn": "宋干节（Songkran）期间泰国各大机场推出停车福利迎出行高峰"}, {"id": "983a1542b37f", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Long break eases pressure on oil reserves", "url": "https://www.bangkokpost.com/business/general/3233593/long-break-eases-pressure-on-oil-reserves", "date": "2026-04-09T06:10:00+07:00", "desc_original": "The long holiday during the Songkran festival may ease pressure on Thailand's oil reserves, as demand for diesel is expected to decrease during this period, says the Department of Energy Business.", "title_cn": "宋干节（Songkran）长假预计将缓解泰国石油储备压力", "summary_cn": "泰国能源商业局表示，即将到来的宋干节长假有望减轻泰国当前的石油储备压力。由于节假日期间工业生产节奏放缓，预计柴油需求将明显下降。尽管假期期间私人出行的汽油消耗会有所增加，但工业和物流用油的减少将起到平衡作用。这一周期性需求调整有助于政府在国际能源局势不稳定的背景下更好地对战略能源进行管理。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.95, "tags": [], "origin": "rss", "event_id": "thailand_oil_demand_songkran_2026", "status": "pending", "added_date": "2026-04-09", "time_sensitive": true, "expires_date": "2026-04-24"}, {"id": "0c52bee4b115", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Airlines adjust operations amid ceasefire", "url": "https://www.bangkokpost.com/business/general/3233578/airlines-adjust-operations-amid-ceasefire", "date": "2026-04-09T06:06:00+07:00", "desc_original": "Despite a two-week ceasefire between the US and Iran, Thai airlines still have to adjust their operational strategies for the summer schedule to match travel demand dampened by concerns over uncertainty surrounding the oil crisis.", "title_cn": "国际局势虽见缓和，泰国各航空公司仍因油价波动调整夏季航程", "summary_cn": "尽管美国与伊朗达成了为期两周的停火协议，但泰国航空业依然保持警惕。由于石油危机及其引发的市场不确定性依然存在，旅游需求受到一定抑制。泰国各大航空公司正在重新审视并调整其夏季航班时刻表与运营策略。这种谨慎做法反映了航空业对国际航油成本波动的高度敏感，目前各航司正努力平衡载客量与燃油运营成本之间的关系。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.7, "tags": [], "origin": "rss", "event_id": "thai_airlines_summer_adj_2026", "status": "pending", "added_date": "2026-04-09", "time_sensitive": true, "expires_date": "2026-04-24"}, {"id": "b7ba1a02f45d", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "New state measures in bid to solve plastic crisis", "url": "https://www.bangkokpost.com/business/general/3233563/new-state-measures-in-bid-to-solve-plastic-crisis", "date": "2026-04-09T06:03:00+07:00", "desc_original": "The government has outlined management guidelines to tackle the ongoing plastic pellet crisis. Key initiatives will focus on identifying high-priority items, promoting the use of alternative materials, and enhancing recycling.", "title_cn": "泰国政府出台新管理指南，应对日益严重的塑料微粒危机", "summary_cn": "针对日益严峻的废弃塑料及塑料微粒问题，泰国政府近日公布了新的政策框架。该管理指南重点包括：明确高优先级处理的塑料产品类别、在制造业推广使用环保材料或替代材料、以及优化现有的回收机制和循环链条。这些措施旨在从源头上减少塑料污染，以符合全球可持续发展趋势，并改善泰国本地的生态环境恶化趋势。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "thailand_plastic_crisis_measures_2026", "status": "pending", "added_date": "2026-04-09", "time_sensitive": fal 6802/", "date": "2026-04-08T10:50:28+00:00", "desc": "最近，在曼谷的街头巷尾与全球社交媒体上，一种极具视觉张力的混搭风潮席卷而来：上半身泰式披肩（Sabai），下半身牛仔裤。这标示着由Z世代主导、由KT Kratae等艺人引领的泰国传统文化符号日常化演变。", "desc_original": "最近，在曼谷的街头巷尾与全球社交媒体上，一种极具视觉张力的混搭风潮席卷而来：上半身泰式披肩（Sabai），下半身牛仔裤。这标示着由Z世代主导、由KT Kratae等艺人引领的泰国传统文化符号日常化演变。", "summary_cn": "曼谷正兴起一种将泰式传统披肩（Sabai）与牛仔裤混搭的全新时尚潮流。这种由 Z 世代群体和本土艺人 KT Kratae 共同推动的着装风格（OOTD），将泰国传统文化符号融入日常生活，展现了当地年轻人对民族身份认知的现代诠释，并在社交平台上引发高度关注。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#中泰", "relevance_score": 0.8, "tags": [], "origin": "rss", "event_id": "bangkok_sabai_fashion_trend_2026_04", "status": "pending", "added_date": "2026-04-09", "time_sensitive": false, "expires_date": "2026-05-09", "title_cn": "曼谷街头混搭风潮：泰式披肩 Sabai 搭配牛仔裤席卷 Z 世代"}, {"id": "91e620d4e178", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "泰柴油价格4月9日起下调2.14泰铢", "url": "https://thethaiger.com/hot-news/politics/thailand-cuts-diesel-price-by-2-14-baht-from-april-9", "date": "2026-04-08T10:48:11+00:00", "desc_original": "Thailand will cut diesel price by 2.14 baht per litre from tomorrow, April 9, marking a historic first-time reduction in fuel prices. Energy Minister Akanat Promphan confirmed the reduction for B7 and B20 diesel.", "summary_cn": "从2026年4月9日起，泰国柴油价格每升将大幅下调2.14泰铢。能源部长阿卡纳（Akanat Promphan）已证实，此次调价涵盖B7和B20型号柴油。这标志着泰国燃油价格史上具有突破性的首次大幅降价，旨在减轻民众的生活成本压力。此举不仅是能源政策的调整，也被视为政府平抑通胀、稳定交通及物流成本的重要举措。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": true, "expires_date": "2026-04-24", "event_id": "thailand_diesel_price_drop_2026_04", "status": "pending", "added_date": "2026-04-09", "origin": "rss", "title_cn": "泰柴油价格4月9日起下调2.14泰铢"}, {"id": "859c37c31598", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "2026宋干节狂欢：曼谷是隆路（Silom Road）攻略集锦", "url": "https://www.thaiheadlines.com/186798/", "date": "2026-04-08T10:45:07+00:00", "desc_original": "曼谷的四月，有很多热闹。&nbsp; 但真正能让你一脚踏进去，就立刻感受到“泰国新年到了”的地方， 只有一个—— 是隆路（Silom Road） 当整条路正式封街， 音响开到最大， 陌生人朝你举起水枪， 第一瓢冰水从头顶浇下来的那一刻—— 你会瞬间明白， 宋干节不是“看活动”，而是“你必须亲自站进去一次”。 而2026年，最值得冲的，还是它。 “Songkran Silom Splash Out With Thai Culture 2026” 4月12日—14日，连续3天，正式回归。 这不是普通泼水。 这是每年只上演一次的 曼谷最疯、最挤、最好玩、也最值得和朋友一起去的宋干主战场。 为什么今年的是隆路，特别值得去？ 因为它不只是“疯”，&nbsp; 而是第一次把 泰国文化感 和 年轻人的狂欢感 真正混在了一起。 往年大家对是隆路的印象，都是： 人多、水猛、音乐炸、气氛疯。 但今年，它明显不一样了。&nbsp; 官方不只想让你“玩湿”，&nbsp; 更想让你感受到—— 泰国的宋干节，为什么能让全世界的人都愿意飞来参加。 1）不是单纯泼水，而是“有仪式感的新年” 4月12日将有浴佛祈福仪式与佛像花车活动。也就是说，你来到这里，不只是来玩，也是在走进一个真正属于泰国的新年现场。 2）今年最出圈的穿搭，真的会在这里刷屏 今年官方特别鼓励大家穿上： 泰式披肩（Sabai）+ 牛仔裤 泰式花衬", "summary_cn": "2026年宋干节（泼水节）期间，曼谷是隆路（Silom Road）于4月12日至14日举行为期3天的“Silom Splash Out”大型庆典。今年活动首次融合了传统仪式与现代狂欢，包括浴佛祈福和花车游行。作为曼谷泼水节的最强主战场，官方今年特别推荐“泰式披肩搭牛仔裤”的混搭穿搭，旨在让全球游客在极致湿身互动中感受泰式文化的魅力。", "importance": "P3", "section_hint": "bangkok", "location_detail": "是隆路 Silom Road", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.95, "tags": [], "time_sensitive": true, "expires_date": "2026-04-24", "event_id": "bangkok_songkran_silom_2026", "status": "pending", "added_date": "2026-04-09", "origin": "rss", "title_cn": "2026宋干节狂欢：曼谷是隆路（Silom Road）攻略集锦"}, {"id": "231905926865", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "邦查（Bangchak）油轮穿越霍尔木兹海峡平安抵泰", "url": "https://thethaiger.com/news/national/bangchak-oil-tanker-thailand-hormuz-passage", "date": "2026-04-08T10:20:26+00:00", "desc_original": "Bangchak oil tanker reaches Thailand after Hormuz passage Legacy Bangchak said its oil tanker MT.POLA arrived safely in Thailand at Si Racha district, Chon Buri, today, April 8, after passing through the Strait of Hormuz and delivering crude oil to the company’s refinery. The voyage followed diplomatic coordination involving Thailand, Iran and Oman, which reportedly allowed Thai cargo vessels to use the route on March 23 to 24. The passage was made possible after coordination led by Sihasak Phuangketkeow, acting foreign m ead with a mobile phone, leaving him with a head injury . The boy was later taken to Saraburi Hospital, where he received treatment. The doctors said the boy’s wound did not require stitches and was a small open wound. The child’s father, 41 year old Pitak, said he had enrolled his son for tutoring during the school holiday near their home. He said the boy had attende", "title_cn": "北标府（Saraburi）父亲报警：补习老师用手机砸伤7岁儿子头部", "summary_cn": "4月7日，泰国北标府（Saraburi）一位41岁的父亲向警方报案，称其正在放暑假的7岁儿子在参加家附近的补习班时，被一名女老师用手机砸伤头部。孩子随后被送往北标医院治疗，医生诊断为小型开放性伤口，无需缝针。此事件引发了当地对校外补习机构监管及教师行为准则的关注。目前警方已介入调查。", "importance": "P3", "section_hint": "thailand", "location_detail": "北标府 Saraburi", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "saraburi_tutor_assault_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-09"}, {"id": "bb10e818a2c4", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "避免直接接触！泰国普吉近海及岸边现月亮水母", "url": "https://www.thaiheadlines.com/186795/", "date": "2026-04-08T08:39:45+00:00", "desc_original": "泰国头条新闻社讯 4月7日，据泰媒报道，泰国上安达曼海岸与海洋资源研究中心表示，普吉府Racha Yai岛暹罗湾附近海面漂浮着约20至30只月亮水母，并有部分被冲上海岸。 研究中心称，在Racha Yai岛海洋保护区管理中心工作人员报告发现后，相关部门已发出提醒。随后，工作人员确认这些水母为月亮水母属于泰国海域常见物种。 月亮水母携带的毒性较弱，通常不构成生命危险，但可能引发皮肤发红、灼烧感与刺激反应，尤其是皮肤敏感或对蜇伤反应较强的人群更需注意。有关部门建议公众与游客不要直接触摸水母，也不必恐慌，因为该物种不属于高危险级别。若接触后出现异常症状，建议清洁患处，并作为预防措施及时就医。 上周泰国副总理兼自然资源与环境部长素查曾在普吉府Aeo岛周边发现高密度的有毒火水母后提醒公众注意安全，据悉，被火水母蜇后可能出现刺痛、灼痛、皮肤刺激或红疹。若遭蜇伤，建议持续用食醋冲洗患处至少30秒，并尽快就医。素查表示，海洋与沿海资源厅（DMCR）报告称，当地水母密度约为每平方米100只，水母漂浮在距海面约3至5米深度水层。 （编译：hansa；审核：wan；来源：thethaiger）", "title_cn": "普吉岛（Phuket）近海出现月亮水母 部门提醒游客避免接触", "summary_cn": "泰国普吉府（Phuket）大拉查岛（Racha Yai）附近发现20-30只月亮水母，部分被冲上海岸。虽然该品种毒性较弱，通常不致命，但会导致皮肤发红、灼热感。专家提醒由于近期安达曼海域水母密度增加，若被蜇伤应及时就医，过敏体质需格外警惕。此外，副总理素查此前还提醒当地曾发现高毒性的火水母，建议用食醋冲洗伤口作为急救。", "importance": "P1", "section_hint": "thailand", "location_detail": "普吉岛拉查岛 Koh Racha Yai", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 0.85, "tags": [], "time_sensitive": true, "expires_date": "2026-04-24", "event_id": "phuket_jellyfish_warning_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-09"}, {"id": "2a14127a9896", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Samut Songkhram officials launch crackdown on fake coconut water", "url": "https://thethaiger.com/news/central-thailand/fake-coconut-water-factories-raided-in-samut-songkhram", "date": "2026-04-08T08:38:42+00:00", "desc_original": "Samut Songkhram officials launch crackdown on fake coconut water Legacy Police raided two production facilities in Samut Songkhram yesterday, April 7, over fake coconut water made from water and flavourings, which officers say was harming local farmers, consumers and the reputation of Thai coconut products. Local coconut farmers sought government action after coconut prices fell and exports to China, one of the sector’s biggest markets, declined. They said the problems were linked to Chinese nationals allegedly investing illegally in coconut plantations in Samut Sakhon, Samut Songkhram and Rat", "title_cn": "夜功府（Samut Songkhram）查处非法椰子水加工厂 涉及假冒产品损害出口声誉", "summary_cn": "4月7日，夜功府（Samut Songkhram）警队突击搜查了两处椰子水生产设施，查获大量用水和香精勾兑的假冒椰子水。此类造假行为严重损害了泰国椰子产品的出口声誉，特别是在中国等重要市场。此项行动源于当地果农的举报，农户反映由于造假泛滥和疑似外籍人士（提及中国籍人员）非法注资经营导致当地椰子价格暴跌、出口受阻。警方正深挖违规投资背后的灰色产业链。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "夜功府 Samut Songkhram", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "thailand_fake_coconut_crackdown_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-09"}, {"id": "07ae8d5696c4", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国电影导演协会奖揭晓 跨界新生代包揽最佳男女主", "url": "https://www.thaiheadlines.com/186792/", "date": "2026-04-08T08:17:55+00:00", "desc_original": "泰国头条新闻社讯 据泰媒报道，近日，第15届泰国电影导演协会奖在曼谷Sukosol酒店举行颁奖典礼，向泰国电影行业多个奖项类别的优秀作品与从业者颁发荣誉。 其中，Jaonaay Jinjett凭借电影《疯狂的佛牌》中Ek一角获得最佳男主角奖。Fatima Dechawaleekul则凭借电影《隔楼女孩：我们之间的层距》中Ann一角获得最佳女主角奖，影片以戏剧与成长叙事呈现人物情感与成长。 此外，最佳影片奖授予电影《有用的鬼》，最佳影片亚军授予《疯狂的佛牌》。最佳导演奖由林金伟及其助理导演团队凭借《有用的鬼》获得。为表彰泰国电影创作团队，典礼还设置并颁发了其他多个奖项。 本届颁奖典礼由泰国电影导演协会主办，评选采用1人1票制，由全体导演协会会员投票决定。主办方表示，该奖项被视为推动泰国电影产业提升质量的重要平台之一。", "title_cn": "第15届泰国电影导演协会奖在曼谷（Bangkok）揭晓 新生代演员获大奖", "summary_cn": "第15届泰国电影导演协会奖在曼谷Sukosol酒店落幕。Jaonaay Jinjett凭借《疯狂的佛牌》斩获最佳男主角，Fatima则因《隔楼女孩》摘得影后桂冠。最佳影片由《有用的鬼》夺得。该奖项采用导演协会会员“一人一票”制，旨在公平评选泰国影坛优秀作品，推动行业向高质量高水准迈进，是泰国影视界极具专业公信力的年度盛事。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷 Sukosol 酒店", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 0.75, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "thai_film_directors_awards_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-09"}, {"id": "53600fb3fd42", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "Tourists warned after moon jellyfish found floating off Phuket", "url": "https://thethaiger.com/news/phuket/tourists-warned-after-moon-jellyfish-found-floating-off-phuket", "date": "2026-04-08T07:50:59+00:00", "desc_original": "Tourists warned after moon jellyfish found floating off Phuket Legacy About 20 to 30 moon jellyfish were found floating near the surface and washed ashore at Ao Siam on Koh Racha Yai in Phuket yesterday, April 7, according to the Upper Andaman Coastal and Marine Resources Research Centre. An alert was issued after staff at the Racha Islands protected area management centre in Rawai, Mueang district, Phuket, reported the sighting. Officials later identified the animals as moon jellyfish , a species commonly found in Thai waters.", "title_cn": "普吉（Phuket）大拉查岛发现大量月亮水母 游客下水需谨慎", "summary_cn": "4月7日，在普吉府（Phuket）穆昂县万来区（Rawai）的大拉查岛（Koh Racha Yai）的暹罗湾（Ao Siam），海洋研究中心确认在该海域发现数十只月亮水母，部分已冲滩。官方已发布安全预警，虽然月亮水母在泰国海域常见且毒性非致命，但仍可能导致接触者皮肤严重不适。建议所有在该区域参与水上活动的游客及潜水员保持安全距离，避免徒手触摸。", "importance": "P1", "section_hint": "thailand", "location_detail": "普吉岛拉查岛 Koh Racha Yai", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 0.85, "tags": [], "time_sensitive": true, "expires_date": "2026-04-24", "event_id": "phuket_racha_jellyfish_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-09"}, {"id": "c2f5be9ca8c7", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "泰国头号毒贩潜逃韩国14年并“诈死”，终被遣返回国", "url": "https://thethaiger.com/news/national/thai-major-drug-suspect-arrested-in-south-korea-after-fake-death", "date": "2026-04-08T07:40:36+00:00", "desc_original": "One of Thailand's most wanted drug suspects was extradited from South Korea yesterday, April 7, after spending more than 14 years hiding overseas and attempting to fake his own death to avoid arrest . The suspect, 43 year old Thapanan, also known as Noo Chan, arrived at Suvarnabhumi International Airport yesterday after his arrest in South Korea .", "summary_cn": "泰国一名最受通缉的毒品嫌疑人于4月7日从韩国被遣返回国。该嫌疑人为43岁的 Thapanan（又名 Noo Chan），已在海外潜逃超过14年，期间曾试图通过“伪造死亡”来逃避法律制裁。嫌疑人在韩国被捕后，于周一抵达素万那普国际机场（Suvarnabhumi）。此案展示了泰国警方跨国追逃的决心。", "importance": "P2", "section_hint": "thailand", "location_detail": "素万那普国际机场 Suvarnabhumi Airport", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "thailand_drug_suspect_extradition_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-09", "title_cn": "泰国头号毒贩潜逃韩国14年并“诈死”，终被遣返回国"}, {"id": "f5b3a4703e89", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "美军飞机现身甲米机场（Krabi Airport）频繁起降引发当地民众疑虑", "url": "https://thethaiger.com/news/south/krabi-us-military-aircraft-airport-questions", "date": "2026-04-08T07:09:52+00:00", "desc_original": "Residents in Krabi have raised questions after multiple United States military aircraft were seen operating at Krabi International Airport yesterday, April 7, with frequent take-offs and landings reported throughout the day and night.", "summary_cn": "4月7日，多架美国军用飞机出现在甲米国际机场（Krabi International Airport），并在白天和深夜频繁起降。这一不同寻常的现象引起了当地居民的关注和广泛疑问，目前尚未有官方对这些军事飞行任务的性质给出明确说明。在泰南地区，此类美军密集动态较为罕见。", "importance": "P2", "section_hint": "thailand", "location_detail": "甲米国际机场 Krabi International Airport", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "krabi_us_military_aircraft_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-09", "title_cn": "美军飞机现身甲米机场（Krabi Airport）频繁起降引发当地民众疑虑"}, {"id": "7351f3e503d8", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "曼谷沙吞（Sathorn）人行道发生骚扰事件，两名外籍男子因见义勇为获称赞", "url": "https://thethaiger.com/news/bangkok/2-foreigners-praised-for-helping-bangkok-woman-from-harassment", "date": "2026-04-08T06:32:55+00:00", "desc_original": "Two foreign men were praised by Thai social media users after stepping in to help a woman from harassment on a footpath in Sathorn, Bangkok, yesterday, April 7.", "summary_cn": "4月7日，在曼谷沙吞区（Sathorn）的人行道上，一名女性遭到骚扰。两名恰好经过的外籍男子立即介入干预并提供帮助，成功化解危机。该善举在泰国社交媒体上获得广泛传播和点赞，在泰外籍人士的正面社会形象得到极大提升。", "importance": "P3", "section_hint": "bangkok", "location_detail": "沙吞 Sathorn", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "bangkok_sathorn_harassment_rescue_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-09", "title_cn": "曼谷沙吞（Sathorn）人行道发生骚扰事件，两名外籍男子因见义勇为获称赞"}, {"id": "15a54d1ac27a", "source": "Bangkok Post Property", "source_id": "bangkokpost_property", "lang": "en", "title": "由于油价危机冲击，KKP银行预测泰国房价将上涨10%", "url": "https://www.bangkokpost.com/property/3232823/kkp-sees-housing-prices-rising-10-amid-oil-crisis", "date": "2026-04-08T06:09:00+07:00", "desc_original": "Kiatnakin Phatra Financial Group (KKP) forecasts that a surge in global oil prices will push housing prices up by 10% this year, primarily affecting homebuyers in the mass-market segment.", "summary_cn": "丘细见银行（Kiatnakin Phatra，简称KKP）预测，全球石油价格的飙升将导致生产和运输成本大幅增加，进而推高泰国今年房价约10%。这一影响将主要集中在大众市场段位。对于计划在泰国置业的购房者来说，生活成本压力和购房门槛将同步抬升。", "importance": "P2", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#房产", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "thailand_property_price_hike_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-09", "title_cn": "由于油价危机冲击，KKP银行预测泰国房价将上涨10%"}, {"id": "fcc313b25e91", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "缅甸突破电诈团伙密林据点 抓获超百名中籍人员", "url": "https://www.thaiheadlines.com/186789/", "date": "2026-04-08T05:30:45+00:00", "desc_original": "据泰媒报道，4月7日13时左右，缅甸方面对一处网络诈骗及线上赌博的团伙基地展开清剿行动。该地点位于Ban Pang Ku村附近的密林区域，距离Tachileik市区及泰国清莱府Mae Sai边境约13公里。本次行动共抓获中国籍人员125人。", "summary_cn": "缅甸军方于4月7日在靠近泰国清莱府美塞（Mae Sai）边境约13公里的密林区域，成功捣毁一个大型电诈和网络赌博窝点。此次行动位于Ban Pang Ku村附近，现场共逮捕125名中国籍嫌疑人。此举显示了中缅泰边境联合打击跨境非法犯罪的持续高压态势。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "清莱府美塞 Mae Sai", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.6, "tags": [], "time_sensitive": false, "expires_date": "2026-05-09", "event_id": "tachileik_scam_raid_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-09", "title_cn": "缅甸突破电诈团伙密林据点 抓获超百名中籍人员"}, {"id": "39016d6a84c6", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰旅局 TAT 公布曼谷宋干节两大主活动场地", "url": "https://www.thaiheadlines.com/186786/", "date": "2026-04-08T05:24:53+00:00", "desc_original": "4月7日，泰国国家旅游局准备进一步强化宋干节“世界级节庆”的形象，将举办两项重点活动：2026宋干世界泼水节和2026宋干魅力艺术节。预计宋干节期间全国旅游总收入将超过303.5亿泰铢。", "title_cn": "泰旅局 TAT 公布曼谷 Bangkok 宋干节两大主活动场地", "summary_cn": "4月7日，泰国国家旅游局（TAT）宣布将举办“2026宋干世界泼水节”和“2026宋干魅力艺术节”两项重点活动，旨在强化宋干节全球性节庆地位。活动将聚焦曼谷区域。官方预计，2026年宋干节期间全泰旅游总收入有望突破303.5亿泰铢。此举展示了泰国政府推动节庆经济、吸引全球游客的决心。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 1.0, "tags": [], "status": "pending", "event_id": "bangkok_songkran_festival_2026", "time_sensitive": true, "expires_date": "2026-04-24", "added_date": "2026-04-09", "origin": "rss"}, {"id": "cfe759d618a0", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "曼谷掀起健身操热，3000人共舞挤爆广场", "url": "https://www.thaiheadlines.com/186776/", "date": "2026-04-08T04:01:16+00:00", "desc_original": "4月7日17点30分，泰国曼谷Lumphini公园休闲活动广场人气爆棚，舞蹈达人Dada带领健康爱好者一起跳操，点燃现场气氛。曼谷市长查察到场并表示希望将此类活动推广到更多地方。", "title_cn": "曼谷伦披尼公园 Lumphini 掀起健身操热，3000人共舞挤爆广场", "summary_cn": "4月7日傍晚，曼谷伦披尼公园（Lumphini Park）举办大型集体健身操活动，由知名舞蹈达人Dada领舞，吸引约3000名市民参与，场面壮观。曼谷市长查察（Chadchart Sittipunt）亲自到场支持，强调此类推广全民健康的社区活动极具价值，并计划将健康舞会推广至曼谷更多公共空间。", "importance": "P3", "section_hint": "bangkok", "location_detail": "伦披尼公园 Lumphini Park", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 0.85, "tags": [], "status": "pending", "event_id": "bangkok_lumphini_aerobics_2026", "time_sensitive": false, "expires_date": "2026-05-09", "added_date": "2026-04-09", "origin": "rss"}, {"id": "0307276a3835", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰军揭露边境电诈基地，手术室、牢房、赌场全都有", "url": "https://www.thaiheadlines.com/186758/", "date": "2026-04-08T03:14:06+00:00", "desc_original": "4月7日，泰柬联合新闻中心负责人带领媒体记者实地考察位于泰柬边境的电诈基地。该基地内部设施完善，包含诈骗办公区、处罚未达标人员的地下牢房，甚至还设有设备齐全的手术室和医院。", "title_cn": "泰军揭露泰柬边境电诈园区，内部惊现牢房与专业手术室", "summary_cn": "4月7日，泰柬联合新闻中心向媒体展示了位于泰柬边境的一处大型电诈基地。该基地规模宏大且职能分化明确，除了常规骨干办公区，还设有专门关押处罚低绩效员工的地下牢房。令人震惊的是，基地内竟建有配套齐全的地下医院和手术室。此次披露凸显了边境非法产业的组织化程度，也是泰方打击跨国电诈的重要行动。", "importance": "P1", "section_hint": "thailand", "location_detail": "泰柬边境", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.9, "tags": [], "status": "pending", "event_id": "thailand_cambodia_border_scam_base_raid_2026", "time_sensitive": false, "expires_date": "2026-05-09", "added_date": "2026-04-09", "origin": "rss"}, {"id": "2c22c044e712", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国总理换座驾、BYD登顶曼谷车展，中国新能源车在泰国的历史性崛起", "url": "https://www.thaiheadlines.com/186741/", "date": "2026-04-08T03:02:06+00:00", "desc_original": "泰国头条新闻社讯 2026年2月28日，美以联军对伊朗发动空袭，中东局势骤然恶化。国际原油期货价格随即突破每桶100美元，为三年多来首次，此后纽约与伦敦布伦特原油期货一度逼近每桶120美元，约30%的盘中涨幅创下近40年来纪录。 伊朗伊斯兰革命卫队放话，绝不允许一升石油在有利于美国及其盟友的情况下通过霍尔木兹海峡。联合国贸易和发展会议最新报告显示，自2月28日战争爆发以来，霍尔木兹海峡的船舶通航数量已骤降97%。 作为高度依赖进口原油的东南亚国家，泰国几乎在第一时间感受到了这场冲击。国际油价突破每桶110美元，仅3月一个月，泰国柴油价格就上涨约30%。油气价格大涨、企业运营成本增加、民众支出能力被显著压缩。 3月25日，泰国总理阿努廷乘坐深灰色中国新能源车BYD轻装出行，仅配备一名司机和两名随行人员，取消开道警车及车队，本人坐在副驾驶位，与往年乘坐劳斯莱斯车队的排场形成鲜明对比。 泰国官方于3月25日宣布汽油每公升加价6泰铢后，总理阿努廷翌日便一改常态，舍弃平时乘坐的劳斯莱斯，改为乘坐比亚迪前往国会大厦开会，并公开呼吁民众多尝试电动车，以减低燃料开支并实现零排放。 这不只是个人出行习惯的改变。阿努廷公开表示，电动车可显著降低通勤成本且实现零排放，呼吁民众转向新能源交通工具。 此前，他还曾在公开行程中乘坐极氪出行，以身作则的姿态引发广泛媒体关注，成为本轮能源危机下泰国政界最具标志性的", "title_cn": "受中东局势影响油价飙升，泰国总理阿努廷 Anutin 弃劳斯莱斯改乘比亚迪 BYD", "summary_cn": "2026年中东局势恶化导致国际油价飙升，泰国柴油价格单月上涨30%。面对能源危机，泰国总理阿努廷（Anutin Charnvirakul）带头改乘中国产比亚迪（BYD）和极氪（Zeekr）电动车，舍弃传统的豪华油车车队前往国会。阿努廷此举旨在通过亲身示范，呼吁民众在燃油成本畸高的背景下转型使用新能源汽车，从而降低生活支出并实现零排放目标，这也标志着中国新能源车在泰政商界的接纳度大幅提升。", "importance": "P2", "section_hint": "cn_thai", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#中泰", "relevance_score": 0.95, "tags": [], "status": "pending", "event_id": "thailand_pm_ev_byd_adoption_2026", "time_sensitive": false, "expires_date": "2026-05-09", "added_date": "2026-04-09", "origin": "rss"}, {"id": "257d62b7ab7a", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "Le Café Louis Vuitton launches its  new savoury offerings for summer", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3232868/le-café-louis-vuitton-launches-its-new-savoury-offerings-for-summer", "date": "2026-04-08T01:01:00+07:00", "desc_original": "Le Café Louis Vuitton at LV The Place Bangkok welcomes summer with the launch of its first savoury offerings, alongside a new seasonal dessert menu, available from April through June.", "title_cn": "曼谷路易威登咖啡馆 Le Café Louis Vuitton 推出夏季首款咸味美食与新品甜点", "summary_cn": "位于曼谷盖颂（Gaysorn Village）LV The Place 的路易威登咖啡馆（Le Café Louis Vuitton）迎来夏季新品。从4月至6月，该店首次推出咸味餐点系列，并同步上线季节性甜点菜单。作为泰国备受关注的时尚餐饮打卡点，此番菜单更新为游客及本地奢侈品垂直消费者提供了全新的下午茶体验，属于夏季限定活动。", "importance": "P3", "section_hint": "bangkok", "location_detail": "Gaysorn Village 盖颂广场", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "status": "pending", "event_id": "lv_cafe_bangkok_summer_menu_2026", "time_sensitive": true, "expires_date": "2026-04-24", "added_date": "2026-04-09", "origin": "rss"}, {"id": "030860e7ce53", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "泰剧《禁忌女孩 Girl From Nowhere》回归：Becky Armstrong 饰演新版 Nanno", "url": "https://www.bangkokpost.com/life/social-and-lifestyle/3232888/the-immortal-nanno", "date": "2026-04-08T01:01:00+07:00", "desc": "After becoming a national phenomenon, Girl From Nowhere returns in a bold new form with Girl From Nowhere: The Reset. This reimagined version introduces Rebecca Patricia Armstrong -- professionally known as Becky Armstrong -- as a new incarnation of \"Nanno\", the enigmatic student who moves from school to school, exposing uncomfortable truths beneath the surface of society.", "desc_original": "After becoming a national phenomenon, Girl From Nowhere returns in a bold new form with Girl From Nowhere: The Reset. This reimagined version introduces Rebecca Patricia Armstrong -- professionally known as Becky Armstrong -- as a new incarnation of \"Nanno\", the enigmatic student who moves from school to school, exposing uncomfortable truths beneath the surface of society.", "summary_cn": "泰剧《禁忌女孩 Girl From Nowhere》在引起全国轰动后，以全新形式《Girl From Nowhere: The Reset》重回大众视野。本季引入当红新星瑞贝卡·帕特里夏·阿姆斯特朗（Rebecca Patricia Armstrong，艺名 Becky Armstrong）饰演新一代“娜诺 Nanno”。该神秘女学生将继续游走于不同校园，揭露社会表象下残酷而不堪的真相。作为泰国流行文化的重要IP，此次翻拍与选角备受娱乐界关注。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "origin": "r iewpoints of international artists from different cultural backgrounds during \"Vision\", which is running at Art Jewel, 5th floor of Siam Paragon, Rama I Road, until April 28.", "summary_cn": "位于曼谷拉玛一路（Rama I Road）的暹罗百丽宫（Siam Paragon）商场5楼 Art Jewel 空间，正举办名为“Vision”的全球多元文化艺术展。此次展览汇集了来自不同文化背景的国际艺术家，展示了他们独特的世界观与艺术触角。展期截止至4月28日，是曼谷市中心繁华地带的高质量当代艺术展示，方便游客与当地居民近距离感受国际多元艺术脉络。", "importance": "P3", "section_hint": "bangkok", "location_detail": "Siam Paragon", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.8, "tags": [], "origin": "rss", "event_id": "bangkok_paragon_vision_art_2026", "status": "pending", "added_date": "2026-04-09", "time_sensitive": true, "expires_date": "2026-04-24", "title_cn": "曼谷暹罗百丽宫 Siam Paragon 举办“Vision”国际艺术多元展"}, {"id": "1ee0efa69e21", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "Synnex预测物价上涨将推动10%增长", "url": "https://www.bangkokpost.com/business/general/3232030/synnex-predicts-10-growth-as-prices-rise", "date": "2026-04-07T07:03:00+07:00", "desc": "Despite intensifying economic pressures and a cooling consumer market, SET-listed IT distributor Synnex (Thailand) is holding firm to its 10% growth target this year, aiming to reach 53 billion baht in annual revenue in a strategic pivot towards high-value technology, artificial intelligence (AI) infrastructure, and renewable energy solutions.", "desc_original": "Despite intensifying economic pressures and a cooling consumer market, SET-listed IT distributor Synnex (Thailand) is holding firm to its 10% growth target this year, aiming to reach 53 billion baht in annual revenue in a strategic pivot towards high-value technology, artificial intelligence (AI) infrastructure, and renewable energy solutions.", "title_cn": "泰国IT分销商 Synnex 预测2026年营收将增长10%", "summary_cn": "尽管面临经济压力加剧和消费市场降温的挑战，泰国证券交易所上市的IT分销商 Synnex (Thailand) 仍坚持今年10%的增长目标，力争年收入达到530亿泰铢。公司正进行战略转型，重点布局高价值技术、人工智能（AI）基础设施及可再生能源解决方案，以应对市场波动并获取新增长点。", "importance": "P2", "section_hint": estinations as it adds three new routes in China and Japan to capture strong demand.", "desc_original": "Malaysia Airlines is banking on Kuala Lumpur as an aviation hub, competing with Bangkok and Singapore in Southeast Asia by connecting the region to medium- and long-haul destinations as it adds three new routes in China and Japan to capture strong demand.", "title_cn": "马航强化吉隆坡枢纽地位，与曼谷及新加坡展开竞争", "summary_cn": "马来西亚航空正致力于将吉隆坡打造为核心航空枢纽，通过新增3条通往中国和日本的新航线来捕捉强劲需求。此举旨在与曼谷（Bangkok）和新加坡开展竞争，连接东南亚至中长途目的地。尽管这属于周边竞争，但反映了区域空中交通权争夺的加剧，可能影响赴泰游客的转机选择。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.5, "tags": [], "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "malaysia_airlines_hub_competition_2026", "status": "pending", "added_date": "2026-04-07", "origin": "rss"}, {"id": "986a2cd30c71", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Construction, property shift tactics", "url": "https://www.bangkokpost.com/property/3232020/construction-property-shift-tactics", "date": "2026-04-07T05:27:00+07:00", "desc": "The construction and property sectors are being forced to adjust strategies and build greater resilience to cope with volatile energy prices, as the Middle East conflict drives up both energy and construction material costs, according to Siam Commercial Bank Economic Intelligence Center (EIC).", "desc_original": "The construction and property sectors are being forced to adjust strategies and build greater resilience to cope with volatile energy prices, as the Middle East conflict drives up both energy and construction material costs, according to Siam Commercial Bank Economic Intelligence Center (EIC).", "title_cn": "受中东冲突影响：泰国建筑与地产行业被迫调整策略", "summary_cn": "据暹罗商业银行（SCB）经济情报中心（EIC）报告，中东冲突导致的能源价格大幅波动及建筑材料成本上涨，正迫使泰国建筑与房产开发领域调整策略。房产商在成本压力下需增强韧性以应对利润受损。对于购房者而言，这可能意味着未来新房交付价格或周期的不稳定。", "importance": "P2", "section_hint": "property", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#房产", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "thailand_property_construction_cost_shift_2026", "status": "pending", "added_date": "2026-04-07", "origin": "rss"}, {"id": "2d18e3a498fd", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "泰国政府拟通过基础设施基金融资 400 亿铢以缓解公共债务", "title_cn": "泰国政府拟通过基础设施基金融资 400 亿铢以缓解公共债务", "summary_cn": "泰国国有企业政策办公室（SEPO）主任透露，多家国有企业预计将通过基础设施基金募集总计 400 亿泰铢的资金。此举核心在于通过该金融工具筹集资金不被列为公共债务，从而有效减轻政府维护基建发展的债务压力，并为未来的大型项目投资提供更为灵活的资金来源。", "url": "https://www.bangkokpost.com/business/general/3232070/office-eyes-b40bn-via-infrastructure-funds", "date": "2026-04-07T05:16:00+07:00", "desc": "Several state-owned enterprises (SOEs) are expected to raise a combined 40 billion baht through infrastructure funds, helping to ease the government's public debt burden as such liabilities are not classified as public debt, says the chief of the State Enterprise Policy Office (Sepo).", "desc_original": "Several state-owned enterprises (SOEs) are expected to raise a combined 40 billion baht through infrastructure funds, helping to ease the government's public debt burden as such liabilities are not classified as public debt, says the chief of the State Enterprise Policy Office (Sepo).", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_infrastructure_fund_2026_04", "time_sensitive": false, "added_date": "2026-04-07", "expires_date": "2026-05-07"}, {"id": "17629f741f5a", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "人工智能 AI 进化催生复杂诈骗，泰国金融业面临“银行 5.0”监管挑战", "title_cn": "人工智能 AI 进化催生复杂诈骗，泰国金融业面临“银行 5.0”监管挑战", "summary_cn": "SAS 泰国公司指出，泰国金融部门正迈入“银行 5.0”时代，但随着人工智能 AI 的飞速发展，诈骗手段也变得愈发复杂。监管机构正被迫加强监督，推动各大银行强化实时风险管理及治理体系，以应对日益猖獗 ead in a room in the same building.", "summary_cn": "巴吞他尼府（Pathum Thani）空銮县（Khlong Luang）警方正在调查一起疑似“杀人后自杀”的案件。周日清晨，一名男子从当地一所知名私立大学附近的九层宿舍楼坠亡。随后，警方在同一栋楼的宿舍房间内发现了一名年轻女性的尸体。目前调查人员正在封锁现场并收集证据以核实确切死因及两人关系。", "importance": "P2", "section_hint": "thailand", "location_detail": "空銮县 Khlong Luang", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "pathum_thani_dorm_death_2026_04", "status": "pending", "added_date": "2026-04-07", "title_cn": "警方调查巴吞他尼府（Pathum Thani）某大学宿舍双人死亡案件"}, {"id": "c0a1894af402", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "风能控股（WEH）股权争端升级，面临跨国司法审查", "url": "https://www.bangkokpost.com/thailand/general/3231960/weh-dispute-turns-into-crossborder-legal-scrutiny", "date": "2026-04-07T01:01:00+07:00", "desc": "A long-running dispute involving an estimated US$900 million contested stake in Wind Energy Holding (WEH), Southeast Asia's largest wind power producer, is drawing heightened cross-border scrutiny following a move by a litigation fund to assume control of a 38% holding.", "desc_original": "A long-running dispute involving an estimated US$900 million contested stake in Wind Energy Holding (WEH), Southeast Asia's largest wind power producer, is drawing heightened cross-border scrutiny following a move by a litigation fund to assume control of a 38% holding.", "summary_cn": "东南亚最大的风力发电运营商风能控股（Wind Energy Holding, WEH）涉及一桩价值约9亿美元的股权旷日持久争端。随着一家诉讼基金采取行动试图接管38%的股份，该纠纷已引发加强版的跨国司法监管。此案涉及复杂的法律博弈，可能对泰国新能源产业的市场信心和公司治理结构产生深远影响。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.85, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "weh_legal_dispute_2026_04", "status": "pending", "added_date": "2026-04-07", "title_cn": "风能控股（WEH）股权争端升级，面临跨国司法审查"}, {"id": "3e081cfd2dee", "source": " 名嫌疑人落网，仍有一名在逃。此案因涉及政府部门车辆而备受关注。", "importance": "P1", "section_hint": "thailand", "location_detail": "陶公府 Narathiwat", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "thailand_mp_attack_investigation_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-07"}, {"id": "d0344ea39002", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国油价上涨带动火车出行，乘客增加40%", "url": "https://www.thaiheadlines.com/186679/", "date": "2026-04-06T08:23:35+00:00", "desc_original": "泰国头条新闻社讯 4月6日11点，泰国孔敬火车站不少民众陆续前来购买车票，从列车时刻表看，这些乘客的主要目的地是廊开和曼谷。近期受油价持续上涨影响，越来越多的民众转向选择火车出行...", "title_cn": "受高油价影响泰国孔敬（Khon Kaen）火车乘客激增40%，民众倾向低成本出行", "summary_cn": "由于泰国近期油价持续攀升，孔敬火车站（Khon Kaen Railway Station）出现客流高峰，乘客数量同比增加约40%。多数乘客选择搭乘火车前往廊开（Nong Khai）和曼谷（Bangkok）市以节省交通开支。这反映了高通胀背景下泰国基层民众消费习惯的转变，公共交通负担日益加重。", "importance": "P2", "section_hint": "thailand", "location_detail": "孔敬府 Khon Kaen", "city_tag": "#孔敬", "topic_tag": "#社会", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "thailand_energy_price_train_impact_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-07"}, {"id": "5d093b13515c", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "跨代传承维持成功：泰国研究家庭企业长青之道", "url": "https://www.bangkokpost.com/business/general/3231459/sustaining-success-across-generations", "date": "2026-04-06T07:11:00+07:00", "desc_original": "Family-owned businesses have long been the backbone of Thailand's economy, quietly powering growth, creating jobs and building wealth across generations. Yet beneath this strength lies a fragile reality, as most family enterprises struggle to survive beyond their founders.", "title_cn": "泰国经济支柱家庭企业的跨代传承：机遇与脆弱性并存", "summary_cn": "家庭企业长期以来一直是泰国经济的脊梁，在推动增长、创造就业和积累财富方面发挥着核心作用。然而在表面的繁荣下也隐藏着脆弱的现实，由于缺乏系统的传承规划，大多数家庭企业在创始人离任后往往难以维持经营。专家建议企业需建立更稳健的治理结构以确保长青。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.85, "tags": [], "origin": "rss", "event_id": "thailand_family_business_succession_2026", "status": "pending", "added_date": "2026-04-06", "time_sensitive": false, "expires_date": "2026-05-06"}, {"id": "b534ed5b20c1", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "BBL recommends Thai businesses mull expansion to India", "url": "https://www.bangkokpost.com/business/general/3231409/bbl-recommends-thai-businesses-mull-expansion-to-india", "date": "2026-04-06T06:02:00+07:00", "desc_original": "Bangkok Bank (BBL) is encouraging Thai businesses to expand into India to reduce their reliance on the US market amid rising geopolitical risk and escalating global trade tensions.", "title_cn": "盘谷银行 BBL 建议泰国企业转战印度市场以规避地缘政治风险", "summary_cn": "盘谷银行（Bangkok Bank, BBL）近日建议泰国企业积极考虑向印度市场扩张。在当前全球贸易紧张局势升级及地缘政治风险增加的背景下，此举旨在减少泰国对美国市场的依赖。印度庞大的人口红利和增长潜力被视为泰国企业分散市场风险、寻求新增长点的重要机遇。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "bbl_thai_business_india_expansion_2026", "status": "pending", "added_date": "2026-04-06", "time_sensitive": false, "expires_date": "2026-05-06"}, {"id": "e8013471ea19", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "Pet products remain on clear growth trajectory", "url": "https://www.bangkokpost.com/business/general/3231474/pet-products-remain-on-clear-growth-trajectory", "date": "2026-04-06T05:41:00+07:00", "desc_original": "The local pet industry is expected to remain resilient over the long term, as many owners treat their pets as family members. Over the past decade, the sector has recorded strong growth.", "title_cn": "“萌宠经济”持续升温：泰国宠物用品市场增长势头强劲", "summary_cn": "随着泰国家庭将宠物视为重要亲人的趋势日益明显，当地宠物产业正处于稳健的增长轨道上。过去十年间，该行业记录了强劲的增长数据。专家预测，由于宠物主人愿意在高质量饮食和护理上投入更多，未来该行业将继续保持韧性，甚至在经济波动中也能表现稳健。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.7, "tags": [], "origin": "rss", "event_id": "thailand_pet_industry_growth_2026", "status": "pending", "added_date": "2026-04-06", "time_sensitive": false, "expires_date": "2026-05-06"}, {"id": "d7ec32a723f6", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "北碧府（Kanchanaburi）警方查获36名藏匿非法劳工", "title_cn": "北碧府（Kanchanaburi）警方查获36名藏匿非法劳工", "summary_cn": "北碧府（Kanchanaburi）警方近日展开突击行动，逮捕了36名涉及非法入境事务的人员，其中包括一名涉嫌藏匿外籍非法劳工的本地男子。此次行动旨在打击边境地区的非法偷渡与劳工雇佣行为。目前涉案人员已被拘留，并将面临违反移民法及相关非法雇佣法律的指控。泰国执法部门近期加强了对边境省份的巡查力度。", "url": "https://www.bangkokpost.com/thailand/general/3231494/36-migrants-found-in-hiding", "date": "2026-04-06T05:22:00+07:00", "desc": "KANCHANABURI: Police arrested 36 individuals, including a local man, for harbouring undocumented foreign workers.", "desc_original": "KANCHANABURI: Police arrested 36 individuals, including a local man, for harbouring undocumented foreign workers.", "tags": [], "origin": "rss", "topic_tag": "#治安", "relevance_score": 1.0, "importance": "P1", "section_hint": "thailand", "location_detail": "北碧府 Kanchanaburi", "city_tag": "#北碧府", "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "thailand_kanchanaburi_illegal_migrants_2026_04", "status": "pending", "added_date": "2026-04-06"}, {"id": "e20b8af6d71c", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "普吉岛（Phuket）俄罗斯导游因非法执业及滥用目的泰签证（DTV）被捕", "title_cn": "普吉岛（Phuket）俄罗斯导游因非法执业及滥用目的泰签证（DTV）被捕", "summary_cn": "普吉岛（Phuket）旅游警察逮捕了一名俄罗斯籍男子，原因是该男子在持有目的泰签证（Destination Thailand Visa, DTV）期间，违规提供导游服务。根据泰国法律，导游职位仅限泰国公民，且DTV签证禁止从事此类获利性工作。此案突显了当局对滥用长期居住签证进行非法务工的严厉打击态度，提醒外籍人士务必遵守签证规定。", "url": "https://www.bangkokpost.com/thailand/general/3231490/russian-tour-guide-arrested", "date": "2026-04-06T05:18:00+07:00", "desc": "PHUKET: Tourist police arrested a Russian national for illegally offering tour services on a Destination Thailand Visa (DTV).", "desc_original": "PHUKET: Tourist police arrested a Russian national for illegally offering tour services on a Destination Thailand Visa (DTV).", "tags": [], "origin": "rss", "topic_tag": "#治安", "relevance_score": 0.95, "importance": "P1", "section_hint": "thailand", "location_detail": "普吉岛 Phuket", "city_tag": "#普吉岛", "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "phuket_russian_illegal_guide_dtv_2026_04", "status": "pending", "added_date": "2026-04-06"}, {"id": "daf16914ceef", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "曼谷拉差威提医院（Rajavithi）完成泰国首例机器人心脏手术", "title_cn": "曼谷拉差威提医院（Rajavithi）完成泰国首例机器人心脏手术", "summary_cn": "曼谷拉差威提医院（Rajavithi Hospital）成功完成了泰国首例机器人辅助心脏手术，这标志着泰国在微创心脏护理领域取得了重大突破。相比传统手术，机器人辅助手术具有切口更小、恢复更快、并发症风险更低的优势。此次医疗创举提升了泰国在东南亚地区的医疗技术地位，为需要复杂心脏介入治疗的患者提供了更先进的选择。", "url": "https://www.bangkokpost.com/thailand/general/3231339/rajavithi-completes-first-robotic-heart-operation", "date": "2026-04-06T05:02:00+07:00", "desc": "Rajavithi Hospital has completed the country's first robotic heart surgery, marking a major advance in minimally invasive cardiac care.", "desc_original": "Rajavithi Hospital has completed the country's first robotic heart surgery, marking a major advance in minimally invasive cardiac care.", "tags": [], "origin": "rss", "topic_tag": "#健康", "relevance_score": 0.9, "importance": "P2", "section_hint": "bangkok", "location_detail": "曼谷拉差威提路 Rajavithi Road", "city_tag": "#曼谷", "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "thailand_rajavithi_robotic_surgery_2026_04", "status": "pending", "added_date": "2026-04-06"}, {"id": "832d069defea", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "泰国北部雾霾严重 极力推动争议性的《清洁空气法案》", "title_cn": "泰国北部雾霾严重 极力推动争议性的《清洁空气法案》", "summary_cn": "泰国北部日益严重的雾霾问题，促使各界向政府施加更大压力，要求通过更强有力的法律手段来治理污染，核心焦点在于推进颇具争议的《清洁空气法案》（Clean Air Bill）。该法案旨在通过跨省协作和严厉处罚来减少焚烧产生的影响，但因涉及多个经济部门利益而进展缓慢。目前的空气污染危机使得法案通过的呼声再次达到顶峰。", "url": "https://www.bangkokpost.com/thailand/general/3231354/contested-clean-air-bill-still-worth-a-go", "date": "2026-04-06T04:52:00+07:00", "desc": "Severe haze in northern Thailand has intensified pressure on the government to adopt stronger legal tools, including advancing the contested Clean Air Bill.", "desc_original": "Severe haze in northern Thailand has intensified pressure on the government to adopt stronger legal tools, including advancing the contested Clean Air Bill.", "tags": [], "origin": "rss", "topic_tag": "#治安", "relevance_score": 1.0, "importance": "P2", "section_hint": "thailand", "location_detail": "泰北地区 Northern Thailand", "city_tag": "#泰国", "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "thailand_clean_air_bill_debate_2026_04", "status": "pending", "added_date": "2026-04-06"}, {"id": "971a6f2cad26", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "阿曼驻泰大使会见旅游警察，商讨中东局势下的游客安全", "url": "https://www.bangkokpost.com/thailand/general/3231204/oman-envoy-talks-mideast-woes-with-tourist-police", "date": "2026-04-06T04:48:00+07:00", "desc_original": "Tourist Police and the Omani Embassy have held talks aimed at strengthening tourist safety, deepening bilateral cooperation and addressing the impact of Middle East tensions on travel confidence and regional transport.", "summary_cn": "泰国旅游警察局与阿曼 (Oman) 驻泰大使馆进行正式会谈。双方旨在加强游客安全保障，深化双边合作，并共同应对近期中东局势紧张对旅游信心及地区交通运输带来的影响。此次合作反映出泰方对中东客群安全的高度重视，通过外交协同提升在泰游客的服务环境。", "importance": "P1", "section_hint": "thailand", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_oman_tourist_safety_2026", "time_sensitive": false, "added_date": "2026-04-06", "expires_date": "2026-05-06", "title_cn": "阿曼驻泰大使会见旅游警察，商讨中东局势下的游客安全"}, {"id": "6a6c88ac9fea", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "素叻他尼 Surat Thani 一油库被举报囤积燃油遭立案", "url": "https://www.bangkokpost.com/thailand/general/3231214/oil-depot-reported-for-hoarding", "date": "2026-04-06T04:04:00+07:00", "desc_original": "SURAT THANI: The provincial commerce office has filed a police complaint against an oil depot operator for allegedly hoarding controlled fuel, as authorities ramp up the crackdown on fuel stockpiling and smuggling in the South and along border areas.", "summary_cn": "在素叻他尼府 (Surat Thani)，当地商务厅正式对一油库运营商提起法律诉讼，指控其涉嫌非法囤积受管制燃料。泰国政府目前正严厉打击南部及边境地区的燃油非法储备和走私行为，以维护国内能源价格稳定和贸易秩序。此举是落实能源局和治安部门联合执法行动的一部分。", "importance": "P3", "section_hint": "thailand", "location_detail": "素叻他尼府", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "origin": "rss", "status": "pending", "event_id": "surat_thani_fuel_hoarding_bust_2026", "time_sensitive": false, "added_date": "2026-04-06", "expires_date": "2026-05-06", "title_cn": "素叻他尼 Surat Thani 一油库被举报囤积燃油遭立案"}, {"id": "d8070eac427a", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "中国男留学生在泰坠楼身亡，宿舍内惊现女尸和满墙血字", "url": "https://www.thaiheadlines.com/186656/", "date": "2026-04-06T03:32:40+00:00", "desc_original": "泰国头条新闻社讯 4月5日凌晨2点30分左右，泰国巴吞他尼府Khlong Luang警察局接报称，Khlong Nueng镇一巷子内有人坠楼。Khlong Luang警察局立即组织调查人员，并协调Thammasat Chalermprakiat医院医生和义德善堂志愿者赶往现场。 经排查，一栋9层高的学生宿舍楼东侧躺着一具男性尸体，死者穿着米色短裤、无上衣、戴眼镜，呈仰卧姿势，脸部有伤痕，双侧手腕有锐器割痕，右上臂下方有黑色刺青，为罗马数字图案。由于现场排查期间无亲友出面指认，调查人员暂无法确定死者从哪一层坠落。 一名住在该宿舍的住户透露，他自己住在9楼南边最后一间房。凌晨1点多他正在房内睡觉时，有人来敲门，但透过猫眼却没看到人。后来他打开门发现，一名男子坐在门口，脸上都是血，把他吓了一大跳，于是他赶紧关门并打电话给宿舍保安，请他们上来看看到底发生了什么事，之后他自己也赶紧下楼。 据其回忆，当时那名男子站在他房间外面南侧的通风窗边，他跑下楼没多久就看到很多人围在楼下看热闹，这才发现是刚才敲他房门的那名男子坠楼了。不过，he以前从没见过那名男子，不知道这个人具体住在哪一楼。 随后，调查人员进入宿舍大楼检查，大部分住户仍在熟睡。8楼最北边的房间门口地板上有少量血迹，但敲门没人应答，只能等早上请宿舍管理员调取监控录像进一步查看。调查人员在现场拍照存证、询问证人，同时请义德善堂志愿者先将尸体送", "title_cn": "巴吞他尼府 Pathum Thani 发生中国留学生坠楼命案，现场案情离奇", "summary_cn": "4月5日凌晨，一名中国籍男留学生在巴吞他尼府（Pathum Thani）空銮县（Khlong Luang）一栋9层学生宿舍坠楼身亡。死者被发现时半裸且手腕有割痕。警方调查中发现，死者坠楼前曾满脸鲜血敲击9楼住户房门，随后在8楼某房间走廊发现血迹。最新调查显示案情极度复杂，社交媒体流传房间内有女尸和血字。目前警方正在调取监控录像并等待法医尸检，以确定确切死因及是否存在他杀嫌疑。", "importance": "P2", "section_hint": "thailand", "location_detail": "巴吞他尼府 Pathum Thani 空銮县 Khlong Luang", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "thailand_student_murder_fall_pathumthani_2026", "status": "pending", "added_date": "2026-04-07", "origin": "rss"}, {"id": "22f56999f43d", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰总理出席老挝新年活动，进一步巩固泰老关系", "url": "https://www.thaiheadlines.com/186653/", "date": "2026-04-06T02:47:23+00:00", "desc_original": "泰国头条新闻社讯 4月5日17点，泰国总理兼内政部部长阿努廷前往老挝驻泰国大使馆，出席2026年老挝宋干节新年活动。老挝副总理兼外交部部长通沙万及夫人瓦达沙纳、老挝驻泰国大使西萨瓦在场热情接待。阿努廷向西萨瓦赠送花瓶表达祝贺，并一起参与拴线祈福仪式（Baci）。这是老挝重要的传统仪式之一，通过诵经、涂抹圣水和系祝福线，祈求吉祥。 随后，阿努廷夫妇到使馆前草坪参加老挝新年宴会。西萨瓦首先致欢迎词，通沙万接着致贺词，重申两国之间的紧密关系。阿努廷与大家一同用餐，并观赏了8个展现老挝独特魅力的文化表演，包括祝福舞、民间歌舞和老挝歌曲，现场气氛友好温馨，各政府与民间部门代表、各国使节及泰老合作相关人员共同到场庆贺。 在宴会期间，阿努廷还和现场来宾一起跳起老挝新年圈舞，亲近感倍增。到宴会尾声，通沙万向表演者献花，并邀请阿努廷上台与众贵宾合影留念。据悉，本次拴线祈福仪式和老挝新年宴会共有约500人参与，充分体现出泰国和老挝在文化、社会及经济等各方面的友好关系。 （编译：KA；来源：thaipost）", "title_cn": "泰总理阿努廷出席老挝宋干节庆祝活动，深化泰老外交关系", "summary_cn": "泰国总理阿努廷（Anutin Charnvirakul）于4月5日前往老挝驻泰国大使馆，出席2026年老挝宋干节庆祝活动。阿努廷参与了老挝传统的“拴线祈福”（Baci）仪式，并与老挝副总理兼外长通沙万举行友好会面。双方重申了泰老两国在文化、社会及经济领域的紧密联系。此次活动约有500名外交使节和政府代表参加，展现了泰老之间深厚的情谊及在地缘政治中的紧密合作。", "importance": "P3", "section_hint": "thailand", "location_detail": "老挝驻泰大使馆 Embassy of Laos", "city_tag": "#曼谷", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-07", "event_id": "thailand_laos_songkran_diplomacy_2026", "status": "pending", "added_date": "2026-04-07", "origin": "rss"}, {"id": "c02324998fbf", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "韩国超市 No Brand 进驻曼谷邦纳中央广场 Central Bangna", "url": "https://www.bangkokpost. rew hot cooking oil at her in a shopping mall in Mueang district, Krabi.", "summary_cn": "4月4日，甲米府 Mueang 县的一家购物中心内发生恶劣伤人事件。一名饮料摊贩在工作时，遭到另一名工人的蓄意袭击，对方将滚烫的食用油泼向受害者，导致其严重烫伤。当地警方已介入调查。此类公共场所的职场暴力事件引起了泰国社会的广泛关注，凸显了治安管理中的突发性风险。", "importance": "P2", "section_hint": "thailand", "location_detail": "Mueang district, Krabi", "city_tag": "#甲米", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "krabi_mall_oil_attack_2026", "status": "pending", "time_sensitive": false, "added_date": "2026-04-06", "expires_date": "2026-05-06"}, {"id": "957081ced7b4", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "柬埔寨劳工在春武里是拉差（Sri Racha）工厂修补屋顶时坠亡", "url": "https://thethaiger.com/news/pattaya/cambodian-worker-dies-fixing-roof-at-sri-racha-factory", "date": "2026-04-05T08:30:38+00:00", "desc_original": "Cambodian worker dies fixing roof at Sri Racha factory Legacy A 38 year old Cambodian man died after falling from a roof he was repairing at a wooden furniture factory in Sri Racha district, Chon Buri.", "summary_cn": "一名38岁的柬埔寨籍男性劳工在春武里府（Chon Buri）是拉差县（Sri Racha）的一家木制家具厂工作时发生意外。据悉，该男子当时正在维修厂房顶棚，不慎从高处坠落，伤势严重不幸身亡。此类生产安全事故再次引发对工厂外籍劳工工作环境及防坠落安全措施的关注。", "importance": "P3", "section_hint": "thailand", "location_detail": "是拉差县 Sri Racha", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "sri_racha_factory_accident_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-06", "title_cn": "柬埔寨劳工在春武里是拉差（Sri Racha）工厂修补屋顶时坠亡"}, {"id": "15c725e324d2", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "22轮重型卡车清真寺冲向车流，于北柳府（Chachoengsao）造成16人受伤", "url": "https://thethaiger.com/news/central-thailand/trailer-truck-ploughs-into-traffic-injures-16-chachoengsao", "date": "2026-04-05T08:28:42+00:00", "desc_original": "Trailer truck ploughs into traffic, injures 16 in Chachoengsao Legacy A 22-wheel trailer truck crashed into several even claimed to be officers from the Office of the Narcotics Control Board (ONCB) as they raided the property. They left with a green Yamaha Forza motorcycle bearing a Chon Buri registration plate numbered 5 กค 4177. The victims, 30 year old tattoo arti", "summary_cn": "4月4日晚，7名歹徒冒充泰国毒品管制局（ONCB）官员，闯入芭提雅（Pattaya）农普（Nong Prue）地区的一处民宅。劫匪持枪和刀威胁受害人，并抢走了一辆绿色雅马哈（Yamaha Forza）摩托车（车牌号 5 กค 4177）。受害人为一名纹身师。目前警方正根据视频监控追踪这群冒充执法人员的嫌疑人，提醒当地居民提高警惕。", "importance": "P1", "section_hint": "pattaya", "location_detail": "农普区 Nong Prue", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "pattaya_fake_police_robbery_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-06", "title_cn": "芭提雅（Pattaya）劫匪冒充禁毒官员劫持摩托车"}, {"id": "7589ee260069", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "达叻府（Trat）农场工人遭发情期野象踩踏身亡", "url": "https://thethaiger.com/news/eastern-thailand/trat-farm-worker-killed-by-wild-elephant-in-musth", "date": "2026-04-05T06:36:41+00:00", "desc_original": "Trat farm worker killed by wild elephant in musth Legacy A 63 year old Mon farm worker was trampled by a wild elephant in Trat today, April 5, after trying to chase it away . Officials said a strong musth scent was detected at the scene. The incident happened in Bo Phloi subdistrict, Bo Rai district. Rescue workers and local officials went to the scene, where the body was found in a forested area inside Khlong Kaeo Waterfall National Park. Officials quickly removed the body from the forest. The body was later taken to Bo Rai Hospital for relatives to collect for religious rites. The victim’s s", "summary_cn": "4月5日，在达叻府（Trat）波莱县（Bo Rai）发生一起野象伤人致命事件。一名63岁的孟族农场工人在试图驱赶进入农场的野象时，遭到野象攻击并被踩踏身亡。事发地点位于 Khlong Kaeo Waterfall 国家公园附近的森林地带。调查人员表示，现场能闻到浓烈的象油味，判断该野象正处于暴躁的发情期（musth）。当地政府提醒农民在野象出没区域务必小心。", "importance": "P2", "section_hint": "thailand", "location_detail": "波莱县 Bo Rai", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "trat_wild_elephant_attack_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-06", "title_cn": "达叻府（Trat）农场工人遭发情期野象踩踏身亡"}, {"id": "6d1bd600ecd8", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Former deputy PM Parnpree set to return as foreign adviser", "url": "https://www.bangkokpost.com/thailand/general/3230748/former-deputy-pm-parnpree-set-to-return-as-foreign-adviser", "date": "2026-04-05T06:23:00+07:00", "desc": "Former deputy prime minister and foreign minister Parnpree Bahiddha-Nukara is set to return to the Foreign Affairs Ministry as chief adviser to the minister, says a ministry source.", "desc_original": "Former deputy prime minister and foreign minister Parnpree Bahiddha-Nukara is set to return to the Foreign Affairs Ministry as chief adviser to the minister, says a ministry source.", "title_cn": "前副总理班比（Parnpree）将重返外交部担任首席顾问", "summary_cn": "据泰国外交部消息灵通人士透露，前副总理兼外交部长班比（Parnpree Bahiddha-Nukara）即将重返外交部，出任现任外交部长的首席顾问。作为泰国资深外交官，班比在去年曾突然辞职引起政坛关注，此次回归被视为政府在应对复杂国际局势及边境问题上，急需利用其丰富的经验与外交资源进行战略布局。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_parnpree_return_adviser_2026", "added_date": "2026-04-05", "time_sensitive": false, "expires_date": "2026-05-05"}, {"id": "8919804c35af", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Influencers, online ads trigger e-vaping rise, worrying parents", "url": "https://www.bangkokpost.com/thailand/general/3230873/influencers-online-ads-trigger-evaping-rise-worrying-parents", "date": "2026-04-05T06:02:00+07:00", "desc": "Growing concern is mounting over influencers driving youth vaping, with many parents struggling to respond.", "desc_original": "Growing concern is mounting over influencers driving youth vaping, with many parents struggling to respond.", "title_cn": "网红营销致泰国青少年吸电子烟成风，引发家长群体普遍担忧", "summary_cn": "随着社交媒体网红营销及在线广告的泛滥，泰国青少年群体中通过非正常途径吸食电子烟的比例显著上升。尽管泰国法律严格禁止电子烟销售，但网络宣传让许多未成年人对此产生兴趣。众多家长反映难以应对这种隐蔽的线上渗透。该社会问题已引发公共卫生部门关注，呼吁加强对网络软性广告的监管。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#健康", "relevance_score": 0.85, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_vaping_influencer_concern_2026", "added_date": "2026-04-05", "time_sensitive": false, "expires_date": "2026-05-05"}, {"id": "02d52e43d3d1", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "New govt off to a bumpy start", "url": "https://www.bangkokpost.com/thailand/special-reports/3230903/new-govt-off-to-a-bumpy-start", "date": "2026-04-05T05:17:00+07:00", "desc": "There will be no honeymoon period for the incoming administration of Prime Minister Anutin Charnvirakul, with academics warning the government has only a narrow window to prove it can manage a deepening energy and cost-of-living crisis -- or risk a steep fall in public support.", "desc_original": "There will be no honeymoon period for the incoming administration of Prime Minister Anutin Charnvirakul, with academics warning the government has only a narrow window to prove it can manage a deepening energy and cost-of-living crisis -- or risk a steep fall in public support.", "title_cn": "阿努廷（Anutin Charnvirakul）新政府上任伊始面临重重挑战", "summary_cn": "新任总理阿努廷（Anutin Charnvirakul）领导的政府将没有“蜜月期”。学者警告说，该届政府证明其管理日益严重的能源和生活成本危机能力的窗口期非常窄，否则将面临公众支持率的大幅下跌。在经济压力巨大的背景下，新政府能否迅速出台有效政策解决民生问题成为政界关注焦点。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "origin": "rss", "status": "pending", "event_id": "thailand_new_govt_challenges_2026", "time_sensitive": false, "expires_date": "2026-05-05", "added_date": "2026-04-05"}, {"id": "5a6fbc3f756e", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "阿努廷（Anutin）内阁遭NIDA民调质疑：经济部长信任度低迷", "url": "https://www.thaiheadlines.com/186620/", "date": "2026-04-05T04:46:46+00:00", "desc_original": "泰国头条新闻社讯 4月5日，泰国国家发展管理学院民调中心NIDA Poll发布主题为“专业部长能否掌控局势？”的最新民调结果。调查结果显示，在政府引入外部专业人士担任内阁部长应对经济与能源危机的背景下，多数民众对其能力缺乏信心。 调查显示，针对内阁三名副总理兼部长（外部专业人士），受访者整体呈现不信任倾向： 副总理兼外交部长西哈萨 · 不信任：30.23% · 不太信任：29.54% · 较为信任：22.82% · 非常信任：16.03% · 不回答/不知道：1.38% 副总理兼商业部长素帕琪 · 不信任：33.89% · 不太信任：28.70% · 较为信任：21.91% · 非常信任：14.35% · 不回答/不知道：1.15% 副总理兼财政部长艾尼迪 · 不信任：40.38% · 不太信任：37.10% · 较为信任：14.12% · 非常信任：7.10% · 不回答/不知道：1.30% 其中，副总理兼财政部长的不信任比例最高，显示民众对其应对经济问题的信心相对较弱。 针对总理兼内政部长阿努廷在应对经济与能源危机方面所作出的努力，超半数受访者表示“不同情”“不太同情”，整体负面评价高于正面。 分析指出，尽管政府尝试引入具备专业背景的官员以增强治理能力，但在当前经济与能源压力持续的情况下，公众信任仍未明显提升，政策成效与社会沟通仍面临考验。 （编译：jinda；审校：wan；来", "summary_cn": "泰国NIDA Poll最新民调显示，民众对阿努廷（Anutin）领导下的现内阁信心不足。尽管政府引入专业人士出任外交、商业及财政部副总理，但约三至四成民众表示“不信任”。其中，财政部长艾尼迪（Ekniti）的不信任率甚至超过40%，反映出社会对解决当前经济与能源危机的深度焦虑。民调显示，在物价持续波动的背景下，新内阁的政策成效尚未获得大众认可。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "thailand_nida_poll_cabinet_trust_2026_04", "status": "pending", "added_date": "2026-04-06", "origin": "rss", "title_cn": "阿努廷（Anutin）内阁遭NIDA民调质疑：经济部长信任度低迷"}, {"id": "d0491571961d", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "宋卡府（Songkhla）警方查获10万升走私柴油，涉跨国运输公司", "url": "https://thethaiger.com/news/south/songkhla-probe-100000-litres-of-diesel-found", "date": "2026-04-05T04:28:13+00:00", "desc_original": "Songkhla orders probe after 100,000 litres of diesel found Legacy Officials in Songkhla found 100,000 litres of diesel stored at a company’s international truck yard in Sadao district yesterday, April 4, after no documents were produced to back earlier claims that the site had a valid fuel storage permit . The case emerged after social media posts alleged that a Malaysian transport operator with a trailer yard for cross-border runs between Thailand and Malaysia had stockpiled a large amount of fuel. Officials in the area inspected the site and alerted administrative officials and police, whose", "summary_cn": "4月4日，泰国宋卡府（Songkhla）警方在沙道县（Sadao）的一家国际货运车场查获了10万升秘密储存的柴油。涉事公司为一家经营泰马跨境运输的马来西亚运营商。由于现场负责人无法提供有效的燃料储存许可证，警方已介入核查。此案源于社交媒体举报，怀疑该车场非法囤积燃料以逃避关税或进行跨境走私。目前相关部门正在对此大规模非法囤油案展开深度调查。", "importance": "P2", "section_hint": "thailand", "location_detail": "宋卡府沙道县", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-06", "event_id": "songkhla_diesel_smuggling_probe_2026_04", "status": "pending", "added_date": "2026-04-06", "origin": "rss", "title_cn": "宋卡府（Songkhla）警方查获10万升走私柴油，涉跨国运输公司"}, {"id": "bc99c2a97f7c", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Bottled drinking water placed on price-control list", "url": "https://www.bangkokpost.com/thailand/general/3230649/bottled-drinking-water-placed-on-pricecontrol-list", "date": "2026-04-04T18:57:00+07:00", "desc": "The government has added bottled drinking water and seasoning sauces to its price-control list, along with plastic pellets, in order to prevent undue price increases in light of cost pressures arising from the Middle East war.", "desc_original": "The government has added bottled drinking water and seasoning sauces to its price-control list, along with plastic pellets, in order to prevent undue price increases in light of cost pressures arising from the Middle East war.", "title_cn": "泰国政府将瓶装饮用水列入价格管控清单", "summary_cn": "为应对中东战争引发的成本压力并防止物价无理上涨，泰国政府已正式将瓶装饮用水、调味酱以及塑料颗粒列入价格管控清单。通过此举，政府相关部门将能够更有效地监测并限制此类生活必需品的最高售价，以减轻民众在当前全球动荡局势下的生活负担。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.9, "tags": [], "origin": "rss", "s lp ease the economic burden from soaring energy costs.", "tags": [], "origin": "rss", "topic_tag": "#时政", "relevance_score": 1, "added_date": "2026-04-05", "desc_original": "Democrat Party deputy leader Korn Chatikavanij has urge the government to investigate refinery profits rather than asking operators to donate excess earnings to help ease the economic burden from soaring energy costs.", "title_cn": "民主党副党首功·察迪甲瓦尼（Korn Chatikavanij）呼吁政府调查炼油利润，而非请求捐款", "summary_cn": "泰国民主党（Democrat Party）副党首功·察迪甲瓦尼（Korn Chatikavanij）敦促政府应着手调查国内炼油企业的盈利状况，而非仅仅请求运营商捐出多余收益。他指出，在能源价格飙升导致经济负担加重的背景下，政府应通过制度化手段核查炼油利润是否合理，以从根本上缓解民生压力，确保能源市场的公平与透明。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "time_sensitive": false, "expires_date": "2026-05-05", "event_id": "thailand_energy_refinery_probe_2026", "status": "pending"}, {"id": "ad88774ceda9", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "Molam, the heartbeat of Isan migrants", "url": "https://www.bangkokpost.com/life/arts-and-entertainment/3230570/molam-the-heartbeat-of-isan-migrants", "date": "2026-04-04T12:33:00+07:00", "desc": "Molam, a centuries-old musical tradition from northeastern Thailand (Isan) and the surrounding region, is finding firmer footing in Bangkok, where people who call Isan home make up the city’s largest migrant community.", "tags": [], "origin": "rss", "topic_tag": "#旅居", "relevance_score": 0.9, "added_date": "2026-04-05", "desc_original": "Molam, a centuries-old musical tradition from northeastern Thailand (Isan) and the surrounding region, is finding firmer footing in Bangkok, where people who call Isan home make up the city’s largest migrant community.", "title_cn": "莫兰歌舞（Molam）：曼谷伊森（Isan）移民的精神寄托", "summary_cn": "源自泰国东北部（Isan，伊森地区）的传统艺术“莫兰歌舞”（Molam）拥有数百年历史。随着大量东北部民众涌入曼谷寻找工作，作为该市最大的移居社区群体，他们也将这种充满乡土气息的音乐带入了首都。如今，莫兰不仅在曼谷站稳了脚跟，更成为了当地伊森打工人情感联结、缓解思乡情结的重要文化载体。", "importance": "P3", "section_hint": "bangkok", "location_detail": "曼谷", "city_t i home Legacy Police in Udon Thani arrested a man in Chiang Yuen subdistrict yesterday, April 2, after a Facebook post led police to his home , where officers found him cooking dog meat .", "summary_cn": "4月2日，泰国乌隆府（Udon Thani）警方在清渊区（Chiang Yuen）逮捕了一名男子。此前，社交媒体Facebook上流传的一段视频引起了警方的注意。警员抵达其住所时，发现该男子正在烹制狗肉。由于泰国法律严格禁止虐待动物及食用特定宠物肉类，该男子的行为已触犯相关法律。此案再次引发了公众对动物保护及民俗行为边界的讨论。", "importance": "P3", "section_hint": "thailand", "location_detail": "Chiang Yuen", "city_tag": "#乌隆府", "topic_tag": "#社会", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "udon_thani_dog_meat_arrest_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "男子在乌隆府（Udon Thani）家中烹食狗肉被捕"}, {"id": "55dc17bdf542", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "曼谷（Bangkok）女演员遭性侵案嫌犯落网，警方已申请羁押", "url": "https://www.thaiheadlines.com/186561/", "date": "2026-04-03T05:34:53+00:00", "desc": "泰国头条新闻社讯 4月3日上午，曼谷Khlong Tan警局警员将涉嫌性侵女演员的34岁男子尼功押送至曼谷南部刑事法院申请首次羁押。", "desc_original": "泰国头条新闻社讯 4月3日上午，曼谷Khlong Tan警局警员将涉嫌性侵女演员的34岁男子尼功押送至曼谷南部刑事法院申请首次羁押。", "summary_cn": "4月3日上午，曼谷（Bangkok）空坦警局（Khlong Tan）将一名34岁嫌疑男子尼功押送至法院。该男子涉嫌对一名泰国女演员实施性侵。目前案件已进入司法程序，警方正式向曼谷南部刑事法院申请对其进行首次羁押以便进一步审理。该案件因涉及演艺界人士受到泰国社会广泛关注，警方强调将严格按照法律程序办案。", "importance": "P2", "section_hint": "bangkok", "location_detail": "Khlong Tan", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "bangkok_actress_assault_case_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "曼谷（Bangkok）女演员遭性侵案嫌犯落网，警方已申请羁押"}, {"id": "3cc5cfc54aab", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国女Rapper MILLI在韩国《Show Me The Money》夺冠第四创历史", "url": "https://www.thaiheadlines.com/186557/", "date": "2026-04-03T05:01:27+00:00", "desc": "泰国头条新闻社讯 近日，韩国人气说唱竞演节目Show Me The Money Season 12圆满落幕。泰国女Rapper MILLI成功闯入总决赛，成为节目史上首位晋级决赛的外国选手。", "desc_original": "泰国头条新闻社讯 近日，韩国人气说唱竞演节目Show Me The Money Season 12圆满落幕。泰国女Rapper MILLI成功闯入总决赛，成为节目史上首位晋级决赛的外国选手。", "summary_cn": "泰国知名女性说唱歌手MILLI在韩国著名说唱竞演节目《Show Me The Money》第12季中表现卓绝，不仅成功闯入总决赛，最终更夺得第四名的佳绩。她不仅是该节目历史上首位进入总决赛的外国选手，这一成就也标志着泰国音乐人在国际舞台上的新突破，在泰国本土及韩国乐坛引发热议。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.8, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "thai_rapper_milli_korea_success_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "泰国女Rapper MILLI在韩国《Show Me The Money》夺冠第四创历史"}, {"id": "9b05254eb3ff", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "呵叻府（Nakhon Ratchasima）狗血情杀：女子雇人杀前任后自尽", "url": "https://thethaiger.com/news/national/thai-woman-arranges-murder-of-ex-on-m6-motorway-before-suicide", "date": "2026-04-03T04:46:28+00:00", "desc": "Thai woman hires friend to kill her ex-boyfriend before taking her life Legacy A Thai woman and her friend, who was in unrequited love with her, allegedly arranged the murder of her ex-boyfriend on the M6 motorway in Nakhon Ratchasima.", "desc_original": "Thai woman hires friend to kill her ex-boyfriend before taking her life Legacy A Thai woman and her friend, who was in unrequited love with her, allegedly arranged the murder of her ex-boyfriend on the M6 motorway in Nakhon Ratchasima.", "summary_cn": "在呵叻府（Nakhon Ratchasima）的M6高速公路上发生一起恶性命案。一名泰国女子因情感纠葛，教唆一名长期暗恋她的男性友人合谋刺杀了她的前男友。作案后，该女子选择了自杀身亡。目前警方调查显示，这是一起由嫉妒和单相思引发的悲剧，该名男性共犯已被警方锁定。由于涉及高速公路暴力犯罪，此案引发社会对安全及心理健康的关注。", "importance": "P2", "section_hint": "thailand", "location_detail": "M6 Motorway, Nakhon Ratchasima", "city_tag": "#呵叻府", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "nakhon_ratchasima_m6_murder_suicide_2026", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "呵叻府（Nakhon Ratchasima）狗血情杀：女子雇人杀前任后自尽"}, {"id": "0cc810fe8d00", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "佛统府（Nakhon Pathom）警方捣毁乞讨团伙，解救三名幼童", "url": "https://thethaiger.com/news/national/three-boys-rescued-from-child-begging-ring-in-nakhon-pathom", "date": "2026-04-03T04:10:33+00:00", "desc_original": "Three boys rescued from child begging ring in Nakhon Pathom Legacy A husband and wife were arrested in Nakhon Pathom yesterday, April 2, after police uncovered an alleged child begging gang operation and rescued three boys from years of exploitation. The two suspects, 36 year old Artorn and 32 year old Pimwimon, were arrested in Takong subdistrict, Mueang district, Nakhon Pathom, under Criminal Court warrants dated March 11. They were accused of human trafficking for forced begging, along with ", "summary_cn": "2026年4月2日，泰国佛统府（Nakhon Pathom）警方在塔孔（Takong）亚区成功捣毁一个强迫儿童乞讨的犯罪团伙，并解救了三名被长期剥削的男孩。一对分别为36岁和32岁的夫妇被逮捕。据警方调查，该团伙涉嫌人口贩卖，通过威胁和胁迫手段非法剥削儿童。此案揭示了在泰外籍及本土脆弱群体面临的强制劳动风险，警方呼吁民众关注街头异常乞讨行为。", "importance": "P2", "section_hint": "thailand", "location_detail": "Takong, Mueang, Nakhon Pathom", "city_tag": "#佛统", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "thailand_child_begging_rescue_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "佛统府（Nakhon Pathom）警方捣毁乞讨团伙，解救三名幼童"}, {"id": "fd799d61b372", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "芭提雅（Pattaya）发生流浪汉投石袭击事件，两名酒吧老板受伤", "url": "https://thethaiger.com/hot-news/crime/homeless-man-held-after-stone-attack-on-bar-owners-in-pattaya", "date": "2026-04-03T03:22:16+00:00", "desc_original": "Homeless man held after stone attack on bar owners in Pattaya Legacy Two beer bar owners were injured after a homeless man threw stones at their motorbike in Pattaya yesterday, April 2, while they were riding home on Khao Phra Tamnak Road in Nong Prue, Bang Lamung district, Chon Buri. Police from Pattaya City Police Station said they were called to the scene, where rescue volunteers from Sawang Boriboon Thammasathan Pattaya were also sent to assist. Police found two injured beer bar owners at ", "summary_cn": "2026年4月2日，在芭提雅（Pattaya）考帕塔纳克路（Khao Phra Tamnak Road），两名酒吧经营者在骑摩托车回家途中遭到一名流浪汉投石袭击。49岁的普里迪（Preedee）脸部受伤并有瘀青，另一人也受轻伤。当地警方及救援志愿者迅速到场处理。目前该名流浪汉已被警方控制。此类偶发治安事件提醒在泰夜归人员，尤其是摩旅者，需警惕路边异常人员以确保人身安全。", "importance": "P1", "section_hint": "pattaya", "location_detail": "Khao Phra Tamnak Road, Nong Prue, Bang Lamung", "city_tag": "#芭提雅", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "pattaya_stone_attack_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "芭提雅（Pattaya）发生流浪汉投石袭击事件，两名酒吧老板受伤"}, {"id": "b70941242d4e", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国商业部多项目助力“本地好物走向全球”", "url": "https://www.thaiheadlines.com/186554/", "date": "2026-04-03T02:53:44+00:00", "desc_original": "泰国头条新闻社讯 4月2日，泰国商业部国际贸易促进厅（DITP）表示，作为负责连接泰国业者与全球市场的部门，DITP计划以“THINK THAILAND NEXT LEVEL”为概念，通过各种项目和平台，持续推动泰国商品和服务升级。", "summary_cn": "2026年4月2日，泰国商业部国际贸易促进厅（DITP）宣布启动“THINK THAILAND NEXT LEVEL”概念。作为连接本地业者与全球市场的核心部门，DITP计划通过多元化平台与扶持项目，全方位提升泰国商品与服务的综合竞争力。该计划旨在通过品牌升级与数字化转型，助力更多优质的泰国“地方好物”进入国际视野，特别是针对中国及欧美等主要外贸市场，进一步刺激泰国出口贸易增长。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-05-03", "event_id": "thailand_ditp_export_promotion_2026_04", "status": "pending", "origin": "rss", "added_date": "2026-04-03", "title_cn": "泰国商业部多项目助力“本地好物走向全球”"}, {"id": "4a3a177e0a7d", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "曼谷（Bangkok）极端惨案：缅籍母亲供认在民武里区（Min Buri）杀害7岁亲女", "url": "https://thethaiger.com/news/national/burmese-mother-confessions-to-killing-7-year-old-daughter-in-bangkok", "date": "2026-04 rce_id": "thaiheadlines", "lang": "zh", "title_cn": "曼谷一汽车冲进便利店造成8人受伤，包含2名德国游客", "url": "https://www.thaiheadlines.com/186489/", "date": "2026-04-01T04:57:30+00:00", "desc_original": "泰国头条新闻社讯 3月31日约22点50分，泰国曼谷Chanasongkram警察局接到报警称，Phra Nakhon区Wat Bowonniwet Vihara寺旁的Bang Lamphu环岛附近，有一辆汽车冲进了便利店里。造成现场8人受伤，包括2名德国人和6名泰国人。", "summary_cn": "3月31日晚约22:50，曼谷帕那空区（Phra Nakhon）发生一起严重交通事故。一辆汽车冲入僧王寺（Wat Bowonniwet Vihara）旁邦兰铺（Bang Lamphu）环岛附近的一家便利店。事故导致8人受伤，伤者包括2名德国籍游客及6名泰国居民。目前警方已介入调查事故原因，提醒游客在夜间出行注意交通安全状况。", "importance": "P1", "section_hint": "bangkok", "location_detail": "Phra Nakhon", "city_tag": "#曼谷", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "origin": "rss", "event_id": "bangkok_car_crash_convenience_store_2026", "status": "pending", "added_date": "2026-04-02", "time_sensitive": false, "expires_date": "2026-05-02"}, {"id": "01c9bb8664f7", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "泰国私企界敦促新内阁采取紧急经济行动", "url": "https://www.bangkokpost.com/business/general/3228205/private-sector-urges-urgent-economic-action", "date": "2026-04-01T04:50:00+07:00", "desc": "Business leaders have welcomed Prime Minister Anutin Charnvirakul's new cabinet, expressing hope for a more effective response to a range of economic challenges, from surging fuel prices to broader issues affecting the Thai economy.", "desc_original": "Business leaders have welcomed Prime Minister Anutin Charnvirakul's new cabinet, expressing hope for a more effective response to a range of economic challenges, from surging fuel prices to broader issues affecting the Thai economy.", "summary_cn": "泰国商界领袖对阿努廷（Anutin Charnvirakul）总理领导的新内阁表示欢迎，并敦促政府立即采取行动应对一系列经济挑战。企业界期望新内阁能更有效地解决燃料价格飙升、生活成本上涨以及影响泰国整体竞争力的结构性问题。这一动向预示着未来几个月泰国可能出台新的经济刺激政策。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.95, "tags": [], "origin": "rss", "status": "pending", "added_date": "2026-04-01", "event_id": "thailand_new_cabinet_economic_action_2026", "time_sensitive": false, "expires_date": "2026-05-01", "title_cn": "泰国私企界敦促新内阁采取紧急经济行动"}, {"id": "229354bd46be", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "中国男子称遭诈骗团伙追杀，在暖武里（Nonthaburi）获泰籍女子救助", "url": "https://www.thaiheadlines.com/186475/", "date": "2026-04-01T02:30:29+00:00", "desc_original": "泰国头条新闻社讯 4月1日，泰国暖武里府Bang Yai警察局透露，3月30日凌晨，一名泰国女子偶遇一名惊慌失措的中国男子向其求助，该男子自称被中国人的诈骗团伙从柬埔寨骗来泰国并遭到追杀。", "summary_cn": "3月30日凌晨，一名泰国女子在暖武里府挽艾县（Bang Yai）发现一名求助的中国籍男子。该男子称其原本被电诈团伙从柬埔寨骗至泰国，后脱逃并遭到同胞跨国追杀，情绪极度恐慌。泰籍女子随后协助其报警。此案再次暴露打击跨境跨国电信诈骗及相关暴力犯罪的紧迫性，目前泰国警方已展开深度调查。", "importance": "P1", "section_hint": "thailand", "location_detail": "Bang Yai", "city_tag": "#泰国", "topic_tag": "#中泰", "relevance_score": 0.9, "tags": [], "origin": "rss", "event_id": "chinese_national_escape_scam_chain_2026", "status": "pending", "added_date": "2026-04-02", "time_sensitive": false, "expires_date": "2026-05-02"}, {"id": "b9756620f596", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Oil fund seeks B150 billion in loan guarantees for fuel aid", "url": "https://www.bangkokpost.com/thailand/general/3228045/oil-fund-seeks-b150-billion-in-loan-guarantees-for-fuel-aid", "date": "2026-03-31T20:25:00+07:00", "desc": "The Oil Fuel Fund has sought a guarantee from the Ministry of Finance for 150 billion baht in loans to stabilise domestic fuel prices, amid rising energy pressures.", "tags": [], "origin": "rss", "topic_tag": "#经济", "relevance_score": 1.0, "added_date": "2026-04-01", "desc_original": "The Oil Fuel Fund has sought a guarantee from the Ministry of Finance for 150 billion baht in loans to stabilise domestic fuel prices, amid rising energy pressures.", "title_cn": "泰国燃油基金申请1500亿铢贷款担保以平抑国内燃油价格", "summary_cn": "面对日益增长的能源压力，泰国燃油基金办公室向财政部寻求总额为1500亿泰铢的贷款担保，旨在筹集资金稳定国内燃料市场价格。此举关乎普通居民及企业的交通运输成本，显示出泰国政府正试图通过宏观调控缓解全球能源波动带来的通胀影响。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city
