-05-01", "origin": "rss", "title_cn": "“穿拖鞋不能上BTS？”官方回应：曼谷轻轨 BTS 不限穿着"}, {"id": "b443b4d8d613", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "微软豪投10亿美元押注泰国！助力其打造东南亚 AI 枢纽", "url": "https://www.thaiheadlines.com/186455/", "date": "2026-03-31T06:38:07+00:00", "desc_original": "泰国头条新闻社讯 3月31日，微软副董事长兼首席法务官布拉德·史密斯率微软高层团队前往泰国总理府大楼拜会泰国总理兼内政部长阿努廷。双方就数字经济发展、人工智能及投资合作等议题展开深入交流。 微软方面表示，将在未来两年内向泰国追加投资10亿美元，重点用于云计算与人工智能基础设施建设，同时加强与泰国私营部门合作，推动本地人才培养。这一举措被视为微软深化东南亚布局、加码AI发展的重要战略。 泰国政府对微软长期以来在推动数字创新方面的作用表示肯定，并重申将持续支持相关投资，尤其是在数据中心等关键基础设施领域。同时，政府希望推动泰国成为区域数字与AI中心，借助其地理优势打造面向东南亚的科技枢纽。 双方一致认为，人才发展是推动AI产业落地的核心。微软将通过培训项目提升教师、政府人员及相关机构的AI技能，助力构建数字化人才体系。泰国政府也强调，将持续加强教育与劳动力技能建设，为AI产业发展提供坚实支撑。", "summary_cn": "微软（Microsoft）宣布将在未来两年内向泰国追加10亿美元投资，专项用于云计算和AI基础设施建设。微软高层史密斯与泰国总理阿努廷会谈，双方达成共识将泰国打造为东南亚科技枢纽。投资还包括深化本地AI人才培养，以支持数字经济转型。此举将极大提振泰国的数字化转型速度。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#科技", "relevance_score": 0.95, "added_date": "2026-04-01", "event_id": "microsoft_investment_thailand_ai_2026", "status": "pending", "tags": [], "time_sensitive": false, "expires_date": "2026-05-01", "origin": "rss", "title_cn": "微软豪投10亿美元押注泰国！助力其打造东南亚 AI 枢纽"}, {"id": "82a663110d21", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "中东战火蔓延，分析师担忧泰国油价管控能力", "title_cn": "中东战火蔓延，分析师担忧泰国油价管控能力", "url": "https://www.bangkokpost.com/business/general/3227389/pundits-fret-over-oil-prices-as-war-widens", "date": "2026-03-31T06:02:00+07:00", "desc": "Analysts are expressing concerns about the new government's ability to manage skyrocketing oil prices, as Houthi rebel involvement signals a broadening and prolonged conflict in the Middle East.", "desc_original": "Analysts are expressing concerns about the new government's ability to manage skyrocketing oil prices, as Houthi rebel involvement signals a broadening and prolonged conflict in the Middle East.", "summary_cn": "随着胡塞武装（Houthi rebel）介入，中东冲突呈现扩大化 ", "time_sensitive": false, "expires_date": "2026-04-30", "event_id": "thai_army_compensation_border_2026", "status": "pending", "added_date": "2026-03-31", "title_cn": "军方确认将为边境冲突牺牲士兵家属提供1000万铢补偿"}, {"id": "cdde3b2c2447", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国政府拟推“Thailand 10 Plus”方案，目标 GDP 增速超 3%", "url": "https://www.thaiheadlines.com/186446/", "date": "2026-03-31T04:00:48+00:00", "desc_original": "泰国头条新闻社讯 3月31日，据泰媒报道，围绕第二届阿努廷政府在中东战争引发的能源危机背景下组建新内阁并推动施政的进展，泰国总理阿努廷表示，新一届内阁成员资格审查已完成，待呈请御准程序推进，并称政府已就政策方向做好准备。 报道引述总理府大楼消息称，政府计划于4月7日至9日向国会宣读施政方针。相关施政方针文本约20至30页，经济刺激方案拟以“Thailand 10 Plus”为名，融合泰自豪党竞选主张，并吸收包括为泰党在内的执政联盟政党政策内容。 政府设定的总体目标为GDP年均增速不低于3%。", "summary_cn": "面对外部能源危机，阿努廷（Anutin）政府计划推出名为“Thailand 10 Plus”的经济刺激方案。该政策融合了泰自豪党与为泰党（Pheu Thai）的竞选核心主张，定下年均 GDP 增速不低于 3% 的目标。详细施政方针将在4月初提请国会审阅，旨在通过跨党派合作稳健复苏国家经济。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.95, "added_date": "2026-04-01", "event_id": "thailand_10plus_economic_policy_2026", "status": "pending", "tags": [], "time_sensitive": false, "expires_date": "2026-05-01", "origin": "rss", "title_cn": "泰国政府拟推“Thailand 10 Plus”方案，目标 GDP 增速超 3%"}, {"id": "e79a50e0db0c", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "曼谷人寿保险（BLA）受中东局势影响转向防御性经营策略", "url": "https://www.bangkokpost.com/business/general/3227464/bla-opts-to-take-more-defensive-approach", "date": "2026-03-31T01:01:00+07:00", "desc_original": "Bangkok Life Assurance (BLA) is reassessing its business outlook and adopting a more defensive strategy to navigate rising uncertainty as escalating tensions in the Middle East are beginning to ripple through the global economy and Thailand's financial sector.", "summary_cn": "曼谷人寿保险（Bangkok Life Assurance，简称 BLA）宣布正在重新评估其业务前景，并因中东局势持续升温而转向更为稳健的防御性策略。随着地缘政治紧张局势波及全球经济及泰国金融部门，BLA 旨在通过调整策略应对不断增强的市场不确定性，确保财务稳健性以抵御潜在的外部波动冲击。", "importance": "P2", "section_hin aya近期跨界进入美发行业，因其单次剪发服务收费高达85,000泰铢而引发社交媒体热议。这一高昂的价格定位在泰国社会引起了关于明星效应与商业价值的广泛讨论，也反映了泰国高端美容市场中溢价现象的极端案例。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#社会", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-04-30", "event_id": "thai_celebrity_haircut_fee_2026", "status": "pending", "origin": "rss", "added_date": "2026-03-31"}, {"id": "bdfd2ea6f6ad", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "中东冲突导致民航受阻，亚洲公务机需求激增", "title_cn": "加剧：公务机需求在亚洲飙升，泰国富豪青睐私人定制航路", "url": "https://www.bangkokpost.com/business/general/3226888/business-jet-demand-soars-in-asia", "date": "2026-03-30T06:11:00+07:00", "desc": "Amid commercial flight disruptions caused the Mideast war, business jet usage is booming in Thailand and Southeast Asia, with plane manufacturers marketing their latest models of long‑range aircraft to wealthy individuals seeking to expand their businesses internationally.", "desc_original": "Amid commercial flight disruptions caused the Mideast war, business jet usage is booming in Thailand and Southeast Asia, with plane manufacturers marketing their latest models of long‑range aircraft to wealthy individuals seeking to expand their businesses internationally.", "summary_cn": "受中东战争导致的商业民航中断影响，泰国及东南亚地区的公务机（Business Jet）使用量呈爆发式增长。飞机制造商正积极向寻求海外业务扩张的富豪阶层推销最新的远程机型。这一趋势反映了高端商务人士对航旅灵活性和安全性的高度关注，同时也显示出泰国奢侈航空市场的强劲潜力。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 0.8, "tags": [], "origin": "rss", "event_id": "thailand_business_jet_market_growth_2026", "status": "pending", "time_sensitive": false, "expires_date": "2026-04-29", "added_date": "2026-03-30"}, {"id": "f1cc2c7ffd9b", "source": "Bangkok Post Business", "source_id": "bangkokpost_business", "lang": "en", "title": "Bangchak与OR恢复B20生物柴油销售", "title_cn": "降成本：曼甲必 Bangchak 与 PTT OR 恢复 B20 生物柴油销售", "url": "https://www.ba //www.thaiheadlines.com/186395/", "date": "2026-03-30T02:21:01+00:00", "desc_original": "泰国头条新闻社讯 3月29日13点30分，泰国总理兼内政部部长阿努廷前往那空帕侬府Phaya Sri Sattanarat广场，参观首届“那空帕侬城市特色嘉年华——那空帕侬 DNA”活动。结束后，他带领团队乘坐三轮摩托顺风车（Carpool）继续其它行程，以实际行动示范“乘公共交通工具出行、减少能源消耗”。 阿努廷对现场“一乡一品”（OTOP）生产者的产品表现出浓厚的兴趣，如尖竹汶府的Color Gems珠宝店、素可泰府的古银店和那空帕侬府Piman村的缝纫服装等。他还购买了那空帕侬府Lao Phatthana镇社区企业合作社制作的绿色藤编手提包，该合作社将“泰国布料有趣穿搭”和“可持续时尚”理念融入到当地的手工艺品中，十分出色。 首届“那空帕侬城市特色嘉年华——那空帕侬 DNA”活动是推动那空帕侬府创意经济的重要一步，与政府和内政部的政策方向一致。通过提升自然资源、文化和独特生活方式的潜力，推广“那空帕侬 DNA”概念，并采取“5 Must”策略，包括观光赏美（Visit）、品尝当地美食（Eat）、选购社区产品（Shop）、信仰之旅（Mu）及慢活休憩（Rest）等，进一步延伸至“休憩城市”，为当地民众创造可持续收入。 （编译：KA；来源：thairath） The post 泰总理带头节省能源，坐三轮车参加活动 appeared first on 泰国头条新闻 .", "title_cn": "泰总理阿努廷（Anutin）前往那空帕侬（Nakhon Phanom）带头节能，改乘三轮车出席活动", "summary_cn": "3月29日，泰国总理兼内政部长阿努廷访问那空帕侬府（Nakhon Phanom），出席首届城市嘉年华活动。为响应节能减排号召，阿努廷在活动结束后带头乘坐当地三轮摩托顺风车。行程中，他参观并支持了“一乡一品”（OTOP）特色产品，包括尖竹汶府珠宝及当地藤编手工艺品。该活动旨在通过“5 Must”策略推广当地创意经济与可持续旅游，通过融合传统文化与现代时尚，为当地社区创造持续性收入。", "importance": "P3", "section_hint": "thailand", "location_detail": "那空帕侬府", "city_tag": "#那空帕侬", "topic_tag": "#时政", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-04-30", "event_id": "thailand_pm_anutin_nakhon_phanom_visit_2026", "status": "pending", "added_date": "2026-03-31", "origin": "rss"}, {"id": "5556622252b1", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "变迁的代理人：泰剧《交换吧，灵魂》引发探讨", "url": "https://www.bangkokpost.com/life/arts-and-entertainment/3226878/agents-of-change", "date": "2026-03-30T01:01:00+07:00", "desc": "In The Shipper (2020), Pan and Soda enjoy pairing young men in yaoi fiction, especially two popular students Kim and Way. Following a bike accident, the grim reaper puts Pan's and Kim's soul in the wrong bodies.", "desc_original": "In The Shipper (2020), Pan and Soda enjoy pairing young men in yaoi fiction, especially two popular students Kim and Way. Following a bike accident, the grim reaper puts Pan's and Kim's soul in the wrong gkokpost_thailand", "lang": "en", "title": "公共卫生部：Covid-19 蝉变异株（Cicada）风险较低", "url": "https://www.bangkokpost.com/thailand/general/3226330/covid19-cicada-variant-poses-low-risk", "date": "2026-03-29T01:01:00+07:00", "desc": "The Covid-19 variant Cicada, detected in the United States and 22 other countries, will eventually reach Thailand but poses no serious threat and requires no new vaccines, the Ministry of Public Health said.", "desc_original": "The Covid-19 variant Cicada, detected in the United States and 22 other countries, will eventually reach Thailand but poses no serious threat and requires no new vaccines, the Ministry of Public Health said.", "summary_cn": "泰国公共卫生部近日表示，已在包括美国在内的22个国家检测到的新型变异株“蝉”（Cicada）最终将进入泰国。然而，卫生部强调该变异株目前并不构成严重威胁，现有疫苗及防疫措施依然有效，民众无需接种专门的新型疫苗。卫生部将持续监测其在全球的传播动态，呼吁公众保持冷静并维持常规卫生习惯。这一评估降低了社会对新一轮疫情反弹的担忧。", "importance": "P1", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#健康", "relevance_score": 0.95, "tags": [], "time_sensitive": false, "expires_date": "2026-04-28", "event_id": "thailand_covid_cicada_variant_2026", "status": "pending", "origin": "rss", "added_date": "2026-03-29", "title_cn": "公共卫生部：Covid-19 蝉变异株（Cicada）风险较低"}, {"id": "38ad63e524c5", "source": "Bangkok Post", "source_id": "bangkokpost_top", "lang": "en", "title": "【评论】油价单周飙升6铢：民众为何还应相信阿努廷？", "url": "https://www.bangkokpost.com/opinion/opinion/3226033/why-should-anyone-believe-anutin-on-fuel", "date": "2026-03-28T11:38:00+07:00", "desc": "After weeks of assurances that the nation&rsquo;s fuel situation was &ldquo;under control&rdquo;, the Thai public was hit by a staggering 6-baht hike to fuel prices this week.", "desc_original": "After weeks of assurances that the nation's fuel situation was \"under control\", the Thai public was hit by a staggering 6-baht hike to fuel prices this week.", "summary_cn": "本文是一篇深度评论，针对泰国本周油价剧涨6泰铢引发的社会信任危机进行分析。作者指出，阿努廷（Anutin）政府此前数周一直向公众保证燃油形势“尽在掌握”，但突如其来的巨额调价让民众感到被误导。文章质疑政府在应对能源波动时的透明度与预见性。这一价格猛涨将显著拉高在泰生活及经 e_score": 0.95, "tags": [], "origin": "rss", "event_id": "thac_policy_reform_2026", "status": "pending", "added_date": "2026-03-28", "time_sensitive": false, "expires_date": "2026-04-27", "title_cn": "泰国仲裁学会（THAC）支持贸易与投资调解机制改革"}, {"id": "91cc92771a5c", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title_cn": "泰国成立专项工作组，保障霍尔木兹海峡（Strait of Hormuz）本国船只通行安全", "url": "https://www.thaiheadlines.com/186318/", "date": "2026-03-28T02:49:33+00:00", "desc_original": "泰国头条新闻社讯 3月27日16点30分，泰国副总理兼交通部部长皮帕作为中东冲突局势管理中心负责人，委派能源部部长阿塔蓬主持召开会议，批准成立子工作组...", "summary_cn": "针对中东局势的持续紧张，泰国副总理兼交通部部长皮帕（Phiphat Ratchakitprakarn）指示成立专项子工作组，由能源部部长阿塔蓬（Atthaphon）主持，专门负责管理和监控途经霍尔木兹海峡（Strait of Hormuz）的泰国船只。该工作组旨在建立预警机制与应急预案，保障能源运输与商业贸易航线安全。反映出泰国政府在应对区域地缘政治风险、维护国家能源供应稳定方面的积极态度。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#时政", "relevance_score": 0.9, "tags": [], "time_sensitive": false, "expires_date": "2026-04-28", "event_id": "thailand_hormuz_security_committee_2026", "status": "pending", "origin": "rss", "added_date": "2026-03-29"}, {"id": "30fd64b771c6", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "致逝去世界的挽歌：资深驻泰记者丹尼斯（Denis Gray）纵横甲子记", "url": "https://www.bangkokpost.com/life/arts-and-entertainment/3225929/an-elegy-to-lost-worlds", "date": "2026-03-28T01:01:00+07:00", "desc_original": "A large, booming presence as bureau chief of the Associated Press in Bangkok for more than 30 years, a war reporter in Indochina before that, thrice president of the Foreign Correspondents Club of Thailand, Denis Gray has through six turbulent decades occupied front row seats, and foxholes, to report on some of the most violent upheavals of our times.", "summary_cn": "曾任美联社（AP）曼谷分社社长逾30年、三度当选泰国外国记者协会（FCCT）主席的资深记者丹尼斯·格雷（Denis Gray），回顾了其长达60年的职业生涯。从印度支那的战壕到曼谷的繁华街头，他在最前线见证并报道了东南亚最剧烈的时代动荡与变迁，是记录区域历史变迁的重要人物。", "importance": "P3", "section_hint": "thailand", "location_detail": "曼谷", "city_tag": "#曼谷", "topic_tag": "#社会", "relevance_score": 0.75, "tags": [], "origin": "rss", "event_id": "denis_gray_journalism_career_2026", "status": "pending", "added_date": "2026-03-28", "time_sensitive": false, "expires_date": "2026-04-27", "title_cn": "致逝去世界的挽歌：资深驻泰记者丹尼斯（Denis Gray）纵横甲子记"}, {"id": "62544baecbf4", "source": "Bangkok Post Life", "source_id": "bangkokpost_life", "lang": "en", "title": "传承画笔：泰国寺庙壁画中的性别规范颠覆", "url": "https://www.bangkokpost.com/life/arts-and-entertainment/3225944/inheriting-the-brush", "date": "2026-03-28T01:01:00+07:00", "desc_original": "At first glance, a mural resembles a familiar backdrop to an ubosot at any temple. You expect it to depict themes from the Jataka Tales and the Tripitaka to legends and folklore. But upon closer look, it reveals something different -- it is deeply personal, vernacular and subversive of gender norms.", "title_cn": "【艺术传承】画笔中的传承：泰国寺庙壁画对传统性别规范的颠覆", "summary_cn": "泰国寺庙大雄宝殿（Ubosot）的壁画通常描绘《本生经》（Jataka Tales）或民间传说。然而，目前有部分艺术家的作品正打破常规。这些壁画从单纯的佛教题材转向更加私人化、本土化的视角，并通过艺术手法挑战和颠覆了传统的性别规范，为泰国古老的宗教绘画传统注入了现代社会意识，不仅是艺术的延续，更是文化认知的革命性创新。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.65, "tags": [], "time_sensitive": false, "expires_date": "2026-04-27", "event_id": "thai_temple_mural_art_2026", "status": "pending", "origin": "rss", "added_date": "2026-03-28"}, {"id": "75f0f10b7d6e", "source": "Bangkok Post Thailand", "source_id": "bangkokpost_thailand", "lang": "en", "title": "Oil checks in seven provinces find ‘no irregularities’", "url": "https://www.bangkokpost.com/thailand/general/3225534/oil-checks-in-seven-provinces-find-no-irregularities", "date": "2026-03-27T18:43:00+07:00", "desc_original": "Inspections of oil depots and petrol stations in seven provinces have found no irregularities in fuel supply or distribution, the National Economic and Social Development Council (NESDC) said on Friday.", "title_cn": "泰国国家经社委：七省份燃油检查未发现违规现象", "summar eo of the incident circulated on Thai social media today, but the identities of those involved have not been disclosed. In the clip, the foreign woman was seen driving a blue pickup that suddenly slid to the right and collided with two motorcycles travelling in the opposite lane. The pickup then ", "summary_cn": "3月25日下午5时许，普吉岛查龙区（Chalong）发生一起惨烈交通事故。一名外籍女子驾驶的蓝色皮卡车在行驶中突然失控偏向右侧，撞上了对向行驶的两辆摩托车。事故导致一名泰国男子当场身亡，另一名摩托车手受伤。相关行车记录仪画面已在社交媒体上流传，但涉案外籍人士的身份尚未公布。目前警方正介入调查事故具体原因。", "importance": "P1", "section_hint": "thailand", "location_detail": "查龙 Chalong", "city_tag": "#普吉岛", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-04-26", "event_id": "phuket_foreign_driver_crash_2026_03", "status": "pending", "added_date": "2026-03-27", "origin": "rss", "title_cn": "外籍女司机普吉岛（Phuket）驾驶皮卡撞人，致泰国摩托车手一死一伤"}, {"id": "bec984ba9354", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "北榄府（Samut Prakan）公寓突发大火，疑似微波炉无人看守引发", "url": "https://thethaiger.com/news/central-thailand/unattended-microwave-suspected-samut-prakan-apartment-fire", "date": "2026-03-26T08:32:35+00:00", "desc_original": "Unattended microwave suspected in Samut Prakan apartment fire Legacy An unattended microwave is suspected to have caused a fire in Samut Prakan yesterday, March 25, at a five-storey apartment building in Mueang Samut Prakan district, prompting firefighters to evacuate residents . Fire crews from Pak Nam Municipality and nearby areas responded with nearly 10 fire engines, supported by rescue and medical volunteers, as residents were moved to a safe point. Fire firefighters hauled hoses up to the rooftop and worked inside the room to bring the situation under control. The flames were extinguished in ", "summary_cn": "3月25日，泰国北榄府（Samut Prakan）直辖县一座五层公寓楼发生火灾。当地消防部门出动10余辆消防车赶赴现场，迅速疏散楼内住户并展开扑救。火势随后被控制在起火房间内。据初步调查，火灾疑因住户使用微波炉时无人看守导致短路或过热引发。此次事故提醒在泰居住者注意电器安全。", "importance": "P2", "section_hint": "thailand", "location_detail": "北榄直辖县 Mueang Samut Prakan", "city_tag": "#泰国", "topic_tag": "#治安", "relevance_score": 1.0, "tags": [], "time_sensitive": false, "expires_date": "2026-04-26", "event_id": "samut_prakan_apartment_fire_2026_03", "status": "pending", "added_date": "2026-03-27", "origin": "rss", "title_cn": "北榄府（Samut Prakan）公寓突发大火，疑似微波炉无人看守引发"}, {"id": "128b952665ee", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "新加坡海南鸡饭魅力何在？为何赴新泰国游客仍乐于排队", "url": "https://thethaiger.com/guides/best-of/food/thailand-singapore-hainanese-chicken-rice", "date": "2026-03-26T08:30:31+00:00", "desc_original": "Why Thai travellers keep queuing for Singapore’s Hainanese chicken rice Legacy Chicken rice is sold on almost every street corner in Thailand for under 70 baht. You can find it from morning until midnight. So why is it that every time Thai people travel to Singapore, chicken rice ends up on the first list of must-eat dishes, to the point where some say you have not really reached the Merlion land if you have not tried it? Some famous stalls even require people to queue for more than an hour for a single plate. The answer is not just branding, but it also comes down to ingredients and technique", "summary_cn": "虽然海南鸡饭在泰国街头随处可见且价格亲民（通常低于70泰铢），但泰国游客前往新加坡旅行时，海南鸡饭仍是必吃清单上的首选。许多知名摊位甚至需排队一小时以上。究其原因，除了品牌效应外，新加坡海南鸡饭在选材、烹饪技巧及搭配酱料上与泰式款式有所不同，这种文化相似中的差异性吸引了大量食客前去打卡。", "importance": "P3", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#旅居", "relevance_score": 0.5, "tags": [], "time_sensitive": false, "expires_date": "2026-04-26", "event_id": "thai_traveller_food_culture_2026_03", "status": "pending", "added_date": "2026-03-27", "origin": "rss", "title_cn": "新加坡海南鸡饭魅力何在？为何赴新泰国游客仍乐于排队"}, {"id": "95b575aef066", "source": "The Thaiger", "source_id": "thaiger", "lang": "en", "title": "普吉岛（Phuket）保时捷维修中心员工见财起意，偷窃客户价值50万泰铢劳力士", "url": "https://thethaiger.com/news/phuket/porsche-service-centre-worker-in-phuket-steals-clients-rolex-watch", "date": "2026-03-26T08:21:39+00:00", " rade Policy and Strategy Office (TPSO).", "summary_cn": "泰国贸易政策与战略办公室 (TPSO) 报告显示，2026年2月泰国出口额同比增长9.9%，达到294亿美元，主要动力来自强劲的工业产品出货量。与此同时，由于机械设备和黄金进口的激增，进口额录得31.8%的涨幅，达323亿美元。尽管整体出口向好，但进口的异常增长导致本月出现贸易逆差，反映出泰国工业生产扩产需求及避险资产配置的活跃，是观察泰国经济活力的重要宏观指标。", "importance": "P2", "section_hint": "thailand", "location_detail": "", "city_tag": "#泰国", "topic_tag": "#经济", "relevance_score": 1.0, "tags": [], "origin": "rss", "time_sensitive": false, "expires_date": "2026-04-24", "event_id": "thailand_trade_data_february_2026", "status": "pending", "added_date": "2026-03-25", "title_cn": "泰国2月出口额达294亿美元 工业需求推动增长"}, {"id": "db3e7deeac4e", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "曼谷曼桥花市 Pak Khlong Talat 引领 Z 世代“抱莲花拍照”穿搭新趋势", "url": "https://www.thaiheadlines.com/186217/", "date": "2026-03-25T03:33:29+00:00", "desc": "据泰媒报道，3月24日，曼谷Phra Nakhon地区的老牌花市Pak Khlong花市呈现出全新的热闹景象，Z世代年轻人纷纷前来选购鲜花。", "desc_original": "据泰媒报道，3月24日，曼谷Phra Nakhon地区的老牌花市Pak Khlong花市呈现出全新的热闹景象，Z世代年轻人纷纷前来选购鲜花。", "title_cn": "曼谷曼桥花市 Pak Khlong Talat 引领 Z 世代“抱莲花拍照”穿搭新趋势", "summary_cn": "曼谷拍那空区 Phra Nakhon 的老牌曼桥花市 Pak Khlong Talat 近日焕发活力，成为泰国 Z 世代年轻人的热门打卡地。受社交媒体 OOTD（今日穿搭）风潮影响，年轻人纷纷前往采购鲜花，尤其是“抱着莲花拍照”成为最新复古文化流行趋势。这不仅带动了当地花卉市场的经济增长，也让传统花卉文化在年轻群体中得到重新诠释。", "importance": "P3", "section_hint": "bangkok", "location_detail": "Phra Nakhon", "city_tag": "#曼谷", "topic_tag": "#旅居", "relevance_score": 0.85, "tags": [], "time_sensitive": false, "expires_date": "2026-04-25", "event_id": "bangkok_flower_market_z_generation_trend_2026", "status": "pending", "origin": "rss", "added_date": "2026-03-26"}, {"id": "7c71bbb110f4", "source": "泰国头条新闻", "source_id": "thaiheadlines", "lang": "zh", "title": "泰国 2 月汽车产量同比增长 3.43% 但国内销量持续下滑", "url": "https://www.thaiheadlines.com/186208/", "date": "2026-03-25T03:08:04+00:00", "desc": "就2月单月的数据来看，泰国汽车产量同比增长3.43%、出口同比微降0.05%、内销同比减少2.17%。", "desc_original": "就2月单月的数据来看，泰国汽车产量同比增长3.43%、出口同比微降0.05%、内销同比减少2.17%。", "title_cn": "泰国 2 月汽车产量同比增长 3.43% 但国内销量持续下滑", "summary_cn": "泰国 202 const SECTIONS  = [{"id": "thailand", "label": "泰国", "count": 563}, {"id": "bangkok", "label": "曼谷", "count": 95}, {"id": "pattaya", "label": "芭提雅", "count": 48}, {"id": "cn_thai", "label": "中泰", "count": 46}, {"id": "property", "label": "房产", "count": 36}];
const TOP_TAGS  = [];

// ── 状态 ──
let activeSection = "";
let activeTags = new Set();
let searchQ = "";

// ── 初始化 Section 按钮 ──
const sectionBar = document.getElementById("section-bar");
SECTIONS.forEach(s => {
  const btn = document.createElement("button");
  btn.className = "sec-btn";
  btn.dataset.section = s.id;
  btn.textContent = `${s.label} (${s.count})`;
  btn.onclick = () => {
    activeSection = s.id;
    sectionBar.querySelectorAll(".sec-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  sectionBar.appendChild(btn);
});

// ── 初始化 Tag 按钮 ──
const tagBar = document.getElementById("tag-bar");
const clearTagsBtn = document.getElementById("clear-tags");
TOP_TAGS.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "tag-btn";
  btn.textContent = `${t.tag} ${t.count}`;
  btn.dataset.tag = t.tag;
  btn.onclick = () => {
    if (activeTags.has(t.tag)) activeTags.delete(t.tag);
    else activeTags.add(t.tag);
    btn.classList.toggle("active", activeTags.has(t.tag));
    clearTagsBtn.style.display = activeTags.size ? "inline-block" : "none";
    render();
  };
  tagBar.appendChild(btn);
});
clearTagsBtn.onclick = () => {
  activeTags.clear();
  tagBar.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
  clearTagsBtn.style.display = "none";
  render();
};

// ── 搜索 ──
document.getElementById("search-input").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  render();
});

// ── 过滤 ──
function filterItems() {
  return ALL_ITEMS.filter(item => {
    if (activeSection && (item.section_hint || "other") !== activeSection) return false;
    if (activeTags.size > 0) {
      const itemTags = item.tags || [];
      if (![...activeTags].every(t => itemTags.includes(t))) return false;
    }
    if (searchQ) {
      const haystack = (item.title + " " + (item.summary_cn || "") + " " + (item.desc || "")).toLowerCase();
      if (!haystack.includes(searchQ)) return false;
    }
    return true;
  });
}

// ── 格式化日期 ──
// 优先用能解析的标准日期，非标准格式（如 "4 days ago"）fallback 到 added_date 或原字符串
function fmtDate(d, fallback) {
  if (!d) return fallback ? fmtDate(fallback) : "";
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) {
      // 非标准格式：尝试 fallback
      return fallback ? fmtDate(fallback) : d.slice(0, 10);
    }
    return dt.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
  } catch(e) { return fallback ? fmtDate(fallback) : d.slice(0, 10); }
}

// ── 渲染 ──
function render() {
  const items = filterItems();
  const grid = document.getElementById("news-grid");
  const emptyMsg = document.getElementById("empty-msg");
  document.getElementById("visible-count").textContent = items.length;

  grid.innerHTML = "";
  if (items.length === 0) {
    emptyMsg.classList.add("show");
    return;
  }
  emptyMsg.classList.remove("show");

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "nr-card";
    const imp = item.importance || "";
    const tags = (item.tags || []).slice(0, 4).map(t =>
      `<span class="nr-card-tag">${t}</span>`).join("");
    card.innerHTML = `
      <div class="nr-card-meta">
        <span class="nr-card-source">${item.source || ""}</span>
        <span>${fmtDate(item.date, item.added_date)}</span>
        ${imp ? `<span class="nr-card-importance imp-${imp}">${imp}</span>` : ""}
      </div>
      <div class="nr-card-title">${item.title || ""}</div>
      <div class="nr-card-summary">${item.summary_cn || item.desc || ""}</div>
      ${tags ? `<div class="nr-card-tags">${tags}</div>` : ""}
    `;
    card.onclick = () => openModal(item);
    grid.appendChild(card);
  });
}

// ── Modal ──
function openModal(item) {
  document.getElementById("modal-title").textContent = item.title || "";
  document.getElementById("modal-meta").innerHTML = `
    <span><strong>${item.source || ""}</strong></span>
    <span>${fmtDate(item.date, item.added_date)}</span>
    ${item.section_hint ? `<span>板块：${item.section_hint}</span>` : ""}
    ${item.importance ? `<span>优先级：${item.importance}</span>` : ""}
  `;
  document.getElementById("modal-summary").textContent = item.summary_cn || "";
  const descEl = document.getElementById("modal-desc");
  if (item.desc && item.desc !== item.desc_original) {
    descEl.textContent = item.desc;
    descEl.style.display = "block";
  } else if (item.desc_original) {
    descEl.textContent = item.desc_original;
    descEl.style.display = "block";
  } else {
    descEl.style.display = "none";
  }
  const tagsEl = document.getElementById("modal-tags");
  tagsEl.innerHTML = (item.tags || []).map(t =>
    `<span class="modal-tag">${t}</span>`).join("");
  const link = document.getElementById("modal-link");
  link.href = item.url || "#";
  link.style.display = item.url ? "inline-block" : "none";
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modal-close").onclick = closeModal;
document.getElementById("modal-overlay").onclick = e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
};
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── 启动 ──
render();
</script>
